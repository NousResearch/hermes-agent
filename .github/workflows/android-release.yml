name: Android Release

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published

concurrency:
  group: android-release-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Python 3.13 for Chaquopy
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Restore signing material
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.keystore

      - name: Ensure Gradle wrapper is executable
        run: chmod +x android/gradlew

      - name: Build and sign Android artifacts
        working-directory: android
        env:
          HERMES_RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
          SOURCE_DATE_EPOCH: "315532800"
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          rm -rf ../build
          rm -f keystore.properties
          export PYTHON_FOR_BUILD="$(command -v python3.13 || command -v python3 || command -v python)"
          ./gradlew :app:assembleRelease
          cat > keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
          ./gradlew :app:bundleRelease
          sdk_root="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          build_tools_dir="$(find "$sdk_root/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          apksigner="$build_tools_dir/apksigner"
          unsigned_apk="app/build/outputs/apk/release/app-release-unsigned.apk"
          signed_apk="app/build/outputs/apk/release/app-release.apk"
          test -x "$apksigner"
          test -f "$unsigned_apk"
          "$apksigner" sign \
            --v1-signing-enabled false \
            --v2-signing-enabled true \
            --v3-signing-enabled false \
            --v4-signing-enabled false \
            --ks release.keystore \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --key-pass env:ANDROID_KEY_PASSWORD \
            --out "$signed_apk" \
            "$unsigned_apk"
          "$apksigner" verify --verbose "$signed_apk"

      - name: Rename artifacts and write checksums
        env:
          HERMES_RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          python scripts/android_release_manifest.py --tag "$HERMES_RELEASE_TAG"

      - name: Ensure GitHub CLI is available
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo mkdir -p -m 755 /etc/apt/keyrings
            wget -qO- https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg >/dev/null
            sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
            sudo apt-get update
            sudo apt-get install -y gh
          fi

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
          HERMES_RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          title="Hermes Agent Fork ${HERMES_RELEASE_TAG}"
          notes_file="RELEASE_${HERMES_RELEASE_TAG}.md"
          if gh release view "$HERMES_RELEASE_TAG" >/dev/null 2>&1; then
            edit_args=(--target "$GITHUB_SHA" --title "$title")
            if [ -f "$notes_file" ]; then
              edit_args+=(--notes-file "$notes_file")
            fi
            gh release edit "$HERMES_RELEASE_TAG" "${edit_args[@]}"
          else
            create_args=(--generate-notes)
            if [ -f "$notes_file" ]; then
              create_args=(--notes-file "$notes_file")
            fi
            gh release create "$HERMES_RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              "${create_args[@]}"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          HERMES_RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          gh release upload "$HERMES_RELEASE_TAG" \
            dist/android-release/*.apk \
            dist/android-release/*.aab \
            dist/android-release/*.sha256 \
            --clobber
