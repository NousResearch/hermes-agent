name: Auto Safe PR

# Manual, gated generator of draft PRs for repository-owned generated paths only.
# Human review required before merge. Does not auto-merge. Does not run on
# protected branches. Does not use secrets beyond GITHUB_TOKEN for draft PR + scan.

on:
  workflow_dispatch:
    inputs:
      generator_command:
        description: "Command that generates low-risk files under the fixed allowlist. Must not require secrets."
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-safe-pr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-safe-pr:
    runs-on: ubuntu-latest
    # Refuse protected / release branch execution
    if: github.ref_name != 'main' && github.ref_name != 'master' && github.ref_name != 'prod' && github.ref_name != 'production' && !startsWith(github.ref_name, 'release/')
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Run generator
        shell: bash
        run: |
          set -euo pipefail
          ${{ inputs.generator_command }}

      - name: Validate changed paths against repository allowlist
        id: path_policy
        shell: bash
        run: |
          set -euo pipefail
          # Fixed allowlist is owned by scripts/auto_safe_pr_path_policy.py
          # (website/static/api/, website/docs/, docs/). User add_paths removed.
          python scripts/auto_safe_pr_path_policy.py --print-allowlist
          python scripts/auto_safe_pr_path_policy.py \
            --from-git \
            --write-allowed /tmp/auto-safe-pr-allowed-paths.txt
          if [ ! -s /tmp/auto-safe-pr-allowed-paths.txt ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No allowlisted changes; skipping draft PR."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Allowed paths to stage:"
            cat /tmp/auto-safe-pr-allowed-paths.txt
          fi

      - name: Diff whitespace check
        if: steps.path_policy.outputs.has_changes == 'true'
        shell: bash
        run: git diff --check

      - name: Secret scan
        if: steps.path_policy.outputs.has_changes == 'true'
        uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3  # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false

      - name: Create draft pull request
        if: steps.path_policy.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@84ae59a2cdc2258d6fa0732dd66352dddae2a412  # v7.0.9
        with:
          branch: auto/safe-generated-${{ github.run_id }}
          delete-branch: true
          commit-message: "chore: auto-safe generated update"
          title: "chore: auto-safe generated update"
          body: |
            Automated generated-file PR.

            Safety gates passed:
            - workflow_dispatch only
            - protected branch guard
            - repository-owned path allowlist (no user add_paths)
            - post-generator changed-path validation (fail closed)
            - secret/key and cache/build/db denylist
            - git diff --check
            - gitleaks scan
            - draft PR only (no auto-merge)

            Allowlist prefixes (fixed in `scripts/auto_safe_pr_path_policy.py`):
            - `website/static/api/`
            - `website/docs/`
            - `docs/`

            Human review required before merge.
          # Only stage paths that passed the allowlist check (file list from policy script).
          add-paths: |
            website/static/api/
            website/docs/
            docs/
          labels: automated,safe-pr,needs-review
          draft: true
