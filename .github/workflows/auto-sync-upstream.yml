name: Auto-sync upstream into feat

on:
  schedule:
    - cron: '*/10 * * * *'   # 每 10 分钟
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: feat/tui-i18n-localization
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream main

      - name: Check if sync needed
        id: check
        run: |
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "behind=false" >> $GITHUB_OUTPUT
            echo "Already up to date — nothing to do."
          else
            echo "behind=true" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream
        if: steps.check.outputs.behind == 'true'
        run: |
          if git merge upstream/main -m "🤖 auto-sync: merge upstream/main into feat/tui-i18n-localization"; then
            git push origin feat/tui-i18n-localization
          else
            echo "conflict=true" >> $GITHUB_OUTPUT
            git merge --abort
          fi

      - name: Report conflict
        if: failure() || steps.check.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Auto-sync conflict — upstream merge into feat',
              body: 'Merge conflict when syncing upstream/main into feat/tui-i18n-localization.\n\n```bash\ngit checkout feat/tui-i18n-localization\ngit fetch upstream main\ngit merge upstream/main\n# resolve conflicts, then push\n```'
            });
