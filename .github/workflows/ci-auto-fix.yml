name: CI Auto-Fix

on:
  pull_request:
    types:
      - opened
      - synchronize

concurrency:
  group: auto-fix-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

jobs:
  auto-fix-issues:
    name: Auto-Fix Linting & Formatting Issues
    runs-on: ubuntu-latest
    # Only run on PRs from the same repository (not forks). Also guards
    # against non-pull_request events (e.g. push) reaching this job, since
    # github.event.pull_request is null outside PR context.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.10 2>/dev/null || echo "ruff not available"

      - name: Auto-fix with ruff
        id: ruff-fix
        continue-on-error: true
        run: |
          if command -v ruff &> /dev/null; then
            echo "Running ruff --fix..."
            ruff check --fix . || true
            echo "ruff_fixed=true" >> $GITHUB_OUTPUT
          else
            echo "ruff not available, skipping"
            echo "ruff_fixed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected - will commit"
            git diff --stat
          fi

      - name: Commit and push fixes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "fix: auto-fix linting and formatting issues

- Applied ruff auto-fixes
- Fixed code style violations
- Resolved formatting issues

Auto-generated by CI Auto-Fix workflow" || echo "No changes to commit"

          git push || echo "Push failed, may need manual resolution"
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report fixes applied
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          echo "✓ Auto-fix completed"
          echo "Changes have been committed and pushed"
          echo "CI should re-run automatically"

      - name: No fixes needed
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "✓ Code passes all linting checks"
          echo "No auto-fixes needed"
