name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # Gate the whole job on the API key being configured. secrets.* can't be used
  # directly in a job-level `if:`, so surface it into an output first. Without
  # this the action runs with an empty key and aborts with exit 1 — a red X on
  # every PR/comment event. This turns "not configured" into a clean skip.
  check-secret:
    runs-on: ubuntu-latest
    outputs:
      has_key: ${{ steps.probe.outputs.has_key }}
    steps:
      - id: probe
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY not set — skipping Claude Code Review."
          fi

  claude-review:
    needs: check-secret
    if: |
      needs.check-secret.outputs.has_key == 'true' &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'claude[bot]'
    runs-on: ubuntu-latest
    # Best-effort advisory review: it posts a comment but must never block a
    # PR. The GitHub App token step can fail (e.g. missing app install on
    # bot-authored PRs), and that is not a reason to red-X the PR.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for correctness bugs, security issues, type safety,
            and test coverage gaps on changed behaviour. For each issue found:
            fix it directly in the code and commit the fix to this branch. After
            fixing, leave a brief PR comment summarising what was changed and
            why. Skip style nits caught by the project linter.
          claude_args: "--model claude-sonnet-4-6 --max-turns 10"

