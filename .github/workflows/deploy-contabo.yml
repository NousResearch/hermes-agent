name: Deploy to Contabo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.HERMES_SSH_KEY }}
          HOST_KEY: ${{ secrets.HERMES_HOST_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$HOST_KEY" >> ~/.ssh/known_hosts
          # Keepalive prevents "client_loop: send disconnect: Broken pipe" when
          # the multi-minute `docker build` produces no output for a while (the
          # long `chmod -R`/`chown -R` stage-2 step). ServerAliveInterval=30 +
          # CountMax=120 tolerates ~60 min of silence before the client gives
          # up. See failed run actions/runs/26861301561.
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 \
              -o TCPKeepAlive=yes -o ConnectTimeout=30 \
              -i ~/.ssh/id_ed25519 root@5.189.159.195 'bash -se' <<'REMOTE'
          set -euo pipefail
          cd /opt/hermes/app
          git config --global --add safe.directory /opt/hermes/app
          git remote set-url origin https://github.com/adrozdenko/hermes-agent.git
          git fetch origin main
          git reset --hard origin/main
          # --progress=plain keeps a steady output stream during the build,
          # which also helps keep the SSH channel active.
          docker build --progress=plain -t hermes-agent:local .

          # ---- One-time, reversible proxy migration (Phase 3) ----------
          # The :11435 Claude proxy is now BAKED INTO THE IMAGE (the static
          # s6-rc service docker/s6-rc.d/claude-proxy execs
          # /opt/hermes/deploy/claude-proxy/claude_proxy.py). The old copy lived
          # on the data volume under $HERMES_HOME/services/claude-proxy and was
          # seeded into the scandir by 03-seed-data-services. If BOTH survive,
          # the image service and a volume re-seed would both bind :11435 and
          # collide -- so we retire the volume copy by renaming it to
          # claude-proxy.legacy BEFORE the new container boots. (03 also skips
          # 'claude-proxy' defensively, but renaming makes the image copy
          # unambiguously authoritative and leaves a trivial rollback: rename
          # .legacy back and redeploy the pre-bake image.)
          #
          # Idempotent: if the volume copy is already gone (re-deploy) we do
          # nothing; we never clobber an existing .legacy. Resolve the host
          # volume path from the running container's mount so we don't hardcode
          # ~/.hermes vs /opt/hermes/data.
          VOL_SRC=$(docker inspect -f \
            '{{range .Mounts}}{{if eq .Destination "/opt/data"}}{{.Source}}{{end}}{{end}}' \
            hermes 2>/dev/null || true)
          [ -n "$VOL_SRC" ] || VOL_SRC="$HOME/.hermes"
          LEGACY_SRC="$VOL_SRC/services/claude-proxy"
          LEGACY_DST="$VOL_SRC/services/claude-proxy.legacy"
          if [ -d "$LEGACY_SRC" ]; then
            if [ -e "$LEGACY_DST" ]; then
              echo "proxy-migration: $LEGACY_DST already exists -- removing now-redundant volume copy $LEGACY_SRC"
              rm -rf "$LEGACY_SRC"
            else
              echo "proxy-migration: retiring volume proxy -> $LEGACY_DST (image copy is now authoritative)"
              mv "$LEGACY_SRC" "$LEGACY_DST"
            fi
          else
            echo "proxy-migration: no volume claude-proxy to retire (already image-baked)"
          fi

          docker compose -f /opt/hermes/docker-compose.yml up -d

          # ---- Post-deploy health gate ---------------------------------
          # A successful `up -d` only means the container was *created*, not
          # that the bots can actually answer. The recurring outage mode is
          # the container booting WITHOUT the :11435 Claude proxy: its s6 def
          # lives on the volume and 03-seed-data-services re-seeds it into the
          # tmpfs scandir on boot. When that reseed misses, the gateway loses
          # its Claude provider and the bots go dark -- yet the deploy still
          # reported green. Gate on the two server-side signals that map
          # directly to that failure: the container is actually Running (not
          # restart-looping) and the proxy answers GET /health on :11435.
          #
          # IMPORTANT: probe from INSIDE the gateway container, not the host.
          # The proxy binds 127.0.0.1:11435 (container-local loopback; see
          # deploy/claude-proxy/claude_proxy.py), and this host runs the
          # containers on a BRIDGE network -- the dashboard publishes
          # 127.0.0.1:9119->9119, which host networking cannot do. A host-side
          # `curl 127.0.0.1:11435` therefore never connects even when the proxy
          # is healthy and the bots (which live in this same container) reach it
          # fine. `docker exec hermes` runs the probe in the container's netns,
          # testing the exact path the bots use. This was a false-negative in
          # run 26998127716: the proxy logged "Proxy ready" but the host probe
          # failed for the full 10min.
          #
          # Timeout is generous (10min): on this host the stage2 ownership
          # fix of the /opt/data volume dominates boot, and 02/03 (profile
          # reconcile + :11435 proxy seed) only run after it. A short window
          # false-reds a healthy-but-slow boot -- see run 26993003489, where
          # at T+2min boot was still in 01-hermes-setup and the proxy hadn't
          # seeded yet. Better to wait out a slow boot than cry wolf.
          probe() {
            docker exec hermes sh -c \
              'curl -fsS -m 5 -o /dev/null http://127.0.0.1:11435/health 2>/dev/null \
                 || wget -q -T 5 -O /dev/null http://127.0.0.1:11435/health 2>/dev/null' \
              2>/dev/null
          }
          health_ok=""
          for i in $(seq 1 120); do   # up to 120 * 5s = 600s (10min)
            running=$(docker inspect -f '{{.State.Running}}' hermes 2>/dev/null || echo false)
            restarting=$(docker inspect -f '{{.State.Restarting}}' hermes 2>/dev/null || echo false)
            if [ "$running" = "true" ] && [ "$restarting" = "false" ] \
               && probe; then
              health_ok=1
              echo "health-gate: container running and :11435 /health OK in-container (attempt $i / ~$((i*5))s)"
              break
            fi
            # Every ~30s show boot progress (last container log line) so a
            # slow-but-advancing boot is visibly distinct from a stuck one.
            if [ $((i % 6)) -eq 1 ]; then
              last=$(docker logs --tail 1 hermes 2>&1 | tr -d '\r' || true)
              echo "health-gate: not ready (attempt $i: running=$running restarting=$restarting) boot@[$last]"
            fi
            sleep 5
          done

          if [ -z "$health_ok" ]; then
            echo "health-gate: FAILED -- :11435 never came up within 600s. Diagnostics:"
            docker ps -a --filter name=hermes || true
            echo "--- network mode (host probe assumptions) ---"
            for c in hermes hermes-dashboard; do
              echo "$c: $(docker inspect -f '{{.HostConfig.NetworkMode}}' "$c" 2>/dev/null || echo '?')"
            done
            echo "--- claude-proxy supervise status (hermes) ---"
            docker exec hermes sh -c '/command/s6-svstat /run/service/claude-proxy 2>&1; /command/s6-svstat /run/service/claude-proxy/log 2>&1' 2>&1 || true
            echo "--- in-container :11435 /health probe (hermes) ---"
            docker exec hermes sh -c 'curl -fsS -m 5 http://127.0.0.1:11435/health 2>&1 || echo "(in-container probe failed)"' 2>&1 || true
            echo "--- full boot log (hermes, tail 200) ---"
            docker logs --tail 200 hermes 2>&1 || true
            echo "--- proxy lock contention markers (Resource busy / exit 111) ---"
            docker logs hermes 2>&1 | grep -iE 'resource busy|unable to lock|exitcode 111' || echo "(none -- no claude-proxy log-lock contention)"
            echo "--- did the boot hooks run? (markers in log) ---"
            docker logs hermes 2>&1 | grep -iE 'cont-init.*0[23]-|reconcile|seed-services' || echo "(no 02/03 hook markers seen -- boot likely never reached them)"
            echo "--- /opt/data/services (what 03 has to seed from) ---"
            docker exec hermes sh -c 'ls -la /opt/data/services 2>&1 || echo "(absent -- nothing to seed; proxy def missing from volume)"' 2>&1 || true
            echo "--- /run/service (what actually got seeded) ---"
            docker exec hermes sh -c 'ls -1 /run/service 2>&1' 2>&1 || true
            exit 1
          fi

          # ---- Registry match gate (Phase 2) ---------------------------
          # The "never run a bot twice" invariant, asserted post-health: the set
          # of per-profile gateways the SHARED container is actually running must
          # equal the registry's shared (non-isolated) prod set. A STRAY (a
          # running gateway absent from that set -- e.g. an isolated client that
          # should run in its own container, or a profile that escaped the
          # registry) or a MISSING shared bot fails the deploy with diagnostics,
          # so a Telegram-409 double-run or a silently-dark bot can't ship green.
          #
          # No-op when no registry is configured on the host: with
          # $HERMES_CLIENTS_REGISTRY unset (or its file absent) inside the
          # gateway container, the registry isn't the source of truth yet and we
          # skip the assertion entirely -- matching the boot gate's no-op
          # semantics so this is safe to merge before any registry is deployed.
          REG_IN=$(docker exec hermes sh -c 'echo "${HERMES_CLIENTS_REGISTRY:-}"' 2>/dev/null | tr -d '\r')
          if [ -z "$REG_IN" ] || ! docker exec hermes sh -c "test -f \"$REG_IN\"" 2>/dev/null; then
            echo "registry-gate(deploy): no registry configured in-container -- skipping match assertion"
          else
            echo "registry-gate(deploy): asserting running gateways match registry shared-prod set ($REG_IN)"
            # Expected = prod profiles that are NOT isolated (the shared set),
            # excluding the implicit root 'default' slot. Derived through the
            # same code the boot gate + generator use. Passed as a one-line
            # `python -c` so it nests cleanly inside the single-quoted sh -c and
            # keeps the YAML block-scalar valid (no column-1 heredoc body).
            PYSCRIPT='import os; from hermes_cli.clients import load_registry; from hermes_cli.compose_gen import isolated_profile_names; reg=load_registry(os.environ["HERMES_CLIENTS_REGISTRY"]); iso=set(isolated_profile_names(reg,"prod")); print(" ".join(sorted({c.profile for c in reg.for_env("prod") if c.profile not in iso and c.profile!="default"})))'
            expected=$(docker exec hermes /opt/hermes/.venv/bin/python -c "$PYSCRIPT" 2>/dev/null | tr -d '\r')
            # Running = gateway-<profile> slots reporting "up" (drop the root
            # default slot, which is always registered and not a registry bot).
            running=$(docker exec hermes sh -c '
              for s in /run/service/gateway-*; do
                [ -e "$s" ] || continue
                name=${s#/run/service/gateway-}
                [ "$name" = default ] && continue
                if /command/s6-svstat "$s" 2>/dev/null | grep -q "^up "; then
                  echo "$name"
                fi
              done' 2>/dev/null | sort -u | tr "\n" " " | sed "s/ *$//")
            exp_n=$(echo "$expected" | tr " " "\n" | sed "/^$/d" | sort -u | tr "\n" " " | sed "s/ *$//")
            run_n=$(echo "$running"  | tr " " "\n" | sed "/^$/d" | sort -u | tr "\n" " " | sed "s/ *$//")
            echo "registry-gate(deploy): expected shared-prod = [$exp_n]"
            echo "registry-gate(deploy): running gateways      = [$run_n]"
            if [ "$exp_n" != "$run_n" ]; then
              echo "registry-gate(deploy): FAILED -- running gateways do not match the registry shared-prod set."
              echo "--- strays (running but NOT in registry shared-prod; e.g. isolated client run twice, or unregistered) ---"
              for r in $run_n; do
                echo "$exp_n" | tr " " "\n" | grep -qx "$r" || echo "  STRAY: $r"
              done
              echo "--- missing (in registry shared-prod but NOT running) ---"
              for e in $exp_n; do
                echo "$run_n" | tr " " "\n" | grep -qx "$e" || echo "  MISSING: $e"
              done
              echo "--- all gateway-* slots + status ---"
              docker exec hermes sh -c 'for s in /run/service/gateway-*; do [ -e "$s" ] && printf "%s: " "${s#/run/service/}" && /command/s6-svstat "$s" 2>&1; done' 2>&1 || true
              echo "--- registry DRIFT: lines from this boot ---"
              docker logs hermes 2>&1 | grep -E "DRIFT:|registry-gate:" || echo "(no registry-gate boot markers)"
              exit 1
            fi
            echo "registry-gate(deploy): OK -- running gateways match the registry shared-prod set"
          fi

          echo "Deploy complete"
          REMOTE
