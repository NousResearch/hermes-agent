name: Deploy to Contabo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.HERMES_SSH_KEY }}
          HOST_KEY: ${{ secrets.HERMES_HOST_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$HOST_KEY" >> ~/.ssh/known_hosts
          # Keepalive prevents "client_loop: send disconnect: Broken pipe" when
          # the multi-minute `docker build` produces no output for a while (the
          # long `chmod -R`/`chown -R` stage-2 step). ServerAliveInterval=30 +
          # CountMax=120 tolerates ~60 min of silence before the client gives
          # up. See failed run actions/runs/26861301561.
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 \
              -o TCPKeepAlive=yes -o ConnectTimeout=30 \
              -i ~/.ssh/id_ed25519 root@5.189.159.195 'bash -se' <<'REMOTE'
          set -euo pipefail
          cd /opt/hermes/app
          git config --global --add safe.directory /opt/hermes/app
          git remote set-url origin https://github.com/adrozdenko/hermes-agent.git
          git fetch origin main
          git reset --hard origin/main
          # --progress=plain keeps a steady output stream during the build,
          # which also helps keep the SSH channel active.
          docker build --progress=plain -t hermes-agent:local .

          # ---- One-time, reversible proxy migration (Phase 3) ----------
          # The :11435 Claude proxy is now BAKED INTO THE IMAGE (the static
          # s6-rc service docker/s6-rc.d/claude-proxy execs
          # /opt/hermes/deploy/claude-proxy/claude_proxy.py). The old copy lived
          # on the data volume under $HERMES_HOME/services/claude-proxy and was
          # seeded into the scandir by 03-seed-data-services. If BOTH survive,
          # the image service and a volume re-seed would both bind :11435 and
          # collide -- so we retire the volume copy by renaming it to
          # claude-proxy.legacy BEFORE the new container boots. (03 also skips
          # 'claude-proxy' defensively, but renaming makes the image copy
          # unambiguously authoritative and leaves a trivial rollback: rename
          # .legacy back and redeploy the pre-bake image.)
          #
          # Idempotent: if the volume copy is already gone (re-deploy) we do
          # nothing; we never clobber an existing .legacy. Resolve the host
          # volume path from the running container's mount so we don't hardcode
          # ~/.hermes vs /opt/hermes/data.
          VOL_SRC=$(docker inspect -f \
            '{{range .Mounts}}{{if eq .Destination "/opt/data"}}{{.Source}}{{end}}{{end}}' \
            hermes 2>/dev/null || true)
          [ -n "$VOL_SRC" ] || VOL_SRC="$HOME/.hermes"
          LEGACY_SRC="$VOL_SRC/services/claude-proxy"
          LEGACY_DST="$VOL_SRC/services/claude-proxy.legacy"
          if [ -d "$LEGACY_SRC" ]; then
            if [ -e "$LEGACY_DST" ]; then
              echo "proxy-migration: $LEGACY_DST already exists -- removing now-redundant volume copy $LEGACY_SRC"
              rm -rf "$LEGACY_SRC"
            else
              echo "proxy-migration: retiring volume proxy -> $LEGACY_DST (image copy is now authoritative)"
              mv "$LEGACY_SRC" "$LEGACY_DST"
            fi
          else
            echo "proxy-migration: no volume claude-proxy to retire (already image-baked)"
          fi

          # ---- Lock the Claude proxy to the Hermes bot (self-gating) ----
          # Only Hermes may use the Claude subscription; client bots are
          # DeepSeek-direct and never touch :11435. Bootstrap (idempotent, in
          # the RUNNING container so it works regardless of image version):
          #   1. mint a "hermes" key into /opt/data/proxy/keys.json (0600)
          #   2. wire it INLINE as api_key into every :11435 provider block in
          #      /opt/data/config.yaml (the one spelling every runtime
          #      resolution path honors; never clobbers an existing key)
          #   3. write CLAUDE_PROXY_KEY into /opt/data/.env for ops visibility
          #   4. VERIFY: resolve the provider exactly the way the gateway does
          #      and confirm the key is attached
          # The fail-closed flip (docker-compose.prod.yml, ALLOW_ANON=0) is
          # applied ONLY when verification prints WIRED_OK. Any other outcome
          # deploys exactly as before (anon-on, bots unaffected) with a loud
          # warning — Hermes can never lose Claude to a half-applied cutover.
          WIRE_RESULT=$(docker exec -i -e HERMES_HOME=/opt/data -e HOME=/opt/data \
            hermes /command/s6-setuidgid hermes /opt/hermes/.venv/bin/python - <<'PYEOF' 2>&1 || true
          import json, os, secrets, sys
          import yaml

          ROOT = "/opt/data"
          MARKER = ":11435"
          keys_path = os.path.join(ROOT, "proxy", "keys.json")
          cfg_path = os.path.join(ROOT, "config.yaml")
          env_path = os.path.join(ROOT, ".env")

          def fail(reason):
              print(f"WIRED_FAIL {reason}")
              sys.exit(0)

          # 1. Mint (or reuse) the hermes tenant key.
          mapping = {}
          if os.path.isfile(keys_path):
              try:
                  data = json.loads(open(keys_path, encoding="utf-8").read())
                  if isinstance(data, dict):
                      mapping = {str(k): str(v) for k, v in data.items()}
              except Exception as e:
                  fail(f"keys-json-unreadable: {e}")
          key = next((k for k, v in mapping.items() if v == "hermes"), None)
          if key is None:
              key = "hk-" + secrets.token_urlsafe(32)
              mapping[key] = "hermes"
              os.makedirs(os.path.dirname(keys_path), exist_ok=True)
              tmp = keys_path + ".tmp"
              with open(tmp, "w", encoding="utf-8") as f:
                  f.write(json.dumps(mapping, indent=2, sort_keys=True) + "\n")
              os.chmod(tmp, 0o600)
              os.replace(tmp, keys_path)
              os.chmod(keys_path, 0o600)

          # 2. Wire the key inline into every :11435 provider block.
          if not os.path.isfile(cfg_path):
              fail("no-config-yaml")
          try:
              cfg = yaml.safe_load(open(cfg_path, encoding="utf-8").read())
          except Exception as e:
              fail(f"config-unparseable: {e}")
          if not isinstance(cfg, (dict, list)):
              fail("config-not-a-mapping")

          blocks = []
          def walk(o):
              if isinstance(o, dict):
                  bu = o.get("base_url")
                  if isinstance(bu, str) and MARKER in bu:
                      blocks.append(o)
                  for v in o.values():
                      walk(v)
              elif isinstance(o, list):
                  for v in o:
                      walk(v)
          walk(cfg)
          if not blocks:
              fail("no-proxy-provider-block-in-config")

          # The bootstrap is AUTHORITATIVE for the lock: a :11435 block whose
          # api_key isn't a keys.json-known tenant key (e.g. a pre-tenant-auth
          # placeholder the SDK required) is REPLACED with the hermes key, and
          # any key_env/api_key_env indirection on the block is dropped — after
          # the flip, only keys.json keys authenticate, so leaving an unknown
          # key in place would 401 Hermes. (Run #33 deferred on exactly this:
          # WIRED_FAIL runtime-resolved-unknown-key.) One-time backup of the
          # original config preserves rollback (yaml round-trip drops comments).
          changed = 0
          for b in blocks:
              cur = str(b.get("api_key") or "").strip()
              has_env = bool(str(b.get("key_env") or b.get("api_key_env") or "").strip())
              if cur in mapping and not has_env:
                  continue  # already a known tenant key, nothing to do
              backup = cfg_path + ".pre-proxy-lock.bak"
              if changed == 0 and not os.path.exists(backup):
                  import shutil
                  shutil.copy2(cfg_path, backup)
              if cur and cur not in mapping:
                  print(f"replacing unknown api_key (len={len(cur)}) on {b.get('base_url')}")
              b["api_key"] = key
              for stale in ("key_env", "api_key_env"):
                  if stale in b:
                      del b[stale]
                      print(f"dropped {stale} indirection on {b.get('base_url')}")
              changed += 1
          if changed:
              tmp = cfg_path + ".tmp"
              with open(tmp, "w", encoding="utf-8") as f:
                  f.write(yaml.safe_dump(cfg, sort_keys=False, allow_unicode=True))
              os.chmod(tmp, 0o600)
              os.replace(tmp, cfg_path)

          # 3. CLAUDE_PROXY_KEY into .env (ops visibility; preserves other lines).
          lines, found = [], False
          if os.path.isfile(env_path):
              for line in open(env_path, encoding="utf-8").read().splitlines():
                  if line.strip().startswith("CLAUDE_PROXY_KEY="):
                      lines.append(f"CLAUDE_PROXY_KEY={key}"); found = True
                  else:
                      lines.append(line)
          if not found:
              lines.append(f"CLAUDE_PROXY_KEY={key}")
          with open(env_path, "w", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          os.chmod(env_path, 0o600)

          # 4. Verify every block now carries a usable key, then resolve the
          #    provider the way the gateway does and confirm the key sticks.
          for b in blocks:
              if not (str(b.get("api_key") or "").strip()
                      or str(b.get("key_env") or b.get("api_key_env") or "").strip()):
                  fail("block-still-unkeyed")
          try:
              sys.path.insert(0, "/opt/hermes")
              from hermes_cli.runtime_provider import resolve_runtime_provider
              rt = resolve_runtime_provider()
              if MARKER in str(rt.get("base_url") or ""):
                  rk = str(rt.get("api_key") or "")
                  src = rt.get("source")
                  if not rk or rk == "no-key-required":
                      fail(f"runtime-resolution-dropped-key (source={src})")
                  if rk not in mapping:
                      # Key came from somewhere other than the wired config
                      # (e.g. a credential-pool entry) — surface where.
                      fail(f"runtime-resolved-unknown-key (source={src}, len={len(rk)})")
              # Primary not on :11435 → proxy is in the fallback chain, whose
              # inline api_key path is exercised by the repo test suite.
          except SystemExit:
              raise
          except Exception as e:
              fail(f"runtime-resolution-error: {type(e).__name__}: {e}")

          print(f"wired={changed} blocks={len(blocks)}")
          print("WIRED_OK")
          PYEOF
          )
          echo "$WIRE_RESULT"
          COMPOSE_FILES="-f /opt/hermes/docker-compose.yml"
          PROXY_LOCKED=""
          if printf '%s' "$WIRE_RESULT" | grep -q '^WIRED_OK$'; then
            echo "proxy-lock: hermes key wired + verified -- enforcing fail-closed (ALLOW_ANON=0)"
            COMPOSE_FILES="$COMPOSE_FILES -f /opt/hermes/app/docker-compose.prod.yml"
            PROXY_LOCKED=1
          else
            echo "proxy-lock: WARN wiring not verified -- deploying with anon-on (bots unaffected)."
            echo "proxy-lock: WARN fix the cause above; the lock will engage on the next deploy."
          fi
          docker compose $COMPOSE_FILES up -d

          # ---- Post-deploy health gate ---------------------------------
          # A successful `up -d` only means the container was *created*, not
          # that the bots can actually answer. The recurring outage mode is
          # the container booting WITHOUT the :11435 Claude proxy: its s6 def
          # lives on the volume and 03-seed-data-services re-seeds it into the
          # tmpfs scandir on boot. When that reseed misses, the gateway loses
          # its Claude provider and the bots go dark -- yet the deploy still
          # reported green. Gate on the two server-side signals that map
          # directly to that failure: the container is actually Running (not
          # restart-looping) and the proxy answers GET /health on :11435.
          #
          # IMPORTANT: probe from INSIDE the gateway container, not the host.
          # The proxy binds 127.0.0.1:11435 (container-local loopback; see
          # deploy/claude-proxy/claude_proxy.py), and this host runs the
          # containers on a BRIDGE network -- the dashboard publishes
          # 127.0.0.1:9119->9119, which host networking cannot do. A host-side
          # `curl 127.0.0.1:11435` therefore never connects even when the proxy
          # is healthy and the bots (which live in this same container) reach it
          # fine. `docker exec hermes` runs the probe in the container's netns,
          # testing the exact path the bots use. This was a false-negative in
          # run 26998127716: the proxy logged "Proxy ready" but the host probe
          # failed for the full 10min.
          #
          # Timeout is generous (10min): on this host the stage2 ownership
          # fix of the /opt/data volume dominates boot, and 02/03 (profile
          # reconcile + :11435 proxy seed) only run after it. A short window
          # false-reds a healthy-but-slow boot -- see run 26993003489, where
          # at T+2min boot was still in 01-hermes-setup and the proxy hadn't
          # seeded yet. Better to wait out a slow boot than cry wolf.
          probe() {
            docker exec hermes sh -c \
              'curl -fsS -m 5 -o /dev/null http://127.0.0.1:11435/health 2>/dev/null \
                 || wget -q -T 5 -O /dev/null http://127.0.0.1:11435/health 2>/dev/null' \
              2>/dev/null
          }
          health_ok=""
          for i in $(seq 1 120); do   # up to 120 * 5s = 600s (10min)
            running=$(docker inspect -f '{{.State.Running}}' hermes 2>/dev/null || echo false)
            restarting=$(docker inspect -f '{{.State.Restarting}}' hermes 2>/dev/null || echo false)
            if [ "$running" = "true" ] && [ "$restarting" = "false" ] \
               && probe; then
              health_ok=1
              echo "health-gate: container running and :11435 /health OK in-container (attempt $i / ~$((i*5))s)"
              break
            fi
            # Every ~30s show boot progress (last container log line) so a
            # slow-but-advancing boot is visibly distinct from a stuck one.
            if [ $((i % 6)) -eq 1 ]; then
              last=$(docker logs --tail 1 hermes 2>&1 | tr -d '\r' || true)
              echo "health-gate: not ready (attempt $i: running=$running restarting=$restarting) boot@[$last]"
            fi
            sleep 5
          done

          if [ -z "$health_ok" ]; then
            echo "health-gate: FAILED -- :11435 never came up within 600s. Diagnostics:"
            docker ps -a --filter name=hermes || true
            echo "--- network mode (host probe assumptions) ---"
            for c in hermes hermes-dashboard; do
              echo "$c: $(docker inspect -f '{{.HostConfig.NetworkMode}}' "$c" 2>/dev/null || echo '?')"
            done
            echo "--- claude-proxy supervise status (hermes) ---"
            docker exec hermes sh -c '/command/s6-svstat /run/service/claude-proxy 2>&1; /command/s6-svstat /run/service/claude-proxy/log 2>&1' 2>&1 || true
            echo "--- in-container :11435 /health probe (hermes) ---"
            docker exec hermes sh -c 'curl -fsS -m 5 http://127.0.0.1:11435/health 2>&1 || echo "(in-container probe failed)"' 2>&1 || true
            echo "--- full boot log (hermes, tail 200) ---"
            docker logs --tail 200 hermes 2>&1 || true
            echo "--- proxy lock contention markers (Resource busy / exit 111) ---"
            docker logs hermes 2>&1 | grep -iE 'resource busy|unable to lock|exitcode 111' || echo "(none -- no claude-proxy log-lock contention)"
            echo "--- did the boot hooks run? (markers in log) ---"
            docker logs hermes 2>&1 | grep -iE 'cont-init.*0[23]-|reconcile|seed-services' || echo "(no 02/03 hook markers seen -- boot likely never reached them)"
            echo "--- /opt/data/services (what 03 has to seed from) ---"
            docker exec hermes sh -c 'ls -la /opt/data/services 2>&1 || echo "(absent -- nothing to seed; proxy def missing from volume)"' 2>&1 || true
            echo "--- /run/service (what actually got seeded) ---"
            docker exec hermes sh -c 'ls -1 /run/service 2>&1' 2>&1 || true
            exit 1
          fi

          # ---- Proxy lock gate (only when the fail-closed flip applied) --
          # Proves enforcement end-to-end without spending tokens:
          #   * /health reports allow_anon=false and >=1 key loaded
          #   * a keyless completion request gets 401
          #   * a keyed request with an empty body gets 400 ("No messages"),
          #     i.e. it passed auth — proving the hermes key authenticates
          # Failure = red deploy. Note Hermes itself keeps answering either
          # way: its gateway has the key wired (verified pre-flip), and even a
          # misconfigured proxy only pushes it onto the DeepSeek fallback.
          if [ -n "$PROXY_LOCKED" ]; then
            LOCK_CHECK=$(docker exec -i hermes python3 - <<'PYEOF' 2>&1 || true
          import json, urllib.request, urllib.error

          BASE = "http://127.0.0.1:11435"

          def fail(reason):
              print(f"LOCK_FAIL {reason}")
              raise SystemExit(0)

          try:
              health = json.loads(urllib.request.urlopen(BASE + "/health", timeout=5).read())
          except Exception as e:
              fail(f"health-unreachable: {e}")
          auth = health.get("auth", {})
          if auth.get("allow_anon") is not False:
              fail(f"allow_anon-still-on: {auth}")
          if int(auth.get("keys_loaded") or 0) < 1:
              fail(f"no-keys-loaded: {auth}")

          key = None
          try:
              data = json.loads(open("/opt/data/proxy/keys.json", encoding="utf-8").read())
              key = next((k for k, v in data.items() if v == "hermes"), None)
          except Exception as e:
              fail(f"keys-json-unreadable: {e}")
          if not key:
              fail("no-hermes-key-in-keys-json")

          body = json.dumps({"messages": []}).encode()
          def post(headers):
              req = urllib.request.Request(
                  BASE + "/v1/chat/completions", data=body,
                  headers={"Content-Type": "application/json", **headers}, method="POST")
              try:
                  return urllib.request.urlopen(req, timeout=5).status
              except urllib.error.HTTPError as e:
                  return e.code

          anon_status = post({})
          if anon_status != 401:
              fail(f"keyless-request-not-401: got {anon_status}")
          keyed_status = post({"Authorization": f"Bearer {key}"})
          if keyed_status == 401:
              fail("hermes-key-rejected-401")
          if keyed_status != 400:
              fail(f"keyed-empty-body-expected-400: got {keyed_status}")
          print("LOCK_OK")
          PYEOF
          )
            echo "$LOCK_CHECK"
            if printf '%s' "$LOCK_CHECK" | grep -q '^LOCK_OK$'; then
              echo "proxy-lock: ENFORCED -- only the Hermes key can use the Claude proxy"
            else
              echo "proxy-lock: FAILED -- enforcement not verified (see LOCK_FAIL above)."
              echo "proxy-lock: Hermes still answers (key wired pre-flip; DeepSeek fallback as backstop)."
              docker exec hermes sh -c 'curl -fsS -m 5 http://127.0.0.1:11435/health 2>&1 || true'
              exit 1
            fi
          fi

          # ---- Fleet broker: give Hermes bounded host control ----------
          # Hermes owns the fleet but lives in a container. This provisions an
          # UNPRIVILEGED hermes-ops host user whose SSH key is forced to run ONLY
          # the allowlisted broker (scripts/fleet_broker.py) — bounded docker /
          # compose ops, never an arbitrary shell. The keypair is generated on
          # the host (no manual key handling); the private key is dropped onto
          # the gateway volume so the in-container `hermes fleet` client can
          # reach the host over loopback ssh. Entirely additive and best-effort:
          # any failure warns and the deploy proceeds (bots are unaffected).
          (
            set +e
            FLEET_HOST_DIR=/opt/hermes/fleet
            OPS_USER=hermes-ops
            OPS_HOME=/home/$OPS_USER
            KEYDIR="$FLEET_HOST_DIR/keys"

            # 1. Unprivileged ops user in the docker group (no sudo). A real
            #    shell is required for sshd to exec the forced command; the
            #    forced command + restrictions are what bound it, not the shell.
            if ! id "$OPS_USER" >/dev/null 2>&1; then
              useradd -m -s /bin/bash -G docker "$OPS_USER" && echo "fleet: created $OPS_USER"
            else
              usermod -aG docker "$OPS_USER" 2>/dev/null || true
            fi

            # 2. Install the broker (root-owned, ops cannot modify its own
            #    allowlist) + the host-path config it reads.
            install -d -m 0755 "$FLEET_HOST_DIR"
            install -m 0755 /opt/hermes/app/scripts/fleet_broker.py "$FLEET_HOST_DIR/fleet_broker.py"
            cat > "$FLEET_HOST_DIR/fleet.conf" <<CONF
          VOL_SRC=$VOL_SRC
          GATEWAY_CONTAINER=hermes
          CLIENTS_COMPOSE=$VOL_SRC/docker-compose.clients.yml
          CONF
            chmod 0644 "$FLEET_HOST_DIR/fleet.conf"
            touch "$FLEET_HOST_DIR/audit.log"
            chown "$OPS_USER" "$FLEET_HOST_DIR/audit.log"; chmod 0640 "$FLEET_HOST_DIR/audit.log"

            # 3. Generate the broker keypair once (idempotent across deploys).
            install -d -m 0700 "$KEYDIR"
            if [ ! -f "$KEYDIR/id_ed25519" ]; then
              ssh-keygen -t ed25519 -N '' -C 'hermes-fleet' -f "$KEYDIR/id_ed25519" >/dev/null \
                && echo "fleet: generated broker keypair"
            fi

            # 4. Force the key to the broker. Reset authorized_keys each deploy
            #    (single key) so the restrictions are always current.
            install -d -m 0700 "$OPS_HOME/.ssh"; chown "$OPS_USER:$OPS_USER" "$OPS_HOME/.ssh"
            printf '%s %s\n' \
              "command=\"$FLEET_HOST_DIR/fleet_broker.py\",no-agent-forwarding,no-port-forwarding,no-X11-forwarding,no-user-rc,no-pty" \
              "$(cat "$KEYDIR/id_ed25519.pub")" > "$OPS_HOME/.ssh/authorized_keys"
            chown "$OPS_USER:$OPS_USER" "$OPS_HOME/.ssh/authorized_keys"
            chmod 0600 "$OPS_HOME/.ssh/authorized_keys"

            # 5. Hand the private key + host fingerprint to the container (the
            #    same UID the gateway runs as, resolved live).
            CUID=$(docker exec hermes id -u hermes 2>/dev/null || echo 10000)
            CGID=$(docker exec hermes id -g hermes 2>/dev/null || echo 10000)
            VOL_FLEET="$VOL_SRC/fleet"
            install -d -m 0700 "$VOL_FLEET"
            cp "$KEYDIR/id_ed25519" "$VOL_FLEET/id_ed25519"; chmod 0600 "$VOL_FLEET/id_ed25519"
            # Pin the host's REAL public host keys (all types) for 127.0.0.1,
            # read straight from /etc/ssh/*.pub — deterministic, no keyscan race
            # and no single-type mismatch under StrictHostKeyChecking=yes.
            : > "$VOL_FLEET/known_hosts"
            for hk in /etc/ssh/ssh_host_*_key.pub; do
              [ -f "$hk" ] || continue
              printf '127.0.0.1 %s\n' "$(cut -d' ' -f1-2 "$hk")" >> "$VOL_FLEET/known_hosts"
            done
            if [ ! -s "$VOL_FLEET/known_hosts" ]; then
              ssh-keyscan -H 127.0.0.1 >> "$VOL_FLEET/known_hosts" 2>/dev/null
            fi
            if [ ! -s "$VOL_FLEET/known_hosts" ]; then
              echo "fleet: WARN no host key found for 127.0.0.1 -- is sshd on :22?"
            fi
            chmod 0644 "$VOL_FLEET/known_hosts"
            chown -R "$CUID:$CGID" "$VOL_FLEET"

            # 6a. End-to-end proof: the EXACT path Hermes uses (in-container
            #     client → volume key → loopback ssh → broker → docker ps).
            #     Capture stderr so a failure is diagnosable from the deploy log.
            FLEET_OUT=$(docker exec -u hermes -e HOME=/opt/data hermes \
                 /opt/hermes/.venv/bin/python -m hermes_cli.fleet ps 2>&1)
            if [ $? -eq 0 ]; then
              echo "fleet: ENABLED -- in-container client reached the host broker (ps OK)"
            else
              echo "fleet: WARN in-container client could not reach the broker (fleet ops unavailable; bots unaffected)"
              echo "fleet: probe error >>> $(printf '%s' "$FLEET_OUT" | tr '\n' '|' | cut -c1-600)"
            fi
            # 6b. Negative proof: an arbitrary command must be refused.
            DENY=$(ssh -i "$KEYDIR/id_ed25519" -o StrictHostKeyChecking=accept-new \
                     -o BatchMode=yes -o ConnectTimeout=10 "$OPS_USER@127.0.0.1" \
                     'id; cat /etc/shadow' 2>&1)
            if printf '%s' "$DENY" | grep -q 'denied'; then
              echo "fleet: broker correctly DENIES non-allowlisted commands"
            else
              echo "fleet: WARN broker did not clearly deny an arbitrary command -- investigate: $DENY"
            fi
          ) || echo "fleet: WARN broker bootstrap hit an error (continuing; bots unaffected)"

          # ---- Registry match gate (Phase 2) ---------------------------
          # The "never run a bot twice" invariant, asserted post-health: the set
          # of per-profile gateways the SHARED container is actually running must
          # equal the registry's shared (non-isolated) prod set. A STRAY (a
          # running gateway absent from that set -- e.g. an isolated client that
          # should run in its own container, or a profile that escaped the
          # registry) or a MISSING shared bot fails the deploy with diagnostics,
          # so a Telegram-409 double-run or a silently-dark bot can't ship green.
          #
          # No-op when no registry is configured on the host: with
          # $HERMES_CLIENTS_REGISTRY unset (or its file absent) inside the
          # gateway container, the registry isn't the source of truth yet and we
          # skip the assertion entirely -- matching the boot gate's no-op
          # semantics so this is safe to merge before any registry is deployed.
          REG_IN=$(docker exec hermes sh -c 'echo "${HERMES_CLIENTS_REGISTRY:-}"' 2>/dev/null | tr -d '\r')
          if [ -z "$REG_IN" ] || ! docker exec hermes sh -c "test -f \"$REG_IN\"" 2>/dev/null; then
            echo "registry-gate(deploy): no registry configured in-container -- skipping match assertion"
          else
            echo "registry-gate(deploy): asserting running gateways match registry shared-prod set ($REG_IN)"
            # Expected = prod profiles that are NOT isolated (the shared set),
            # excluding the implicit root 'default' slot. Derived through the
            # same code the boot gate + generator use. Passed as a one-line
            # `python -c` so it nests cleanly inside the single-quoted sh -c and
            # keeps the YAML block-scalar valid (no column-1 heredoc body).
            PYSCRIPT='import os; from hermes_cli.clients import load_registry; from hermes_cli.compose_gen import isolated_profile_names; reg=load_registry(os.environ["HERMES_CLIENTS_REGISTRY"]); iso=set(isolated_profile_names(reg,"prod")); print(" ".join(sorted({c.profile for c in reg.for_env("prod") if c.profile not in iso and c.profile!="default"})))'
            expected=$(docker exec hermes /opt/hermes/.venv/bin/python -c "$PYSCRIPT" 2>/dev/null | tr -d '\r')
            # Running = gateway-<profile> slots reporting "up" (drop the root
            # default slot, which is always registered and not a registry bot).
            running=$(docker exec hermes sh -c '
              for s in /run/service/gateway-*; do
                [ -e "$s" ] || continue
                name=${s#/run/service/gateway-}
                [ "$name" = default ] && continue
                if /command/s6-svstat "$s" 2>/dev/null | grep -q "^up "; then
                  echo "$name"
                fi
              done' 2>/dev/null | sort -u | tr "\n" " " | sed "s/ *$//")
            exp_n=$(echo "$expected" | tr " " "\n" | sed "/^$/d" | sort -u | tr "\n" " " | sed "s/ *$//")
            run_n=$(echo "$running"  | tr " " "\n" | sed "/^$/d" | sort -u | tr "\n" " " | sed "s/ *$//")
            echo "registry-gate(deploy): expected shared-prod = [$exp_n]"
            echo "registry-gate(deploy): running gateways      = [$run_n]"
            if [ "$exp_n" != "$run_n" ]; then
              echo "registry-gate(deploy): FAILED -- running gateways do not match the registry shared-prod set."
              echo "--- strays (running but NOT in registry shared-prod; e.g. isolated client run twice, or unregistered) ---"
              for r in $run_n; do
                echo "$exp_n" | tr " " "\n" | grep -qx "$r" || echo "  STRAY: $r"
              done
              echo "--- missing (in registry shared-prod but NOT running) ---"
              for e in $exp_n; do
                echo "$run_n" | tr " " "\n" | grep -qx "$e" || echo "  MISSING: $e"
              done
              echo "--- all gateway-* slots + status ---"
              docker exec hermes sh -c 'for s in /run/service/gateway-*; do [ -e "$s" ] && printf "%s: " "${s#/run/service/}" && /command/s6-svstat "$s" 2>&1; done' 2>&1 || true
              echo "--- registry DRIFT: lines from this boot ---"
              docker logs hermes 2>&1 | grep -E "DRIFT:|registry-gate:" || echo "(no registry-gate boot markers)"
              exit 1
            fi
            echo "registry-gate(deploy): OK -- running gateways match the registry shared-prod set"
          fi

          echo "Deploy complete"
          REMOTE
