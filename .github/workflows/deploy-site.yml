name: Deploy Site

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'skills/**'
      - 'optional-skills/**'
      - 'supabase/**'
      - 'vercel.json'
      - 'website/vercel.json'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  supabase-migrations:
    if: github.repository == 'NousResearch/hermes-agent' && github.ref == 'refs/heads/main' && vars.SUPABASE_MIGRATIONS_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: supabase-production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check for committed migrations
        id: migrations
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          migrations=(supabase/migrations/*.sql)
          if [ "${#migrations[@]}" -eq 0 ]; then
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Supabase migration SQL files are committed; skipping db push."
          else
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
            printf 'Found %s migration(s).\n' "${#migrations[@]}"
          fi

      - name: Validate Supabase deployment secrets
        if: steps.migrations.outputs.has_migrations == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name secret is not configured"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - uses: supabase/setup-cli@df56b21da46c98abb12a9804e4fb1f657773e333  # v2
        if: steps.migrations.outputs.has_migrations == 'true'
        with:
          version: ${{ vars.SUPABASE_CLI_VERSION || 'latest' }}

      - name: Link Supabase project
        if: steps.migrations.outputs.has_migrations == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push Supabase migrations
        if: steps.migrations.outputs.has_migrations == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          supabase db push

  deploy-vercel:
    needs: supabase-migrations
    if: >-
      always() &&
      github.repository == 'NousResearch/hermes-agent' &&
      (github.event_name == 'release' || github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (needs.supabase-migrations.result == 'success' || needs.supabase-migrations.result == 'skipped')
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Trigger Vercel Deploy
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_DEPLOY_HOOK:-}" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK secret is not configured"
            exit 1
          fi
          curl --fail-with-body --show-error --silent -X POST "$VERCEL_DEPLOY_HOOK"

  deploy-docs:
    if: github.repository == 'NousResearch/hermes-agent' && github.event_name != 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Install PyYAML for skill extraction
        run: pip install pyyaml==6.0.2 httpx==0.28.1

      - name: Extract skill metadata for dashboard
        run: python3 website/scripts/extract-skills.py

      - name: Regenerate per-skill docs pages + catalogs
        run: python3 website/scripts/generate-skill-docs.py

      - name: Build skills index (if not already present)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f website/static/api/skills-index.json ]; then
            python3 scripts/build_skills_index.py || echo "Skills index build failed (non-fatal)"
          fi

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build Docusaurus
        run: npm run build
        working-directory: website

      - name: Stage deployment
        run: |
          mkdir -p _site/docs
          cp -r website/build/* _site/docs/
          # llms.txt / llms-full.txt are also published at the site root
          # (https://hermes-agent.nousresearch.com/llms.txt) because some
          # agents and IDE plugins probe the classic root-level path rather
          # than /docs/llms.txt. Same file, two URLs, one source of truth.
          if [ -f website/build/llms.txt ]; then
            cp website/build/llms.txt _site/llms.txt
          fi
          if [ -f website/build/llms-full.txt ]; then
            cp website/build/llms-full.txt _site/llms-full.txt
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
