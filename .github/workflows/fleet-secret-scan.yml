# Fleet-added (Apollo/greploop posture-B floor). NOT upstream — do not expect on NousResearch/hermes-agent.
# Provides the `secret_scan` deterministic-floor component. DIFF-SCOPED on PRs: scans only the files the
# PR changed, NOT full history (the fork inherits ~768 generic-api-key false positives in upstream test
# fixtures/docs — a full-tree scan would pin this RED forever).
#
# HARDENED 2026-06-20 (greploop phase-3): the old `--log-opts=base..head` range was fragile —
# `pull_request.base.sha` is the base-branch TIP, not the merge-base, so the commit range could resolve
# empty/wrong and silently pass a real leak (observed in the A4 actuator drill: secret_scan=success on a
# PR that planted a key). Fix: compute the merge-base, take the exact CHANGED FILE LIST, and scan those
# files directly with `--no-git` (content scan, range-independent). A leak in any changed file → RED,
# regardless of how GitHub resolves SHAs.
name: Fleet Secret Scan (gitleaks)

on:
  pull_request:
  push:
    branches: [main]
  # merge_group: required by the merge queue — the batched candidate must get a
  # secret_scan result or the queue wedges. (Runs full-tree diff-scoped scan.)
  merge_group:

permissions:
  contents: read

concurrency:
  group: fleet-secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret_scan:
    name: secret_scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VER=8.18.4
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o gl.tgz
          tar xzf gl.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Compute changed files (merge-base diff, range-independent)
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi
          # Ensure both SHAs are present locally (PRs from same repo: fetch the base too).
          git fetch -q origin "$BASE_SHA" 2>/dev/null || true
          git fetch -q origin "$HEAD_SHA" 2>/dev/null || true
          FULL_SCAN=0
          if git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null && git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null; then
            # MERGE-BASE so the diff is exactly what the PR introduces, never a divergent range.
            MB="$(git merge-base "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo "$BASE_SHA")"
            git diff --name-only --diff-filter=ACMR "$MB" "$HEAD_SHA" > /tmp/changed.txt || true
          else
            # New branch / all-zero before / missing base: the diff-vs-(HEAD~1) fallback would
            # scan only the LAST commit of a multi-commit push and miss a key added in an earlier
            # commit of the same push (Greptile #74). FALL BACK TO A FULL-CONTENT SCAN of HEAD_SHA
            # instead — every tracked file at the head, no range assumption.
            echo "base unavailable -> FULL-CONTENT scan of HEAD_SHA"
            FULL_SCAN=1
            git ls-tree -r --name-only "$HEAD_SHA" > /tmp/changed.txt || true
          fi
          echo "full_scan=$FULL_SCAN" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "----- files to scan ($(wc -l < /tmp/changed.txt)) -----"; head -50 /tmp/changed.txt

      - name: Gitleaks (scan changed files at HEAD_SHA — range-independent)
        run: |
          if [ ! -s /tmp/changed.txt ]; then
            echo "no files to scan; pass"
            exit 0
          fi
          HEAD_SHA="${{ steps.changed.outputs.head_sha }}"
          # Materialize file BYTES from HEAD_SHA itself (git show), NOT the working tree — the PR
          # checkout is refs/pull/N/merge (the prospective merge commit), whose bytes can differ
          # from the PR branch tip (Greptile #74). git show HEAD_SHA:<path> is the true PR content.
          SCRATCH="$(mktemp -d)"
          trap 'rm -rf "$SCRATCH"' EXIT   # guarantee cleanup; no lingering unredacted content
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            mkdir -p "$SCRATCH/$(dirname "$f")"
            git show "${HEAD_SHA}:$f" > "$SCRATCH/$f" 2>/dev/null || true
          done < /tmp/changed.txt
          echo "scanning $(find "$SCRATCH" -type f | wc -l) file(s) at HEAD_SHA with gitleaks --no-git"
          # Use the repo's allowlist config (fake test fixtures / doc placeholders).
          # gitleaks discovers .gitleaks.toml from the TARGET PATH, not CWD, and the
          # SCRATCH dir has none — so pass it explicitly or the allowlist is dead
          # (a whole-file re-scan of a touched test file would then trip on its fakes).
          gitleaks detect \
            --source "$SCRATCH" \
            --config "$GITHUB_WORKSPACE/.gitleaks.toml" \
            --no-git \
            --no-banner \
            --redact \
            --exit-code 1
