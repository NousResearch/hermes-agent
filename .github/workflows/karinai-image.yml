name: Build KarinAI agent image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - docker/**
      - karinai/**
      - agent/**
      - gateway/**
      - hermes_cli/**
      - run_agent.py
      - pyproject.toml
      - uv.lock
      - package.json
      - package-lock.json
      - web/**
      - ui-tui/**
      - .github/workflows/karinai-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: karinai-agent-image-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_NAME: ghcr.io/bambak-org/karinai-agent

jobs:
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:main
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/Bambak-org/karinai-agent
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Smoke test image
        env:
          SMOKE_IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          set -euo pipefail
          docker run --rm --entrypoint python3 "$SMOKE_IMAGE" -c "from karinai.runtime.config import ManagedRuntimeConfig; from karinai.runtime.tool_policy import beta_policy_summary; assert beta_policy_summary()['mode'] == 'beta'; print('karinai-agent image ok')"

      - name: Push commit image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: docker push "${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Push main image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: docker push "${IMAGE_NAME}:main"
