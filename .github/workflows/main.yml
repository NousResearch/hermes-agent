name: Hermes Agent CI/CD

on:
  schedule:
    - cron: '5 19 * * 6'      # 北京时间周日 03:05
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream (official) repository
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit --allow-unrelated-histories || true
          if [ $? -eq 0 ]; then
            git push origin main
          else
            echo "Merge conflict detected. Please resolve manually."
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/hermes-agent:latest
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/hermes-agent:build-${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
          # 💡 虽然Dockerfile不跑测试，但为了符合标准做法，可以传入：
          # >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>
          build-args: |
            # 这个参数会传给Dockerfile，虽然当前Dockerfile可能用不到，
            # 但很多标准镜像（如Node.js）会读取 SKIP_TEST 或 CI 来跳过测试
            SKIP_TESTS=true
            # 如果是Python项目，也可以传 NO_TEST=True
