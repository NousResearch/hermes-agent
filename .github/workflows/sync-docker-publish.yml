name: Sync Docker Publish

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'

  schedule:
    - cron: '30 0 * * *' # Todos los días a las 00:30 UTC

  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/hermes-agent

jobs:
  docker:
    runs-on: ubuntu-latest

    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # Necesario para construir imágenes arm64 desde runners amd64
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------------------------------------------------------
      # Publica imágenes de rama:
      # - main    -> IMAGE:main + IMAGE:sha-xxxxxxx
      # - develop -> IMAGE:develop + IMAGE:sha-xxxxxxx
      # ---------------------------------------------------------
      - name: Publish branch image
        if: startsWith(github.ref, 'refs/heads/')
        shell: bash
        run: |
          set -euo pipefail

          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          SHA_SHORT="$(git rev-parse --short HEAD)"

          case "${BRANCH_NAME}" in
            main|develop)
              echo "Publicando imagen ${BRANCH_NAME} para commit ${GITHUB_SHA}"
              ;;
            *)
              echo "Rama no publicable: ${BRANCH_NAME}"
              exit 0
              ;;
          esac

          if [ ! -f "Dockerfile" ]; then
            echo "No existe Dockerfile en la raíz de la rama ${BRANCH_NAME}. No se puede construir la imagen."
            exit 1
          fi

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file Dockerfile \
            --tag "${IMAGE_NAME}:${BRANCH_NAME}" \
            --tag "${IMAGE_NAME}:sha-${SHA_SHORT}" \
            --label "org.opencontainers.image.title=hermes-agent" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            .

      # ---------------------------------------------------------
      # Publica tags:
      # - Crea imágenes de tags nuevos v*
      # - Omite tags cuyo commit no tenga Dockerfile en la raíz
      # - Actualiza imágenes de tags v* si el tag Git cambió de commit
      # - Ignora tags que ya estén correctamente publicados
      # - Actualiza latest al último tag v* publicable según sort -V
      #
      # Se ejecuta en:
      # - push de tag v*
      # - push a main/develop
      # - schedule
      # - workflow_dispatch
      # ---------------------------------------------------------
      - name: Publish missing or updated version tags
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          github.ref == 'refs/heads/main' ||
          github.ref == 'refs/heads/develop' ||
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          echo "Evento: ${GITHUB_EVENT_NAME}"
          echo "Ref: ${GITHUB_REF}"
          echo "Ref name: ${GITHUB_REF_NAME}"
          echo "SHA: ${GITHUB_SHA}"

          image_exists() {
            local ref="$1"
            docker buildx imagetools inspect "${ref}" >/dev/null 2>&1
          }

          image_digest() {
            local ref="$1"
            docker buildx imagetools inspect "${ref}" \
              | awk '/^Digest:/ {print $2; exit}'
          }

          tag_has_dockerfile() {
            local commit="$1"
            git cat-file -e "${commit}:Dockerfile" 2>/dev/null
          }

          build_image_for_tag() {
            local tag="$1"
            local commit="$2"
            local sha_short="$3"

            echo "Construyendo imagen para tag ${tag}, commit ${commit}"

            if ! [[ "${tag}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
              echo "El tag Git '${tag}' no es válido como tag Docker. Se omite."
              return 0
            fi

            if ! tag_has_dockerfile "${commit}"; then
              echo "El tag ${tag}, commit ${commit}, no contiene Dockerfile en la raíz. Se omite."
              return 0
            fi

            git checkout --force "${commit}"
            git clean -fdx

            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --file Dockerfile \
              --tag "${IMAGE_NAME}:${tag}" \
              --tag "${IMAGE_NAME}:sha-${sha_short}" \
              --label "org.opencontainers.image.title=hermes-agent" \
              --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
              --label "org.opencontainers.image.version=${tag}" \
              --label "org.opencontainers.image.revision=${commit}" \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              --push \
              .
          }

          publish_tag_from_existing_sha_image() {
            local tag="$1"
            local sha_short="$2"

            echo "Actualizando ${IMAGE_NAME}:${tag} desde ${IMAGE_NAME}:sha-${sha_short}"

            docker buildx imagetools create \
              --tag "${IMAGE_NAME}:${tag}" \
              "${IMAGE_NAME}:sha-${sha_short}"
          }

          publish_latest_from_tag() {
            local tag="$1"

            echo "Actualizando ${IMAGE_NAME}:latest desde ${IMAGE_NAME}:${tag}"

            docker buildx imagetools create \
              --tag "${IMAGE_NAME}:latest" \
              "${IMAGE_NAME}:${tag}"
          }

          mapfile -t TAGS < <(git tag -l 'v*' | sort -V)

          if [ "${#TAGS[@]}" -eq 0 ]; then
            echo "No hay tags v* que publicar."
            exit 0
          fi

          mapfile -t PUBLISHABLE_TAGS < <(
            for TAG in "${TAGS[@]}"; do
              COMMIT="$(git rev-list -n 1 "${TAG}")"

              if git cat-file -e "${COMMIT}:Dockerfile" 2>/dev/null; then
                echo "${TAG}"
              else
                echo "Se omite ${TAG}: el commit ${COMMIT} no contiene Dockerfile en la raíz." >&2
              fi
            done
          )

          if [ "${#PUBLISHABLE_TAGS[@]}" -eq 0 ]; then
            echo "No hay tags v* con Dockerfile que publicar."
            exit 0
          fi

          LATEST_TAG="${PUBLISHABLE_TAGS[-1]}"

          echo "Tags detectados:"
          printf '%s\n' "${TAGS[@]}"

          echo "Tags publicables:"
          printf '%s\n' "${PUBLISHABLE_TAGS[@]}"

          echo "Latest tag publicable calculado: ${LATEST_TAG}"

          for TAG in "${PUBLISHABLE_TAGS[@]}"; do
            COMMIT="$(git rev-list -n 1 "${TAG}")"
            SHA_SHORT="$(git rev-parse --short "${COMMIT}")"

            TAG_REF="${IMAGE_NAME}:${TAG}"
            SHA_REF="${IMAGE_NAME}:sha-${SHA_SHORT}"

            echo "------------------------------------------------------------"
            echo "Evaluando tag ${TAG}"
            echo "Commit: ${COMMIT}"
            echo "Imagen tag: ${TAG_REF}"
            echo "Imagen sha: ${SHA_REF}"

            TAG_EXISTS=false
            SHA_EXISTS=false

            if image_exists "${TAG_REF}"; then
              TAG_EXISTS=true
            fi

            if image_exists "${SHA_REF}"; then
              SHA_EXISTS=true
            fi

            if [ "${TAG_EXISTS}" = false ] && [ "${SHA_EXISTS}" = false ]; then
              echo "No existe ni ${TAG_REF} ni ${SHA_REF}. Se construye imagen."
              build_image_for_tag "${TAG}" "${COMMIT}" "${SHA_SHORT}"

            elif [ "${TAG_EXISTS}" = false ] && [ "${SHA_EXISTS}" = true ]; then
              echo "Existe ${SHA_REF}, pero falta ${TAG_REF}. Se crea el tag Docker sin reconstruir."
              publish_tag_from_existing_sha_image "${TAG}" "${SHA_SHORT}"

            elif [ "${TAG_EXISTS}" = true ] && [ "${SHA_EXISTS}" = false ]; then
              echo "Existe ${TAG_REF}, pero falta ${SHA_REF}. El tag Git puede haber cambiado. Se reconstruye."
              build_image_for_tag "${TAG}" "${COMMIT}" "${SHA_SHORT}"

            else
              TAG_DIGEST="$(image_digest "${TAG_REF}")"
              SHA_DIGEST="$(image_digest "${SHA_REF}")"

              if [ "${TAG_DIGEST}" = "${SHA_DIGEST}" ]; then
                echo "El tag ${TAG} ya está correctamente publicado. Se ignora."
              else
                echo "El tag ${TAG} existe, pero apunta a un manifest distinto."
                echo "Digest tag: ${TAG_DIGEST}"
                echo "Digest sha: ${SHA_DIGEST}"
                echo "Se actualiza ${TAG_REF} para apuntar al commit actual del tag Git."
                publish_tag_from_existing_sha_image "${TAG}" "${SHA_SHORT}"
              fi
            fi
          done

          publish_latest_from_tag "${LATEST_TAG}"
