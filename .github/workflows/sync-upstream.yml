name: Sync upstream

# Keeps our fork rebased on NousResearch/hermes-agent:main, then rebuilds
# `main` as an integration branch so a new machine can just `git clone`
# and check out `main` to get a runtime-ready fork.
#
# `FEATURE_BRANCHES` carries fork patches that have an open upstream PR.
# As of 2026-05-14 we carry the WhatsApp stack tip plus several independent branches:
#
#   fix/busy-path-pre-gateway-dispatch-upstream  (stack tip)
#     ← … ← feat/whatsapp-forward-owner-messages-upstream
#   → NousResearch/hermes-agent#16445, #16485, busy-path PR (open)
#
#   fix/auxiliary-opencode-strip-trailing-v1 → #18413 OpenCode auxiliary double /v1 (open)
#
#   feature/end-turn-tool-contract-upstream → #20713 terminal plugin tools can
#   close a turn without triggering the empty-after-tools nudge path.
#
#   fix/diagnostic-status-leak-and-end-turn-nudge → #24853 diagnostic status
#   leak fix (open).
#
#   fix/queued-followup-media-delivery-upstream → #25119 preserve MEDIA-backed
#   attachments when a queued follow-up arrives mid-reply.
#
#   #20747 launcher symlink clobber (was fix/launcher-symlink-clobber-upstream)
#   closed without merge — core fix landed upstream as c75e1a03f (Closes #21454).
#   Dropped from FEATURE_BRANCHES 2026-05-29.
#
#   #25183 queued follow-up transcript history (was fix/queued-followup-history-
#   persistence-upstream) merged upstream on NousResearch/hermes-agent:main as
#   commits 9a815b6c8 and cc64a04f6 — dropped from FEATURE_BRANCHES.
#
#   #17165 WhatsApp text batching (was feature/whatsapp-inbound-text-batch)
#   closed without merge — core text debounce landed upstream as b0ce47daa /
#   cddb7283d. Dropped from FEATURE_BRANCHES 2026-05-31.
#
# Drop a branch from FEATURE_BRANCHES (and delete it from the fork) once
# its upstream PR merges or the change is otherwise absorbed upstream.
#
# Runs daily at 03:00 UTC and on manual dispatch. See FORK.md for the
# maintenance model and recovery procedure.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip pytest (fast path for testing the workflow itself)"
        required: false
        default: "false"

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

env:
  UPSTREAM_URL: https://github.com/NousResearch/hermes-agent.git
  OPS_OVERLAY_BRANCH: ops-overlay
  INTEGRATION_BRANCH: main
  # Space-separated list of feature branches to rebase and cherry-pick into main.
  # Order matters: listed branches are applied in order after ops-overlay.
  # Empty is the steady-state when no patches are open upstream.
  #
  # Stacked PRs: list only the *tip* branch — cherry-picking its range onto
  # upstream/main brings in ancestor commits once. Do not list older stack
  # branches or commits duplicate/conflict.
  #
  # Independent PRs: add each branch in dependency order (later commits may
  # assume earlier cherry-picks are already on integration main).
  #
  # Currently:
  # - fix/busy-path-pre-gateway-dispatch-upstream is stacked on
  #   fix/whatsapp-forward-owner-allowlist-upstream (PR #16485), which is
  #   stacked on feat/whatsapp-forward-owner-messages-upstream (PR #16445).
  #   Listing the tip cherry-picks all three in one range.
  # - fix/diagnostic-status-leak-and-end-turn-nudge is independent (PR #24853).
  # - fix/queued-followup-media-delivery-upstream is independent (PR #25119);
  #   listed last.
  FEATURE_BRANCHES: "fix/busy-path-pre-gateway-dispatch-upstream fix/auxiliary-opencode-strip-trailing-v1 feature/end-turn-tool-contract-upstream fix/diagnostic-status-leak-and-end-turn-nudge fix/queued-followup-media-delivery-upstream"
  PLUGIN_REPO: pebble-tech/hermes-plugin-gateway-policy

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout fork (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PUSH_TOKEN }}

      - name: Prepare sync failure recorder
        run: chmod +x .github/scripts/record-sync-failure.sh

      - name: Configure git + upstream remote
        run: |
          git config user.name  "pebble-tech-bot"
          git config user.email "ops@pebble-tech.invalid"
          git remote add upstream "$UPSTREAM_URL"
          git fetch origin --prune --tags
          git fetch upstream --prune
          echo "upstream_sha=$(git rev-parse upstream/main)" >> "$GITHUB_ENV"

      - name: Rebase ops-overlay onto upstream
        run: |
          git checkout -B "$OPS_OVERLAY_BRANCH" "origin/$OPS_OVERLAY_BRANCH"
          if ! git rebase upstream/main; then
            bash .github/scripts/record-sync-failure.sh rebase-ops-overlay "$OPS_OVERLAY_BRANCH"
            {
              echo "::error::Conflict rebasing $OPS_OVERLAY_BRANCH onto upstream/main"
              echo "Conflicted files:"
              git diff --name-only --diff-filter=U
            } | tee /tmp/ops-overlay-conflict.txt
            git rebase --abort || true
            exit 1
          fi

      - name: Rebase each feature branch onto upstream
        run: |
          for branch in $FEATURE_BRANCHES; do
            echo "::group::Rebase $branch"
            git checkout -B "$branch" "origin/$branch"
            if ! git rebase upstream/main; then
              bash .github/scripts/record-sync-failure.sh rebase-feature-branch "$branch"
              {
                echo "::error::Conflict rebasing $branch onto upstream/main"
                echo "Conflicted files:"
                git diff --name-only --diff-filter=U
              } | tee "/tmp/${branch//\//-}-conflict.txt"
              git rebase --abort || true
              exit 1
            fi
            echo "::endgroup::"
          done

      - name: Rebuild integration branch (main)
        run: |
          git checkout -B "$INTEGRATION_BRANCH" upstream/main

          echo "::group::Cherry-pick ops-overlay"
          if ! git cherry-pick "upstream/main..$OPS_OVERLAY_BRANCH"; then
            bash .github/scripts/record-sync-failure.sh cherry-pick-main "$OPS_OVERLAY_BRANCH"
            git cherry-pick --abort || true
            exit 1
          fi
          echo "::endgroup::"

          for branch in $FEATURE_BRANCHES; do
            echo "::group::Cherry-pick $branch"
            if ! git cherry-pick "upstream/main..$branch"; then
              bash .github/scripts/record-sync-failure.sh cherry-pick-main "$branch"
              {
                echo "::error::Conflict cherry-picking $branch into $INTEGRATION_BRANCH"
                echo "Conflicted files:"
                git diff --name-only --diff-filter=U
              } | tee "/tmp/${branch//\//-}-cherrypick-conflict.txt"
              git cherry-pick --abort || true
              exit 1
            fi
            echo "::endgroup::"
          done

      - name: Set up Python 3.11
        if: inputs.skip_tests != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        if: inputs.skip_tests != 'true'
        uses: astral-sh/setup-uv@v5

      - name: Install ripgrep
        if: inputs.skip_tests != 'true'
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install hermes-agent (from integration branch)
        if: inputs.skip_tests != 'true'
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"

      - name: Run focused tests against integration branch
        if: inputs.skip_tests != 'true'
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
        run: |
          source .venv/bin/activate
          if ! python -m pytest \
            tests/gateway/test_pre_gateway_dispatch.py \
            tests/gateway/test_session.py \
            tests/hermes_cli/test_plugins.py \
            -q --tb=short; then
            bash .github/scripts/record-sync-failure.sh focused-tests "$INTEGRATION_BRANCH"
            exit 1
          fi

      - name: Smoke-test gateway-policy plugin against integration branch
        if: inputs.skip_tests != 'true'
        run: |
          source .venv/bin/activate
          git clone --depth=1 "https://github.com/${PLUGIN_REPO}.git" /tmp/plugin
          cd /tmp/plugin
          # Plugin tests stub what they need via conftest.py; the smoke-test
          # catches manifest drift and confirms the plugin still loads.
          if ! python -m pytest -q --tb=short; then
            bash "$GITHUB_WORKSPACE/.github/scripts/record-sync-failure.sh" plugin-smoke-test "$INTEGRATION_BRANCH"
            exit 1
          fi

      - name: Push rebased source branches and integration branch
        run: |
          if ! git push --force-with-lease origin "$OPS_OVERLAY_BRANCH"; then
            bash .github/scripts/record-sync-failure.sh push "$OPS_OVERLAY_BRANCH"
            exit 1
          fi
          for branch in $FEATURE_BRANCHES; do
            if ! git push --force-with-lease origin "$branch"; then
              bash .github/scripts/record-sync-failure.sh push "$branch"
              exit 1
            fi
          done
          if ! git push --force-with-lease origin "$INTEGRATION_BRANCH"; then
            bash .github/scripts/record-sync-failure.sh push "$INTEGRATION_BRANCH"
            exit 1
          fi

      - name: Open / update sync-failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const upstreamSha = process.env.upstream_sha || "(unknown)";
            const today = new Date().toISOString().slice(0, 10);

            let failure = {
              failed_step: "unknown",
              failed_branch: "",
              upstream_sha: upstreamSha,
              conflict_files: [],
            };
            const failurePath = path.join(process.env.GITHUB_WORKSPACE, ".sync-failure.json");
            if (fs.existsSync(failurePath)) {
              failure = { ...failure, ...JSON.parse(fs.readFileSync(failurePath, "utf8")) };
            }

            const yamlBlock = [
              "```yaml",
              "sync-failure:",
              `  upstream_sha: ${failure.upstream_sha}`,
              `  failed_step: ${failure.failed_step}`,
              `  failed_branch: ${failure.failed_branch || ""}`,
              failure.conflict_files?.length
                ? `  conflict_files:\n${failure.conflict_files.map((f) => `    - ${f}`).join("\n")}`
                : "  conflict_files: []",
              `  workflow_run_url: ${runUrl}`,
              "```",
            ].join("\n");

            const body = [
              `The scheduled upstream-sync workflow failed.`,
              ``,
              `- Run: ${runUrl}`,
              `- Upstream \`main\` at: \`${upstreamSha}\``,
              `- Failed step: \`${failure.failed_step}\``,
              failure.failed_branch ? `- Source branch: \`${failure.failed_branch}\`` : null,
              failure.conflict_files?.length
                ? `- Conflicted files: ${failure.conflict_files.map((f) => `\`${f}\``).join(", ")}`
                : null,
              ``,
              `**Cursor agent:** follow [.cursor/skills/recover-fork-sync/SKILL.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/.cursor/skills/recover-fork-sync/SKILL.md) (see \`sync-failure\` block below).`,
              ``,
              yamlBlock,
              ``,
              `Likely causes (in rough order of frequency):`,
              `1. Rebase conflict on a feature branch — upstream refactored the code the patch touches.`,
              `2. Cherry-pick conflict when rebuilding \`main\` — two feature branches touch the same lines.`,
              `3. Focused tests failed — upstream changed a signature the tests depend on.`,
              `4. Plugin smoke-test failed — \`pebble-tech/hermes-plugin-gateway-policy\` no longer loads cleanly.`,
              `5. Rebase conflict on \`ops-overlay\` — rare; only touches \`.github/workflows/sync-upstream.yml\` and \`FORK.md\`.`,
              ``,
              `If upstream absorbed the patch (closed/superseded PR), drop the branch from \`FEATURE_BRANCHES\` via \`ops-overlay\` — do not rebase the dead branch.`,
              ``,
              `Setup: [FORK_SYNC_AUTOMATION.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/FORK_SYNC_AUTOMATION.md)`,
            ]
              .filter(Boolean)
              .join("\n");

            function issuesDisabledError(err) {
              const msg = String(err?.message || err || "");
              const status = err?.status ?? err?.response?.status;
              return status === 410 || /issues has been disabled/i.test(msg);
            }

            let issueNumber = null;
            try {
              const { data: openIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                labels: "sync-failure",
              });
              if (openIssues.length > 0) {
                issueNumber = openIssues[0].number;
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `Another sync failure (${today}) at upstream \`${upstreamSha}\`: ${runUrl}\n\n${yamlBlock}`,
                });
              } else {
                const { data: issue } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `Upstream sync failed (${today})`,
                  body,
                  labels: ["sync-failure"],
                });
                issueNumber = issue.number;
              }
            } catch (err) {
              if (issuesDisabledError(err)) {
                core.warning(
                  "Upstream sync failed, but this repository has GitHub Issues disabled — cannot open or update a sync-failure issue. " +
                    `See the workflow log at ${runUrl}`,
                );
              } else {
                throw err;
              }
            }

            core.setOutput("issue_number", issueNumber ?? "");
            core.setOutput("failed_step", failure.failed_step);
            core.setOutput("failed_branch", failure.failed_branch || "");
            core.setOutput("conflict_files", JSON.stringify(failure.conflict_files || []));
        id: sync_failure_issue

      - name: Notify Cursor sync recovery automation
        if: failure() && secrets.CURSOR_SYNC_RECOVERY_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          WEBHOOK_URL: ${{ secrets.CURSOR_SYNC_RECOVERY_WEBHOOK_URL }}
          WEBHOOK_KEY: ${{ secrets.CURSOR_SYNC_RECOVERY_WEBHOOK_KEY }}
          UPSTREAM_SHA: ${{ env.upstream_sha }}
          FAILED_STEP: ${{ steps.sync_failure_issue.outputs.failed_step }}
          FAILED_BRANCH: ${{ steps.sync_failure_issue.outputs.failed_branch }}
          CONFLICT_FILES: ${{ steps.sync_failure_issue.outputs.conflict_files }}
          ISSUE_NUMBER: ${{ steps.sync_failure_issue.outputs.issue_number }}
        run: |
          payload=$(jq -n \
            --arg event "sync-failure" \
            --arg repository "${{ github.repository }}" \
            --arg upstream_sha "$UPSTREAM_SHA" \
            --arg failed_step "$FAILED_STEP" \
            --arg failed_branch "$FAILED_BRANCH" \
            --argjson conflict_files "$CONFLICT_FILES" \
            --arg workflow_run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg issue_number "$ISSUE_NUMBER" \
            '{
              event: $event,
              repository: $repository,
              upstream_sha: $upstream_sha,
              failed_step: $failed_step,
              failed_branch: $failed_branch,
              conflict_files: $conflict_files,
              workflow_run_url: $workflow_run_url,
              issue_number: (if $issue_number == "" then null else ($issue_number | tonumber) end)
            }')
          curl -sf -X POST "$WEBHOOK_URL" \
            -H "Authorization: Bearer $WEBHOOK_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload"
          echo "Cursor sync recovery webhook delivered"
