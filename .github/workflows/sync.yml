name: Auto Sync from Upstream (Native Git)

on:
  schedule:
    - cron: '0 3 1,14 * *' # 每月1号和14号凌晨3点自动同步
  workflow_dispatch:       # 允许手动点击运行

jobs:
  sync-and-clean:
    runs-on: ubuntu-latest
    
    steps:
      # 0. 【防御死循环】如果是机器人自己提交的，直接跳过
      - name: Check if self-commit, skip if so
        run: |
          if [[ "$GITHUB_ACTOR" == "Auto-Cleaner" ]]; then
            echo "🤖 检测到是机器人自我维护提交，跳过本次运行。"
            exit 0
          fi

      # 1. 检出当前 Fork 的仓库代码
      - name: Checkout my repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          # 注意：这里不需要 token，因为后面我们会用 token clone

      # 2. 【核心改动】使用原生 Git 命令同步上游代码
      - name: Sync via Native Git (Force Strategy)
        run: |
          # 设置用户名和邮箱（必须）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加上游仓库（官方）
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          
          # 获取上游代码
          git fetch upstream
          
          # 【关键命令】强制合并：当发生冲突时，无条件采用上游（官方）的版本
          # 这里的 -X theirs 就是我们解决冲突的关键
          git merge upstream/main -m "Merge upstream/main" -X theirs
          
          # 推送到 origin/main
          # 这里的 token 使用了默认的 GITHUB_TOKEN，它有读写权限
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main

      # 3. 【核心防御】将官方带过来的干扰文件移入 disabled 目录
      - name: Disable Official Workflows
        run: |
          WORKFLOW_DIR=".github/workflows"
          DISABLED_DIR="$WORKFLOW_DIR/disabled"
          
          mkdir -p "$DISABLED_DIR"
          
          # 查找并移动所有非 sync.yml 的 yml/yaml 文件
          for file in $(find "$WORKFLOW_DIR" -maxdepth 1 -type f \( -name "*.yml" -o -name "*.yaml" \) 2>/dev/null || echo ""); do
            filename=$(basename "$file")
            if [[ "$filename" != "sync.yml" ]]; then
              echo "🧹 正在移走干扰文件: $filename"
              mv "$file" "$DISABLED_DIR/"
            fi
          done
          
          # 如果有文件变动，自动提交
          if [ -n "$(git status --porcelain)" ]; then
            git config --global user.name "Auto-Cleaner"
            git config --global user.email "action@noreply.github.com"
            git add "$DISABLED_DIR/"
            git commit -m "🧹 Auto-disable official workflows after sync"
            git push
          else
            echo "✅ 没有多余的 workflow 文件需要清理。"
          fi
