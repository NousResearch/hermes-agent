[extend]
useDefault = true

[allowlist]
description = "Repository-specific examples, fixtures, docs, and generated noise"
paths = [
  '''^tests/''',
  '''^skills/''',
  '''^optional-skills/''',
  '''^website/''',
  '''^web/''',
  '''^docs/''',
  '''^\.pytest_cache/''',
  '''^\.ruff_cache/''',
  '''^exprted\.jsonl$''',
]
commits = []
regexes = [
  '''Anthropic OAuth/setup tokens''',
  '''\bprivate-key\b''',
  '''discord(?:_admin)?''',
  '''discord\.gg/NousResearch''',
]

[[rules]]
id = "generic-api-key"
description = "Allow documented/public OAuth client identifiers and model identifiers"
path = '''^(hermes_cli/auth\.py|agent/google_oauth\.py|hermes_cli/copilot_auth\.py|tools/mixture_of_agents_tool\.py)$'''

[[rules]]
id = "private-key"
description = "Allow private-key regex pattern used by redaction engine"
path = '''^agent/redact\.py$'''

[[rules]]
id = "discord-client-id"
description = "Allow Discord docs references and toolset names in repo documentation"
path = '''^(README\.md|AGENTS\.md)$'''

[[rules]]
id = "generic-api-key"
description = "Allow Kimi/Moonshot model-family docs in anthropic adapter"
path = '''^agent/anthropic_adapter\.py$'''
