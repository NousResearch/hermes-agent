[config]
model = "openrouter/deepseek/deepseek-v4-flash"
fallback_models = []
git_provider = "github"
response_language = "en-US"
ai_timeout = 120
max_model_tokens = 32000
custom_model_max_tokens = 32000
temperature = 0.2

[pr_reviewer]
require_score_review = false
require_tests_review = false
require_estimate_effort_to_review = false
require_can_be_split_review = false
require_security_review = false
require_estimate_contribution_time_cost = false
require_todo_scan = false
require_ticket_analysis_review = false
publish_output_no_suggestions = true
persistent_comment = true
num_max_findings = 3
final_update_message = true
enable_review_labels_security = false
enable_review_labels_effort = false
enable_intro_text = false
enable_help_text = false
extra_instructions = "Focus on lightweight textual PR triage and diff review. Do not propose code patches or committable suggestions."

[pr_description]
publish_labels = false
generate_ai_title = false
use_bullet_points = true
inline_file_summary = false
enable_pr_diagram = false
enable_help_text = false
enable_help_comment = false

[pr_code_suggestions]
num_code_suggestions = 0
num_code_suggestions_per_chunk = 0
commitable_code_suggestions = false
focus_only_on_problems = true
publish_output_no_suggestions = true
enable_chat_text = false
enable_help_text = false
extra_instructions = "Code suggestions are disabled for this repository; provide textual triage only."

[pr_improve_component]
num_code_suggestions = 0

[github_app]
pr_commands = [
  "/describe --pr_description.final_update_message=false",
  "/review",
]
push_commands = [
  "/review",
]