repos:
  - repo: local
    hooks:
      # ── lint.yml equivalents ──────────────────────────────────────────
      - id: ruff-check
        name: ruff enforcement (blocking)
        entry: .venv/bin/ruff check .
        language: system
        files: \.py$
        pass_filenames: false

      - id: windows-footguns
        name: Windows footguns (blocking)
        entry: .venv/bin/python scripts/check-windows-footguns.py --all
        language: system
        files: \.py$
        pass_filenames: false
        require_serial: true

      # ── uv-lockfile-check.yml equivalent ──────────────────────────────
      - id: uv-lock-check
        name: uv lock --check
        entry: uv lock --check
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false
        require_serial: true

      # ── docker-lint.yml equivalents ───────────────────────────────────
      - id: hadolint
        name: Lint Dockerfile (hadolint)
        entry: hadolint --config .hadolint.yaml Dockerfile
        language: system
        files: ^(Dockerfile|\.hadolint\.yaml)$
        pass_filenames: false

      - id: shellcheck
        name: Lint docker/ shell scripts (shellcheck)
        entry: shellcheck --severity=error
        language: system
        files: ^docker/.*\.sh$
        types_or: [shell]

      # ── supply-chain-audit.yml equivalent ─────────────────────────────
      - id: supply-chain-scan
        name: Scan for critical supply chain risks
        entry: .venv/bin/python scripts/pre_commit_supply_chain_scan.py
        language: system
        files: \.py$
        pass_filenames: false
        require_serial: true

      # ── osv-scanner.yml equivalent ────────────────────────────────────
      - id: osv-scanner
        name: osv-scanner lockfile audit (advisory)
        entry: bash scripts/pre_commit_osv_scanner.sh
        language: system
        files: ^(uv\.lock|pyproject\.toml|package\.json|package-lock\.json)$
        pass_filenames: false
        require_serial: true

      # ── history-check.yml equivalent ──────────────────────────────────
      - id: common-ancestor
        name: Reject orphan branches
        entry: bash scripts/pre_commit_common_ancestor.sh
        language: system
        pass_filenames: false
        stages: [pre-push]

      # ── docs-site-checks.yml equivalent ───────────────────────────────
      - id: docs-skill-extract
        name: Extract skill metadata for dashboard
        entry: .venv/bin/python website/scripts/extract-skills.py
        language: system
        files: ^(skills/|optional-skills/|website/scripts/extract-skills\.py)$
        pass_filenames: false
        require_serial: true

      # ── CI-only gates (documented, not automatable) ───────────────────
      # contributor-check.yml — checks PR commits against AUTHOR_MAP
      #   → CI-only; `git log origin/main..HEAD --format='%ae' | sort -u`
      #     to preview locally, but enforcement needs the merge-base context.
      #
      # nix.yml — nix flake check
      #   → requires Nix; run `nix flake check` manually when P51 is up.
      #
      # nix-lockfile-fix.yml — auto-fix npm hashes
      #   → CI bot only; run `nix run .#fix-lockfiles` manually on Nix.
      #
      # docker-publish.yml — Docker build + push
      #   → upstream-only; run `docker build .` locally to test.
      #
      # deploy-site.yml + skills-index*.yml + build-windows-installer.yml
      #   → deploy/infra pipelines; not applicable to local pre-commit.
      #
      # upload_to_pypi.yml
      #   → release pipeline; run `uv build` locally to verify wheel.
      #
      # tests.yml
      #   → full test suite; run `.venv/bin/pytest tests/ -q` manually
      #     or `python scripts/run_tests_parallel.py` for sharded CI parity.
