specialists:
  - id: infra
    name: Infrastructure
    description: Diagnoses hosts, operating systems, networks, storage, and capacity.
    capabilities: [infrastructure, linux, networking, storage, performance]
    keywords: [cpu, disk, host, server, latency, network, memory]
    allowed_toolsets: [terminal, file, web]
    blocked_tools: [delegate_task, clarify, memory, send_message, execute_code]
    max_risk: medium
    memory_access: read_write
    memory_scope: specialist:infra
    max_concurrency: 2
    enabled: true

