# Hermes multi-tenant client registry — TEMPLATE.
#
# Copy this to a real `clients.yaml` ON THE HOST (not in the repo — the repo
# is public and must not carry real client names or tokens), then point
# tooling at it via $HERMES_CLIENTS_REGISTRY=/opt/data/clients.yaml.
#
# This is the single source of truth for which client bots exist, in which
# environment, and how they're configured. Deploy/onboarding tooling reads
# it instead of hardcoding profile lists. See hermes_cli/clients.py.
#
# One client bot == one Hermes profile (profiles/<profile>/). Secrets never
# live here: `telegram_token_ref` names the ENV VAR that holds the token,
# resolved on the host from e.g. /opt/data/secrets/<name>.env.
#
# Per-tenant claude-proxy key (added by `hermes-provision-client`):
#   * Each client gets a random proxy key, minted idempotently at provision
#     time and recorded in <hermes_root>/proxy/keys.json (key -> client_name,
#     0600, host-side only — NEVER committed; same secrets/ pattern as tokens).
#   * The key is also written into the profile's own .env as CLAUDE_PROXY_KEY,
#     and — if the profile's config.yaml has a claude-proxy (:11435) provider
#     block — wired inline as that block's `api_key`, so the gateway sends
#     `Authorization: Bearer <key>` and usage is attributed to that tenant with
#     no manual step. (Inline `api_key` is the one spelling every runtime
#     resolution path honors; `key_env` is ignored in a bare `model:` block.)
#   * The public docker-compose.yml serves anonymous requests by default
#     (CLAUDE_PROXY_ALLOW_ANON=1) so single-user setups work out of the box.
#     The prod deploy locks the proxy to the Hermes bot: a self-gating
#     bootstrap wires the hermes key and, only once verified, layers
#     docker-compose.prod.yml on top (CLAUDE_PROXY_ALLOW_ANON=0; keyless → 401).
#     Client bots talk to DeepSeek directly and never touch the proxy.

clients:
  # The baseline 'default' profile is the gateway root itself. It may inherit
  # the base config, so telegram_token_ref is optional for it. Keep it on dev.
  - name: default
    profile: default
    env: dev

  # A typical client bot. `profile` defaults to `name` if omitted.
  - name: acme
    env: prod
    telegram_token_ref: ACME_TG_TOKEN     # env var name, NOT the token value
    model: claude-sonnet-4-6              # optional; omit to use the global default
    tier: standard                        # free-form label for future resource tiers
    isolation: shared                     # 'shared' now; flip to 'container' to graduate

  - name: example-client
    env: prod
    telegram_token_ref: EXAMPLE_CLIENT_TG_TOKEN
