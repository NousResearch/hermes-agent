# Local secretary runtime — copy sections into ~/.hermes/config.yaml
# Primary inference: llama.cpp OpenAI-compatible endpoint on RTX 3060.
#
# Secrets belong in ~/.hermes/.env only (never commit):
#   GOOGLE_* / X_* / IRODORI_* credentials as needed

model:
  provider: custom
  default: huihui-gemma-4-12b
  base_url: http://127.0.0.1:8080/v1
  context_length: 65536
  max_tokens: 2048
  api_key: local
  api_mode: chat_completions

custom_providers:
  - name: huihui-gemma-4-12b
    base_url: http://127.0.0.1:8080/v1
    api_key: local
    model: huihui-gemma-4-12b
    context_length: 65536
  - name: hermes3-8b-fallback
    base_url: http://127.0.0.1:8081/v1
    api_key: local
    model: hermes3-8b-fallback
    context_length: 65536
  - name: phi4-mini-aux
    base_url: http://127.0.0.1:8082/v1
    api_key: local
    model: phi4-mini-aux
    context_length: 65536

fallback_providers:
  - provider: custom
    model: hermes3-8b-fallback
    base_url: http://127.0.0.1:8081/v1
  - provider: custom
    model: phi4-mini-aux
    base_url: http://127.0.0.1:8082/v1

local_secretary:
  profile: rtx3060
  read_actions_auto_allowed: true
  write_actions_require_confirmation: true
  emergency_news_mode:
    require_multiple_sources: true
    include_absolute_timestamps: true
    timezone: Asia/Tokyo
  logging:
    tool_calls: true
    write_action_attempts: true
    emergency_reports: true
  tts:
    provider: irodori
    base_url: http://127.0.0.1:8088/v1/audio/speech
    default_voice: none
  timetable:
    timezone: Asia/Tokyo
    adapter: web_search
    required_fields:
      - origin
      - destination
      - depart_or_arrive
      - service_status
      - fetched_at_jst

agent:
  api_max_retries: 1
  tool_use_enforcement: true
  coding_context: off

tools:
  cli:
    enabled:
      - web
      - browser
      - file
      - search
      - tts
      - skills
    disabled:
      - terminal
      - delegation
      - code_execution

skills:
  enabled_categories:
    - productivity
    - research
    - audio

auxiliary:
  compression:
    provider: custom
    model: phi4-mini-aux
    base_url: http://127.0.0.1:8082/v1
    api_key: local
  title_generation:
    provider: custom
    model: phi4-mini-aux
    base_url: http://127.0.0.1:8082/v1
    api_key: local
