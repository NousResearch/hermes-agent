# Ollama trial profile for local secretary experiments.
# Keep llama.cpp as production primary; use this profile only for A/B tests.

model:
  provider: custom
  default: qwen3.5:9b
  base_url: http://127.0.0.1:11434/v1
  context_length: 65536
  max_tokens: 2048
  api_key: ollama
  api_mode: chat_completions
  extra_body:
    options:
      num_ctx: 65536

custom_providers:
  - name: ollama-secretary
    base_url: http://127.0.0.1:11434/v1
    api_key: ollama
    model: qwen3.5:9b
    context_length: 65536
    extra_body:
      options:
        num_ctx: 65536

local_secretary:
  profile: ollama-trial
  launcher: external
  read_actions_auto_allowed: true
  write_actions_require_confirmation: true

agent:
  coding_context: off
