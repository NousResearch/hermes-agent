# Hermes Orchard — control-plane configuration.
# Copy to config.yaml and adjust. Secrets stay in env vars, never in this file.

# --- Model / inference -------------------------------------------------------
# Orchard writes this into every employee's Hermes config so all workers point
# at your INTERNAL, on-prem, OpenAI-compatible endpoint (vLLM / SGLang / TGI).
llm:
  model: "deepseek-v4-flash"       # model id served by your endpoint
  provider: "deepseek"             # hermes provider profile (deepseek = handles thinking wire-format)
  base_url: "http://llm.internal:8000/v1"   # your internal inference cluster
  api_key_env: "ORCHARD_LLM_API_KEY"        # env var holding the endpoint token (may be a dummy for open endpoints)
  reasoning_effort: "none"         # "none" disables thinking tokens; or low|medium|high

# --- Filesystem layout -------------------------------------------------------
paths:
  root: "./data"                   # per-employee HERMES_HOME dirs live under <root>/employees/<id>
  runtime: "./run"                 # worker sockets + pidfiles
  registry_db: "./data/orchard.db" # sqlite registry

hermes_bin: "hermes"               # path to the hermes executable (inside the worker sandbox in prod)

# --- Supervisor / lifecycle --------------------------------------------------
supervisor:
  max_active_workers: 200          # hard cap on simultaneously-awake workers (RAM guard)
  idle_ttl_seconds: 900            # sleep a worker after this many seconds with no traffic
  warm_pool_size: 0                # pre-warmed generic sandboxes (shines with microVM backend)
  wake_timeout_seconds: 60         # how long to wait for a cold worker to become ready

# --- Security ----------------------------------------------------------------
security:
  # Drop privileges per worker to a dedicated unprivileged OS user (via `sudo -u`).
  # null = run workers as the current user (DEV ONLY — no cross-tenant OS boundary).
  run_as_user: null
  home_mode: "0700"                # per-employee home dir permissions
  secret_mode: "0600"             # .env / secret file permissions
  # Only employees provisioned in the registry may talk to the bot. Unknown
  # senders are rejected (never auto-provisioned from an inbound message).
  require_provisioned: true

# --- Isolation backend -------------------------------------------------------
# local  : subprocess workers, same host, FS-permission isolation (DEV / small trusted)
# docker : one container per employee (namespaces) — real OS boundary (recommended prod baseline)
backend: "local"

# --- Ingress (Mattermost) ----------------------------------------------------
mattermost:
  url_env: "MATTERMOST_URL"        # e.g. https://mm.corp.internal
  token_env: "MATTERMOST_TOKEN"    # single bot-account token (the ONLY MM connection)
  slash_token_env: "MATTERMOST_SLASH_TOKEN"  # verification token for the /secret slash command

# --- Skill secrets -----------------------------------------------------------
# Employees enter tokens via a one-time HTTPS form link (never in chat). Stored
# per-tenant in their confined home; injected into their worker as env vars.
secrets:
  store: "local"                   # local | vault (future)
  key_env: "ORCHARD_SECRET_KEY"    # reserved: at-rest encryption key
  form_base_url: "https://orchard.corp.internal"  # where the entry form is reachable (TLS in prod!)
  link_ttl_seconds: 900            # one-time link lifetime

skills:
  shared_dir: ""                   # read-only base skills library (admin-curated); "" = none

# Integration catalog shown in the dashboard (GitLab / Jira / Wiki / ...).
integrations:
  catalog_file: "./integrations.yaml"   # see integrations.example.yaml
