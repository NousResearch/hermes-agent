services:
  ollama-embed:
    image: ollama/ollama:latest
    container_name: second-brain-ollama-embed
    restart: unless-stopped
    cpus: ${OLLAMA_EMBED_CPUS:-1.0}
    mem_limit: ${OLLAMA_EMBED_MEM_LIMIT:-3072m}
    memswap_limit: ${OLLAMA_EMBED_MEMSWAP_LIMIT:-4096m}
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - second-brain

  lightrag-company-public: &lightrag-service
    image: ghcr.io/hkuds/lightrag:latest
    container_name: second-brain-lightrag-company-public
    restart: unless-stopped
    cpus: ${LIGHTRAG_CPUS:-1.0}
    mem_limit: ${LIGHTRAG_MEM_LIMIT:-1536m}
    memswap_limit: ${LIGHTRAG_MEMSWAP_LIMIT:-2048m}
    env_file: .env
    environment: &lightrag-env
      HOST: 0.0.0.0
      PORT: 9621
      WORKSPACE: company_public
      INPUT_DIR: /data/workspaces/company_public/inputs
      WORKING_DIR: /data/workspaces/company_public/rag_storage
      WEBUI_TITLE: Company Public
      WEBUI_DESCRIPTION: Company second brain workspace
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY}
      WHITELIST_PATHS: /health
      SUMMARY_LANGUAGE: English
      ENTITY_EXTRACTION_USE_JSON: "true"
      LIGHTRAG_PARSER: "*:native-teP;*:legacy-R"
      VLM_PROCESS_ENABLE: "false"
      LLM_BINDING: openai
      LLM_BINDING_HOST: ${OLLAMA_CLOUD_BASE_URL}
      LLM_BINDING_API_KEY: ${OLLAMA_CLOUD_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      KEYWORD_LLM_MODEL: ${LLM_MODEL}
      QUERY_LLM_MODEL: ${LLM_MODEL}
      MAX_ASYNC_LLM: 2
      EMBEDDING_BINDING: ollama
      EMBEDDING_BINDING_HOST: http://ollama-embed:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIM: ${EMBEDDING_DIM}
      EMBEDDING_TOKEN_LIMIT: 8192
      OLLAMA_EMBEDDING_NUM_CTX: 8192
      LIGHTRAG_KV_STORAGE: JsonKVStorage
      LIGHTRAG_DOC_STATUS_STORAGE: JsonDocStatusStorage
      LIGHTRAG_GRAPH_STORAGE: NetworkXStorage
      LIGHTRAG_VECTOR_STORAGE: NanoVectorDBStorage
    depends_on:
      - ollama-embed
    volumes:
      - lightrag-data:/data
    networks:
      - second-brain

  lightrag-c-level:
    <<: *lightrag-service
    container_name: second-brain-lightrag-c-level
    environment:
      <<: *lightrag-env
      WORKSPACE: department_c_level
      INPUT_DIR: /data/workspaces/department_c_level/inputs
      WORKING_DIR: /data/workspaces/department_c_level/rag_storage
      WEBUI_TITLE: C Level

  company-ai-gateway:
    build: ./services/company-ai-gateway
    container_name: second-brain-gateway
    restart: unless-stopped
    cpus: ${GATEWAY_CPUS:-0.50}
    mem_limit: ${GATEWAY_MEM_LIMIT:-512m}
    memswap_limit: ${GATEWAY_MEMSWAP_LIMIT:-768m}
    env_file: .env
    environment:
      KNOWLEDGE_API_URL: http://knowledge-api:8010
    depends_on:
      - knowledge-api
    networks:
      - second-brain
      - coolify
    labels:
      traefik.enable: "true"
      traefik.docker.network: "coolify"
      traefik.http.middlewares.second-brain-gzip.compress: "true"
      traefik.http.middlewares.second-brain-redirect.redirectscheme.scheme: "https"
      traefik.http.routers.second-brain-http.entryPoints: "http"
      traefik.http.routers.second-brain-http.middlewares: "second-brain-redirect"
      traefik.http.routers.second-brain-http.rule: "Host(`${SECOND_BRAIN_DOMAIN}`) && PathPrefix(`/`)"
      traefik.http.routers.second-brain-http.service: "second-brain-http"
      traefik.http.routers.second-brain-https.entryPoints: "https"
      traefik.http.routers.second-brain-https.middlewares: "second-brain-gzip"
      traefik.http.routers.second-brain-https.rule: "Host(`${SECOND_BRAIN_DOMAIN}`) && PathPrefix(`/`)"
      traefik.http.routers.second-brain-https.service: "second-brain-https"
      traefik.http.routers.second-brain-https.tls: "true"
      traefik.http.routers.second-brain-https.tls.certresolver: "letsencrypt"
      traefik.http.services.second-brain-http.loadbalancer.server.port: "8000"
      traefik.http.services.second-brain-https.loadbalancer.server.port: "8000"

  knowledge-api:
    build: ./services/knowledge-api
    container_name: second-brain-knowledge-api
    restart: unless-stopped
    cpus: ${KNOWLEDGE_API_CPUS:-1.0}
    mem_limit: ${KNOWLEDGE_API_MEM_LIMIT:-512m}
    memswap_limit: ${KNOWLEDGE_API_MEMSWAP_LIMIT:-768m}
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      INGEST_QUEUE_NAME: ${INGEST_QUEUE_NAME:-second_brain:ingest_jobs}
      QUERY_WORKSPACE_CONCURRENCY: ${QUERY_WORKSPACE_CONCURRENCY:-4}
      LIGHTRAG_ROOT: /data/lightrag
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY}
      LIGHTRAG_COMPANY_PUBLIC_URL: http://lightrag-company-public:9621
      LIGHTRAG_DEPARTMENT_C_LEVEL_URL: http://lightrag-c-level:9621
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      lightrag-company-public:
        condition: service_started
      lightrag-c-level:
        condition: service_started
    volumes:
      - lightrag-data:/data/lightrag
    networks:
      - second-brain

  knowledge-worker:
    build: ./services/knowledge-api
    container_name: second-brain-knowledge-worker
    restart: unless-stopped
    command: ["python", "worker.py"]
    cpus: ${KNOWLEDGE_WORKER_CPUS:-1.0}
    mem_limit: ${KNOWLEDGE_WORKER_MEM_LIMIT:-512m}
    memswap_limit: ${KNOWLEDGE_WORKER_MEMSWAP_LIMIT:-768m}
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      INGEST_QUEUE_NAME: ${INGEST_QUEUE_NAME:-second_brain:ingest_jobs}
      INGEST_WORKER_CONCURRENCY: ${INGEST_WORKER_CONCURRENCY:-2}
      INGEST_MAX_ATTEMPTS: ${INGEST_MAX_ATTEMPTS:-3}
      INGEST_RETRY_BACKOFF_SECONDS: ${INGEST_RETRY_BACKOFF_SECONDS:-10}
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY}
      LIGHTRAG_COMPANY_PUBLIC_URL: http://lightrag-company-public:9621
      LIGHTRAG_DEPARTMENT_C_LEVEL_URL: http://lightrag-c-level:9621
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      lightrag-company-public:
        condition: service_started
      lightrag-c-level:
        condition: service_started
    networks:
      - second-brain

  postgres:
    image: pgvector/pgvector:pg16
    container_name: second-brain-postgres
    restart: unless-stopped
    cpus: ${POSTGRES_CPUS:-0.75}
    mem_limit: ${POSTGRES_MEM_LIMIT:-1024m}
    memswap_limit: ${POSTGRES_MEMSWAP_LIMIT:-1536m}
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - second-brain

  redis:
    image: redis:7-alpine
    container_name: second-brain-redis
    restart: unless-stopped
    cpus: ${REDIS_CPUS:-0.25}
    mem_limit: ${REDIS_MEM_LIMIT:-256m}
    memswap_limit: ${REDIS_MEMSWAP_LIMIT:-384m}
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - second-brain

  minio:
    image: minio/minio:latest
    container_name: second-brain-minio
    restart: unless-stopped
    cpus: ${MINIO_CPUS:-0.50}
    mem_limit: ${MINIO_MEM_LIMIT:-512m}
    memswap_limit: ${MINIO_MEMSWAP_LIMIT:-768m}
    env_file: .env
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - second-brain

volumes:
  postgres-data:
  redis-data:
  minio-data:
  lightrag-data:
  ollama-data:

networks:
  second-brain:
    name: second-brain
  coolify:
    external: true
