# Production override — locks the :11435 Claude proxy to the Hermes bot.
#
# Applied CONDITIONALLY by the Contabo deploy (deploy-contabo.yml): the deploy
# first runs an idempotent in-container bootstrap that mints a "hermes" key
# into /opt/data/proxy/keys.json, wires it inline (api_key) into the :11435
# provider block(s) of /opt/data/config.yaml, and verifies the gateway's own
# runtime resolution picks it up. Only when that verification passes does the
# deploy layer this file on:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# If verification fails, the deploy proceeds WITHOUT this file (anon-on, all
# bots unaffected) and warns loudly — Hermes can never lose Claude to a
# half-applied cutover. After the flip, the deploy's proxy-lock gate asserts
# keyless → 401 and the hermes key authenticates, or the deploy goes red.
#
# Why this is a separate file (and NOT baked into docker-compose.yml):
# docker-compose.yml is the PUBLIC default that single-user / hobbyist setups
# run. Those have no keys.json, so flipping the proxy to fail-closed there
# would 401 their only bot.
services:
  gateway:
    environment:
      # Fail-closed proxy auth: a missing/invalid bearer key → 401. Only the
      # Hermes bot (whose key is wired by the deploy bootstrap) can spend the
      # Claude subscription; client bots are DeepSeek-direct and never touch
      # the proxy.
      - CLAUDE_PROXY_ALLOW_ANON=0
      # Fleet broker endpoint. The prod containers run on a BRIDGE network, so
      # the host's sshd is NOT at the container's 127.0.0.1 — it's at the
      # docker host-gateway address, surfaced as host.docker.internal via the
      # extra_hosts mapping below. (Under host networking this still resolves
      # to a host address, so the mapping is correct in both modes.)
      - HERMES_FLEET_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
