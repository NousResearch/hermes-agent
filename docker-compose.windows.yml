#
# docker-compose.windows.yml — Windows Docker Desktop compatible
#
# Differences from docker-compose.yml:
#   - Removes `network_mode: host` (not supported on Docker Desktop for Windows)
#   - Uses explicit port mappings instead
#   - Uses Windows-style volume path for ~/.hermes
#
# Usage:
#   docker compose -f docker-compose.windows.yml up -d
#
services:
  gateway:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    volumes:
      - ${USERPROFILE}/.hermes:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
      # Owns the per-profile gateways and the :11435 Claude proxy.
      - HERMES_ROLE=gateway
    command: ["gateway", "run"]

  dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - ${USERPROFILE}/.hermes:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
      # Dashboard-only viewer; shares the volume with the gateway. The role
      # gate keeps its boot hooks from starting a duplicate proxy/gateways
      # that would deadlock on the shared proxy log lock. See
      # docker/hermes-role.sh.
      - HERMES_ROLE=dashboard
      - HERMES_DASHBOARD_HOST=0.0.0.0
    ports:
      - "127.0.0.1:9119:9119"
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--insecure"]
