#
# docker-compose.yml for Hermes Agent
#
# Usage:
#   HERMES_UID=$(id -u) HERMES_GID=$(id -g) docker compose up -d
#
# Requires API_SERVER_KEY: create a `.env` next to this file (compose reads it
# for variable substitution), e.g. API_SERVER_KEY=$(openssl rand -hex 32)
#
# Set HERMES_UID / HERMES_GID to the host user that owns ~/.hermes so
# files created inside the container stay readable/writable on the host.
# The entrypoint remaps the internal `hermes` user to these values via
# usermod/groupmod + gosu.
#
# Security notes:
#   - This compose file defaults to binding the API (8642) and dashboard
#     (9112) on all interfaces. Set a strong API_SERVER_KEY; the dashboard
#     uses --insecure (no robust auth) — use only on trusted networks or
#     put it behind a reverse proxy with authentication.
#   - See docs/user-guide/api-server.md and website/docs/user-guide/docker.md.
#
services:
  gateway:
    build: .
    image: hermes-agent
    container_name: hermes
    restart: unless-stopped
    network_mode: host
    # Optional extra bind — only if external skills live on the host outside ~/.hermes
    # (~/.agents/skills) and must appear at /opt/data/.agents/skills in the container.
    # Otherwise use ~/.hermes/.agents/skills on the host (single volume is enough).
    #   - ~/.agents/skills:/opt/data/.agents/skills
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${API_SERVER_KEY:?Set API_SERVER_KEY in .env or the environment (e.g. openssl rand -hex 32)}
    command: ["gateway", "run"]

  dashboard:
    image: hermes-agent
    container_name: hermes-dashboard
    restart: unless-stopped
    network_mode: host
    depends_on:
      - gateway
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
    # Binds 0.0.0.0:9112 (--insecure). CLI `hermes dashboard` defaults to 9119;
    # this stack uses 9112 to pair with the API port scheme / firewall docs.
    command:
      [
        "dashboard",
        "--host",
        "0.0.0.0",
        "--port",
        "9112",
        "--insecure",
        "--no-open",
      ]
