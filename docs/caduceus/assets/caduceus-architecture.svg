<text x="44" y="162" font-size="14.5" fill="#3D4860">agent() · parallel() · pipeline()</text>
<circle cx="30" cy="194" r="3" fill="#3B6BFF"/>
<text x="44" y="198" font-size="14.5" fill="#3D4860">Schema-validated structured output</text>
<circle cx="30" cy="230" r="3" fill="#3B6BFF"/>
<text x="44" y="234" font-size="14.5" fill="#3D4860">Shared token budget per run</text>
<circle cx="30" cy="266" r="3" fill="#3B6BFF"/>
<text x="44" y="270" font-size="14.5" fill="#3D4860">Per-run caching + instant resume</text>
</g>
