<text x="44" y="58" font-size="30" font-weight="800" fill="#0F172A">How Caduceus works</text>
<text x="44" y="90" font-size="16" fill="#6B7689">One switch, three composable layers. Each turns on only when you need it — the mode is a no-op when off.</text>
<g transform="translate(44,116)" font-size="13" font-weight="600">
<text x="0" y="14" fill="#94A3B8">flow</text>
<g transform="translate(60,0)"><rect width="150" height="26" rx="13" fill="#0E1730"/><text x="75" y="17" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12.5" fill="#CFE0FF">/caduceus on</text></g>
<text x="222" y="17" fill="#AEB8D2">→</text>
<text x="244" y="17" fill="#7C5CFF">plan &amp; drive</text>
<text x="372" y="17" fill="#AEB8D2">— say “workflow” →</text>
<text x="556" y="17" fill="#3B6BFF">fan out on the Loom</text>
<text x="730" y="17" fill="#AEB8D2">— each worker →</text>
<text x="888" y="17" fill="#C68A14">routed to the right model</text>
</g>
