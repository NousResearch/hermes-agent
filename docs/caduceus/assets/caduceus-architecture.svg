<g transform="translate(20,98)"><rect width="110" height="28" rx="14" fill="#FFFFFF" stroke="#7C5CFF" stroke-width="1.2"/><circle cx="18" cy="14" r="4" fill="#7C5CFF"/><text x="30" y="19" font-family="JetBrains Mono, monospace" font-size="12.5" font-weight="600" fill="#7C5CFF">always on</text></g>
<circle cx="30" cy="158" r="3" fill="#7C5CFF"/>
<text x="44" y="162" font-size="14.5" fill="#3D4860">Writes a live to-do plan first</text>
<circle cx="30" cy="194" r="3" fill="#7C5CFF"/>
<text x="44" y="198" font-size="14.5" fill="#3D4860">One step in-progress, done as you go</text>
<circle cx="30" cy="230" r="3" fill="#7C5CFF"/>
<text x="44" y="234" font-size="14.5" fill="#3D4860">Verifies before claiming done</text>
<circle cx="30" cy="266" r="3" fill="#7C5CFF"/>
<text x="44" y="270" font-size="14.5" fill="#3D4860">Right-sizes — trivial asks just run</text>
</g>
