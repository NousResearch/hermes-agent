<g transform="translate(20,98)"><rect width="177" height="28" rx="14" fill="#FFFFFF" stroke="#E8A92E" stroke-width="1.2"/><circle cx="18" cy="14" r="4" fill="#E8A92E"/><text x="30" y="19" font-family="JetBrains Mono, monospace" font-size="12.5" font-weight="600" fill="#E8A92E">/caduceus auto on</text></g>
