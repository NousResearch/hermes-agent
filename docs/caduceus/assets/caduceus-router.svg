<text x="40" y="54" font-size="28" font-weight="800" fill="#0F172A">Auto Router — the right model per task</text>
<text x="40" y="84" font-size="15" fill="#6B7689">Each delegated worker is scored on capability and routed to the cheapest model that clears the bar. Scored on capability — never price.</text>
