decision_question: Can OpenAI Realtime GA safely act as Hermes Desktop voice transport without becoming a second agent or bypassing Hermes tool policy?
assumptions:
  - confirmed transcripts can be delivered exactly once to Hermes
  - Hermes text can be spoken without semantic rewriting
  - ephemeral credentials can be renderer-safe and session-bound
falsification:
  - GA API cannot provide deterministic read-aloud of supplied Hermes text
  - transcript completion cannot be correlated/idempotently owned
  - browser session credentials cannot satisfy the local Desktop trust boundary
