captions:
  - panel_id: p01
    text: "2학기 등록 직전까지 결론."
  - panel_id: p03
    text: "적응한 적은 없었다. 적응한 척하는 법만 빨라졌다."
  - panel_id: p05
    text: "왜 하필 지금."
  - panel_id: p07
    text: "아, 이제 들켰다."
