id: code-change-review
name: Code Change Review
version: 1
enabled: true
max_node_runs: 50
triggers:
  - type: manual
    id: manual
nodes:
  start:
    type: pass
    output:
      repo: "${ input.repo }"
      branch: "${ input.branch }"
      change_request: "${ input.change_request }"

  implement:
    type: agent_task
    profile: implementer
    title: "Implement code change"
    prompt: |
      You are the `implementer` profile executing workflow cell `implement`.

      Workflow goal:
      Implement and review a requested code change.

      Cell objective:
      Implement the requested code change in repo `${ input.repo }` on branch `${ input.branch }`.

      Change request:
      ${ input.change_request }

      Constraints:
      - Stay within the requested change.
      - Preserve existing behavior and public interfaces unless the change request requires otherwise.
      - Run relevant tests or explain why they could not be run.
      - Complete the Kanban task with JSON only.

      Return JSON matching this contract:
      {
        "summary": "Short implementation summary",
        "changed_files": ["path/to/file"],
        "verification": ["command and result"]
      }

  review:
    type: agent_task
    profile: reviewer
    title: "Review code change"
    prompt: |
      You are the `reviewer` profile executing workflow cell `review`.

      Workflow goal:
      Implement and review a requested code change.

      Cell objective:
      Review the implementation in repo `${ input.repo }` on branch `${ input.branch }`.

      Implementation context:
      ${ node.implement.output }

      Constraints:
      - Check correctness, scope control, risks, and verification quality.
      - Request only changes needed to meet the original change request.
      - Use `approved` only when confidence is high enough for the workflow to continue.
      - Complete the Kanban task with JSON only.

      Return JSON matching this contract:
      {
        "verdict": "approved or changes_requested",
        "confidence": 0.0,
        "reason": "Why this verdict was reached",
        "required_changes": ["change to make, if any"]
      }

  decision:
    type: switch
    cases:
      - name: approved
        when:
          op: and
          args:
            - op: eq
              left: {path: "$.node.review.output.verdict"}
              right: approved
            - op: gte
              left: {path: "$.node.review.output.confidence"}
              right: 0.8

  approved:
    type: pass
    output:
      status: approved
      implementation: "${ node.implement.output }"
      review: "${ node.review.output }"

  revise:
    type: agent_task
    profile: implementer
    title: "Revise code change after review"
    prompt: |
      You are the `implementer` profile executing workflow cell `revise`.

      Workflow goal:
      Implement and review a requested code change.

      Cell objective:
      Revise the implementation in repo `${ input.repo }` on branch `${ input.branch }` according to review feedback.

      Original implementation:
      ${ node.implement.output }

      Review feedback:
      ${ node.review.output }

      Constraints:
      - Address the review feedback without broadening scope.
      - Preserve working behavior that the review did not challenge.
      - Run relevant tests or explain why they could not be run.
      - Complete the Kanban task with JSON only.

      Return JSON matching this contract:
      {
        "summary": "Short revision summary",
        "changed_files": ["path/to/file"],
        "verification": ["command and result"]
      }

  second_review:
    type: agent_task
    profile: reviewer
    title: "Review revised code change"
    prompt: |
      You are the `reviewer` profile executing workflow cell `second_review`.

      Workflow goal:
      Implement and review a requested code change.

      Cell objective:
      Review the revised implementation in repo `${ input.repo }` on branch `${ input.branch }`.

      Revision context:
      ${ node.revise.output }

      Constraints:
      - Verify the revision resolves the requested changes.
      - Check for regressions, missed feedback, and verification gaps.
      - Use `approved` only when the revised change is acceptable.
      - Complete the Kanban task with JSON only.

      Return JSON matching this contract:
      {
        "verdict": "approved or changes_requested",
        "confidence": 0.0,
        "reason": "Why this verdict was reached"
      }

  second_decision:
    type: switch
    cases:
      - name: approved
        when:
          op: eq
          left: {path: "$.node.second_review.output.verdict"}
          right: approved

  revised_success:
    type: pass
    output:
      status: approved_after_revision
      revision: "${ node.revise.output }"
      review: "${ node.second_review.output }"

  rejected:
    type: fail
    output:
      reason: "Second review did not approve the change. Inspect the review output."
      review: "${ node.second_review.output }"
edges:
  - from: start
    to: implement
  - from: implement
    to: review
  - from: review
    to: decision
  - from: decision.approved
    to: approved
  - from: decision.default
    to: revise
  - from: revise
    to: second_review
  - from: second_review
    to: second_decision
  - from: second_decision.approved
    to: revised_success
  - from: second_decision.default
    to: rejected
