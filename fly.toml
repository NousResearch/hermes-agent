app = "hermes-agent-q69nmw"
primary_region = "syd"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8080
min_machines_running = 0
processes = [ "app" ]

[[mounts]]
destination = "/opt/data"
source = "data"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 1024

[experimental]
cmd = ["/opt/hermes/docker/main-wrapper.sh"]
