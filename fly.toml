# Fly.io deployment manifest for Hermes Price Tracker
# Deploy: fly launch --config fly.toml  (first time)
#         fly deploy                    (updates)
#
# Required secrets (set once with `fly secrets set KEY=value`):
#   HERMES_OWNER_EMAIL          your admin email
#   HERMES_STRIPE_STARTER_LINK  https://buy.stripe.com/...  ($19/mo, 3 URLs)
#   HERMES_STRIPE_PRO_LINK      https://buy.stripe.com/...  ($49/mo, unlimited)
#   HERMES_STRIPE_PAYMENT_LINK  legacy single-link fallback (optional)
#   STRIPE_WEBHOOK_SECRET       whsec_...  (from Stripe → Webhooks)
#   STRIPE_SECRET_KEY           sk_live_...  (from Stripe API keys)
#   OPENROUTER_API_KEY          or any LLM provider key for AI extraction
#
# After deploy, register the Stripe webhook URL:
#   https://<your-app>.fly.dev/api/stripe/webhook
# Events to send: checkout.session.completed, customer.subscription.deleted,
#                 invoice.payment_failed, invoice.payment_succeeded
#
# First-time volume:
#   fly volumes create hermes_data --size 3 --region iad

app = "hermes-price-tracker"
primary_region = "iad"

[build]

[env]
  HERMES_HOME = "/opt/data"
  # Enable the web dashboard and bind to 0.0.0.0 so Fly's proxy can reach it.
  HERMES_DASHBOARD       = "true"
  HERMES_DASHBOARD_HOST  = "0.0.0.0"
  HERMES_DASHBOARD_PORT  = "9119"
  # Public access without OAuth — auth is enforced by the session token
  # injected into the SPA. Remove once you configure OAuth.
  HERMES_DASHBOARD_INSECURE = "true"

[http_service]
  internal_port = 9119
  force_https = true
  # Scale to zero when idle — true free tier. Fly cold-starts the machine
  # on the next request (~30s). Set min_machines_running = 1 (~$3/mo) once
  # you want it always warm.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/api/status"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "hermes_data"
  destination = "/opt/data"
  initial_size = "1gb"
