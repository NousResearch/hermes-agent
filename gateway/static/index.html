<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hermes Agent</title>
<link rel="icon" type="image/png" href="/icons/favicon.png">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="theme-color" content="#6c5ce7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" integrity="sha384-F/bZzf7p3Joyp5psL90p/p89AZJsndkSoGwRpXcZhleCWhd8SnRuoYo4d0yirjJp" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js" integrity="sha384-H+hy9ULve6xfxRkWIh/YOtvDdpXgV2fmAGQkIDTxIgZwNoaoBal14Di2YTMR6MzR" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js" integrity="sha384-cwS6YdhLI7XS60eoDiC+egV0qHp8zI+Cms46R0nbn8JrmoAzV9uFL60etMZhAnSu" crossorigin="anonymous"></script>
<style>
:root {
    --bg: #08090d;
    --bg-secondary: rgba(14,16,24,0.85);
    --bg-input: rgba(20,24,36,0.9);
    --glass: rgba(16,20,32,0.6);
    --glass-border: rgba(100,120,200,0.12);
    --border: rgba(80,100,160,0.15);
    --text: #e2e8f0;
    --text-muted: #64748b;
    --accent: #6c5ce7;
    --accent-glow: rgba(108,92,231,0.3);
    --accent-hover: #a29bfe;
    --user-bg: linear-gradient(135deg, #6c5ce7 0%, #4834d4 100%);
    --bot-bg: rgba(20,24,40,0.7);
    --error: #ff6b6b;
    --success: #51cf66;
    --radius: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden;
    background-image:
        radial-gradient(ellipse at 50% 0%, rgba(108,92,231,0.08) 0%, transparent 60%),
        linear-gradient(rgba(30,35,60,0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,35,60,0.3) 1px, transparent 1px);
    background-size: 100% 100%, 40px 40px, 40px 40px;
}

/* Auth */
#auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; gap: 20px; }
#auth-screen h1 { font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #e2e8f0, #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
#auth-screen p { color: var(--text-muted); font-size: 14px; }
#token-input { background: var(--bg-input); border: 1px solid var(--glass-border); color: var(--text); padding: 14px 18px; border-radius: 12px; font-size: 16px; width: 320px; max-width: 80vw; text-align: center; outline: none; backdrop-filter: blur(12px); transition: border-color 0.2s, box-shadow 0.2s; }
#token-input:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
#auth-btn { background: var(--accent); color: #fff; border: none; padding: 12px 36px; border-radius: 12px; font-size: 15px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
#auth-btn:hover { background: var(--accent-hover); box-shadow: 0 4px 24px var(--accent-glow); transform: translateY(-1px); }
#auth-error { color: var(--error); font-size: 13px; display: none; }

/* Layout */
#app-layout { display: none; height: 100dvh; }
@media (min-width: 800px) { #app-layout { display: none; } #app-layout.visible { display: flex; } }

/* Sidebar */
#sidebar {
    width: 260px; min-width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--glass-border);
    display: flex; flex-direction: column; height: 100dvh; flex-shrink: 0;
}
#sidebar-header { padding: 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--glass-border); }
#sidebar-header h2 { font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #e2e8f0, #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#new-chat-btn { background: var(--accent); color: #fff; border: none; padding: 6px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
#new-chat-btn:hover { background: var(--accent-hover); }
#session-list { flex: 1; overflow-y: auto; padding: 8px; }
#session-list::-webkit-scrollbar { width: 3px; }
#session-list::-webkit-scrollbar-thumb { background: rgba(100,120,200,0.2); border-radius: 3px; }
.session-item {
    padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    transition: all 0.15s; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.session-item:hover { background: rgba(108,92,231,0.1); color: var(--text); }
.session-item.active { background: rgba(108,92,231,0.15); color: var(--accent); border: 1px solid rgba(108,92,231,0.2); }
.session-item .session-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.session-item .session-delete { opacity: 0; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 2px 4px; }
.session-item:hover .session-delete { opacity: 1; }
.session-item .session-delete:hover { color: var(--error); }

/* Mobile sidebar */
@media (max-width: 799px) {
    #sidebar { position: fixed; left: -280px; z-index: 200; width: 280px; transition: left 0.3s; box-shadow: none; }
    #sidebar.open { left: 0; box-shadow: 4px 0 24px rgba(0,0,0,0.5); }
    #sidebar-overlay { position: fixed; inset: 0; z-index: 199; background: rgba(0,0,0,0.4); display: none; }
    #sidebar-overlay.visible { display: block; }
}
@media (min-width: 800px) { #sidebar-overlay { display: none !important; } }

/* Chat */
#chat-screen { display: flex; flex-direction: column; height: 100dvh; flex: 1; min-width: 0; position: relative; }
@media (min-width: 800px) { #chat-screen { border-right: 1px solid var(--glass-border); background: rgba(8,9,13,0.5); backdrop-filter: blur(8px); } }

/* Status bar */
#status-bar { background: var(--bg-secondary); backdrop-filter: blur(16px); border-bottom: 1px solid var(--glass-border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.menu-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; padding: 4px 8px; margin-right: 8px; display: none; }
@media (max-width: 799px) { .menu-btn { display: inline-block; } }
.menu-btn:hover { color: var(--text); }
#status-bar .title { font-weight: 700; font-size: 16px; letter-spacing: -0.3px; }
#status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 8px; box-shadow: 0 0 8px rgba(81,207,102,0.5); }
#status-dot.off { background: var(--error); box-shadow: 0 0 8px rgba(255,107,107,0.5); }
.status-right { display: flex; align-items: center; gap: 8px; }
.session-label { font-size: 11px; color: var(--text-muted); }

/* Messages */
#messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: rgba(100,120,200,0.2); border-radius: 4px; }

.msg { max-width: 80%; padding: 12px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.6; word-wrap: break-word; animation: msgIn 0.25s ease-out; }
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { align-self: flex-end; background: var(--user-bg); border-bottom-right-radius: 4px; box-shadow: 0 2px 16px rgba(108,92,231,0.2); }
.msg.bot { align-self: flex-start; background: var(--bot-bg); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; backdrop-filter: blur(8px); }
.msg.bot pre { background: rgba(8,9,13,0.8); border: 1px solid var(--glass-border); border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }
.msg.bot code { font-family: "JetBrains Mono", "Fira Code", "SF Mono", monospace; font-size: 13px; }
.msg.bot p code { background: rgba(108,92,231,0.15); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.msg.bot img { max-width: 100%; border-radius: 10px; margin: 8px 0; cursor: pointer; }
.msg.system { align-self: center; background: transparent; color: var(--text-muted); font-size: 13px; font-style: italic; padding: 4px 8px; }
.msg.error { align-self: center; color: var(--error); font-size: 13px; }
.msg .timestamp { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-align: right; }

/* Voice bubble */
.voice-bubble { display: flex; align-items: center; gap: 10px; min-width: 220px; padding: 4px 0; }
.voice-play-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; box-shadow: 0 2px 12px var(--accent-glow); }
.voice-play-btn:hover { background: var(--accent-hover); }
.voice-play-btn svg { fill: #fff; width: 16px; height: 16px; }
.voice-waveform { flex: 1; display: flex; align-items: center; gap: 2px; height: 28px; cursor: pointer; }
.voice-waveform .bar { width: 3px; border-radius: 2px; background: var(--accent); opacity: 0.3; transition: opacity 0.15s; }
.voice-waveform .bar.played { opacity: 1.0; }
.voice-time { font-size: 12px; color: var(--text-muted); min-width: 38px; text-align: right; flex-shrink: 0; }

/* File download */
.file-download { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; background: rgba(108,92,231,0.1); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--accent); text-decoration: none; font-size: 13px; margin: 4px 0; }
.file-download:hover { background: rgba(88,166,255,0.2); }

/* Typing */
.typing-indicator { display: none; align-self: flex-start; padding: 10px 16px; background: var(--bot-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); border-bottom-left-radius: 4px; backdrop-filter: blur(8px); }
.typing-indicator span { display: inline-block; width: 7px; height: 7px; background: var(--accent); border-radius: 50%; margin: 0 2px; animation: typing 1.4s infinite; }
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-5px); } }

/* Input bar */
#input-bar { background: var(--bg-secondary); backdrop-filter: blur(16px); border-top: 1px solid var(--glass-border); padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
#input { flex: 1; background: var(--bg-input); border: 1px solid var(--glass-border); color: var(--text); padding: 11px 16px; border-radius: 22px; font-size: 15px; font-family: inherit; resize: none; max-height: 120px; min-height: 44px; line-height: 1.4; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
#input:focus { border-color: var(--accent); box-shadow: 0 0 16px var(--accent-glow); }
#input::placeholder { color: var(--text-muted); }
.input-btn { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.input-btn svg { width: 20px; height: 20px; fill: currentColor; }
#send-btn { background: var(--accent); color: #fff; box-shadow: 0 2px 12px var(--accent-glow); }
#send-btn:hover { background: var(--accent-hover); box-shadow: 0 4px 20px var(--accent-glow); transform: translateY(-1px); }
#send-btn:disabled { opacity: 0.3; cursor: default; box-shadow: none; transform: none; }
#send-btn.stop-mode { background: var(--error); box-shadow: 0 2px 12px rgba(255,107,107,0.3); }
#attach-btn { background: var(--bg-input); border: 1px solid var(--glass-border); color: var(--text-muted); }
#attach-btn:hover { border-color: var(--accent); color: var(--accent); }
#voice-btn { background: var(--bg-input); border: 1px solid var(--glass-border); color: var(--text-muted); }
#voice-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
#voice-btn.recording { background: var(--error); border-color: var(--error); color: #fff; animation: pulse 1.5s infinite; box-shadow: 0 0 16px rgba(255,107,107,0.4); }
#voice-btn.voice-mode { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 16px var(--accent-glow); }
#input-bar.voice-mode-active { justify-content: center; }
#input-bar.voice-mode-active #input, #input-bar.voice-mode-active #send-btn, #input-bar.voice-mode-active #attach-btn, #input-bar.voice-mode-active #camera-btn { display: none; }
#input-bar.voice-mode-active #voice-btn { width: 56px; height: 56px; }
#input-bar.voice-mode-active #voice-btn svg { width: 26px; height: 26px; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
.file-input { display: none; }

.msg.bot { position: relative; }
.copy-btn { position: absolute; top: 6px; right: 6px; background: var(--bg-secondary); border: 1px solid var(--glass-border); color: var(--text-muted); border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
.msg.bot:hover .copy-btn { opacity: 1; }
.copy-btn:hover { color: var(--accent); border-color: var(--accent); }
.copy-btn.copied { color: var(--success, #4ade80); border-color: var(--success, #4ade80); }
#remember-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); margin-top: 8px; cursor: pointer; }
#remember-label input { accent-color: var(--accent); }
@media (max-width: 600px) { .msg { max-width: 90%; } #input-bar { padding: 10px 12px; gap: 8px; } }

/* Pixel Avatar */
#pixel-avatar {
    position: fixed; top: 80px; right: 16px;
    z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 8px;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
    transform: scale(0); opacity: 0; pointer-events: none;
    cursor: grab; user-select: none; touch-action: none;
}
#pixel-avatar.visible { transform: scale(1); opacity: 1; pointer-events: auto; }
#pixel-avatar canvas { image-rendering: pixelated; width: 120px; height: 120px; filter: drop-shadow(0 0 16px var(--accent-glow)); }
#avatar-status {
    font-size: 11px; color: var(--accent); background: var(--bg-secondary);
    border: 1px solid var(--glass-border); border-radius: 12px; padding: 4px 12px;
    text-align: center; white-space: nowrap;
}
#avatar-close {
    position: absolute; top: -12px; right: -12px;
    width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--glass-border);
    background: var(--bg-secondary); color: var(--text-muted); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; z-index: 101;
}
#avatar-close:hover { border-color: var(--error); color: var(--error); }
</style>
</head>
<body>

<!-- Auth -->
<div id="auth-screen">
    <h1>Hermes Agent</h1>
    <p>Enter API key to connect</p>
    <input type="password" id="token-input" placeholder="API Key" autocomplete="off">
    <label id="remember-label"><input type="checkbox" id="remember-key"> Remember on this device</label>
    <button id="auth-btn" onclick="doAuth()">Connect</button>
    <div id="auth-error">Invalid API key</div>
</div>

<!-- Pixel Avatar -->
<div id="pixel-avatar">
    <button id="avatar-close" onclick="exitVoiceMode()">&times;</button>
    <canvas id="avatar-canvas" width="16" height="16"></canvas>
    <div id="avatar-status">Listening...</div>
</div>

<!-- Sidebar overlay (mobile) -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- App layout -->
<div id="app-layout">
    <!-- Sidebar -->
    <nav id="sidebar">
        <div id="sidebar-header">
            <h2>Hermes Agent</h2>
            <button id="new-chat-btn" onclick="newSession()" aria-label="New chat">+ New</button>
        </div>
        <div id="session-list"></div>
    </nav>

    <!-- Chat -->
    <div id="chat-screen">
        <header id="status-bar">
            <div>
                <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
                <span id="status-dot"></span><span class="title">Hermes Agent</span>
            </div>
            <div class="status-right">
                <span class="session-label" id="session-label"></span>
            </div>
        </header>
    <div id="messages" aria-live="polite">
        <div class="typing-indicator" id="typing"><span></span><span></span><span></span></div>
    </div>
    <div id="input-bar">
        <button class="input-btn" id="voice-btn" title="Tap: push-to-talk | Hold: streaming mode" aria-label="Voice: tap to record, hold for streaming">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <textarea id="input" rows="1" placeholder="Type a message... (Enter to send)" onkeydown="handleKey(event)" oninput="autoGrow(this)" aria-label="Message input"></textarea>
        <input type="file" id="file-input" class="file-input" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.json,.md,.html,.zip" onchange="uploadFile(this)">
        <input type="file" id="camera-input" class="file-input" accept="image/*" capture="environment" onchange="uploadFile(this)">
        <button class="input-btn" id="camera-btn" onclick="document.getElementById('camera-input').click()" title="Take photo" aria-label="Take photo">
            <svg viewBox="0 0 24 24"><path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
        </button>
        <button class="input-btn" id="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach file" aria-label="Attach file">
            <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
        </button>
        <button class="input-btn" id="send-btn" onclick="sendMessage()" aria-label="Send message">
            <svg id="send-icon" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            <svg id="stop-icon" viewBox="0 0 24 24" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
    </div>
</div><!-- /chat-screen -->
</div><!-- /app-layout -->

<script>
const API_BASE = window.location.origin;
let apiKey = '';
let sessionId = '';
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let voiceMode = false;
let currentTtsAudio = null;
let autoScroll = true;

// iOS audio unlock: reuse a single Audio element to bypass autoplay restrictions.
// Once unlocked by a user gesture, subsequent .play() calls work without gesture.
const _ttsAudio = new Audio();
let _audioUnlocked = false;

function unlockAudio() {
    if (_audioUnlocked) return;
    _ttsAudio.src = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAAAAYYoRwmHAAAAAAD/+1DEAAAFAAGf9AAAIiMksr8z0BAAAIA+D4Pg+BAEHygIAgGP/BwfB8HwfAgAAAAAAMf/ygIAhiGP/5QEMQx//8oCAIYhj/+UBAEAwAAAAAAAAAAA';
    _ttsAudio.volume = 0.01;
    _ttsAudio.play().then(() => { _audioUnlocked = true; _ttsAudio.pause(); }).catch(() => {});
}

// Unlock on any user interaction
document.addEventListener('click', unlockAudio, {once: false});
document.addEventListener('touchstart', unlockAudio, {once: false});

const messagesEl = document.getElementById('messages');
const typingEl = document.getElementById('typing');

// Markdown
marked.setOptions({
    highlight: (code, lang) => lang && hljs.getLanguage(lang) ? hljs.highlight(code, {language: lang}).value : hljs.highlightAuto(code).value,
    breaks: true, gfm: true,
});

// ── Auth ───────────────────────────────────────────────────────────

document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });

// Restore session ID and optionally API key
const savedSess = localStorage.getItem('hermes_session_id');
if (savedSess) sessionId = savedSess;
const savedKey = localStorage.getItem('hermes_api_key');
if (savedKey) { apiKey = savedKey; document.getElementById('token-input').value = '********'; document.getElementById('remember-key').checked = true; doAuth(); }

function doAuth() {
    const inputKey = document.getElementById('token-input').value.trim();
    if (inputKey && inputKey !== '********') apiKey = inputKey;
    if (!apiKey) return;
    document.getElementById('auth-error').style.display = 'none';

    fetch(`${API_BASE}/v1/sessions`, { headers: { 'Authorization': `Bearer ${apiKey}` } })
    .then(r => {
        if (r.ok) {
            if (document.getElementById('remember-key').checked) localStorage.setItem('hermes_api_key', apiKey);
            else localStorage.removeItem('hermes_api_key');
            if (!sessionId) { sessionId = 'web-' + Array.from(crypto.getRandomValues(new Uint8Array(8)), b => b.toString(16).padStart(2,'0')).join(''); localStorage.setItem('hermes_session_id', sessionId); }
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-layout').style.display = 'flex';
            document.getElementById('app-layout').classList.add('visible');
            document.getElementById('session-label').textContent = sessionId;
            loadSessions();
            connectWebSocket();
            loadHistory();
        } else {
            document.getElementById('auth-error').style.display = 'block';
        }
    }).catch(() => { document.getElementById('auth-error').textContent = 'Cannot connect'; document.getElementById('auth-error').style.display = 'block'; });
}

// ── Session management ──────────────────────────────────────────

function _generateSessionId() {
    return 'web-' + Array.from(crypto.getRandomValues(new Uint8Array(8)), b => b.toString(16).padStart(2,'0')).join('');
}

function _getSessionList() {
    return JSON.parse(localStorage.getItem('hermes_sessions') || '[]');
}

function _saveSessionList(list) {
    localStorage.setItem('hermes_sessions', JSON.stringify(list));
}

function _addSessionToList(sid) {
    const list = _getSessionList();
    if (!list.find(s => s.id === sid)) {
        list.unshift({ id: sid, title: sid, time: Date.now() });
        _saveSessionList(list);
    }
}

function switchSession(sid) {
    if (sid === sessionId) { closeSidebar(); return; }
    sessionId = sid;
    localStorage.setItem('hermes_session_id', sessionId);
    document.getElementById('session-label').textContent = sessionId;
    while (messagesEl.firstChild !== typingEl) messagesEl.removeChild(messagesEl.firstChild);
    loadHistory();
    loadSessions();
    connectWebSocket();
    closeSidebar();
}

function newSession() {
    _addSessionToList(sessionId); // save current before switching
    sessionId = _generateSessionId();
    localStorage.setItem('hermes_session_id', sessionId);
    _addSessionToList(sessionId);
    document.getElementById('session-label').textContent = sessionId;
    while (messagesEl.firstChild !== typingEl) messagesEl.removeChild(messagesEl.firstChild);
    addSystemMessage('New session started');
    loadSessions();
    connectWebSocket();
    closeSidebar();
}

function deleteSession(sid, e) {
    e.stopPropagation();
    const list = _getSessionList().filter(s => s.id !== sid);
    _saveSessionList(list);
    localStorage.removeItem(`hermes_history_${sid}`);
    if (sid === sessionId) newSession();
    else loadSessions();
}

function loadSessions() {
    _addSessionToList(sessionId); // ensure current is in list
    const list = _getSessionList();
    const container = document.getElementById('session-list');
    container.innerHTML = '';
    list.forEach(s => {
        const div = document.createElement('div');
        div.className = 'session-item' + (s.id === sessionId ? ' active' : '');
        div.onclick = () => switchSession(s.id);

        const name = document.createElement('span');
        name.className = 'session-name';
        // Show first message as title, or session ID
        const history = JSON.parse(localStorage.getItem(`hermes_history_${s.id}`) || '[]');
        const firstMsg = history.find(m => m.type === 'user');
        name.textContent = firstMsg ? firstMsg.content.substring(0, 40) : s.id;
        div.appendChild(name);

        const del = document.createElement('button');
        del.className = 'session-delete';
        del.textContent = '\u00d7';
        del.setAttribute('aria-label', 'Delete session');
        del.onclick = (e) => deleteSession(s.id, e);
        div.appendChild(del);

        container.appendChild(div);
    });
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('visible');
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('visible');
}

// ── WebSocket connection ────────────────────────────────────────────

let _ws = null;
let _wsReconnectTimer = null;
let _streamingDiv = null; // current bot message being streamed
let _streamingText = '';  // accumulated text for current stream
let _streamingMedia = []; // accumulated media for current stream

function connectWebSocket() {
    if (_ws && (_ws.readyState === WebSocket.OPEN || _ws.readyState === WebSocket.CONNECTING)) {
        _ws.close();
    }
    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    _ws = new WebSocket(`${wsProto}//${location.host}/v1/chat/stream`);

    _ws.onopen = () => {
        _ws.send(JSON.stringify({ type: 'auth', token: apiKey, session_id: sessionId }));
    };

    _ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === 'auth_ok') {
            document.getElementById('status-dot').style.background = '#4ade80';
            return;
        }

        // Intercept command responses (sendCommand waiting for done)
        if (_commandResolve) {
            if (msg.type === 'done') { const r = _commandResolve; _commandResolve = null; r(); }
            // Discard command's text response, pass errors through
            if (msg.type === 'message') return;
        }

        if (msg.type === 'message') {
            hideTyping();
            _streamingText += msg.content;
            if (!_streamingDiv) {
                _streamingDiv = document.createElement('div');
                _streamingDiv.className = 'msg bot';
                messagesEl.insertBefore(_streamingDiv, typingEl);
            }
            _streamingDiv.innerHTML = renderMarkdown(_streamingText);
            highlightCode(_streamingDiv);
            scrollToBottom();
            return;
        }

        if (msg.type === 'done') {
            hideTyping();
            // Finalize streamed message
            if (_streamingDiv && _streamingText) {
                // Add copy button
                const copyBtn = document.createElement('button'); copyBtn.className = 'copy-btn'; copyBtn.textContent = 'Copy'; copyBtn.setAttribute('aria-label', 'Copy message');
                const finalText = _streamingText;
                copyBtn.onclick = () => { navigator.clipboard.writeText(finalText).then(() => { copyBtn.textContent = 'Copied'; copyBtn.classList.add('copied'); setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1500); }); };
                _streamingDiv.appendChild(copyBtn);
                detectVoiceMode(_streamingText);
                saveHistory('bot', _streamingText, _streamingMedia.length ? _streamingMedia : null);
            }
            // Handle accumulated media
            _streamingMedia.forEach(m => {
                const url = m.url ? (m.url.startsWith('http') ? m.url : `${API_BASE}${m.url}`) : null;
                if (m.type === 'audio' && url) playTtsAndMaybeRestart(url);
                else if (m.type === 'image' && url) addImageMessage(url, m.caption);
                else if (m.type === 'video' && url) addVideoMessage(url, m.caption);
                else if (m.type === 'document' && url) addDocumentMessage(url, m.filename || 'file', m.caption);
            });
            // Voice mode: restart listening if no TTS
            if (voiceMode && !_streamingMedia.some(m => m.type === 'audio')) {
                setAvatarState('listening');
                setTimeout(() => { if (voiceMode && !currentTtsAudio) startRecording(); }, 500);
            }
            // Reset streaming state
            _streamingDiv = null;
            _streamingText = '';
            _streamingMedia = [];
            return;
        }

        if (msg.type === 'error') {
            hideTyping();
            addSystemMessage(msg.content || 'Server error');
            _streamingDiv = null; _streamingText = ''; _streamingMedia = [];
            return;
        }

        // Media messages (image, audio, video, document) during stream
        if (['image', 'audio', 'video', 'document'].includes(msg.type)) {
            _streamingMedia.push(msg);
            return;
        }
    };

    _ws.onclose = () => {
        document.getElementById('status-dot').style.background = '#ef4444';
        // Clean up partial streaming state
        if (_streamingDiv) { _streamingDiv = null; _streamingText = ''; _streamingMedia = []; }
        if (_commandResolve) { const r = _commandResolve; _commandResolve = null; r(); }
        hideTyping();
        // Auto-reconnect after 3 seconds
        clearTimeout(_wsReconnectTimer);
        _wsReconnectTimer = setTimeout(() => { if (apiKey) connectWebSocket(); }, 3000);
    };

    _ws.onerror = () => {}; // onclose handles reconnect
}

// ── Send text (via WebSocket) ───────────────────────────────────────

function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    input.value = ''; input.style.height = 'auto';
    addUserMessage(text);
    showTyping();

    if (_ws && _ws.readyState === WebSocket.OPEN) {
        _ws.send(JSON.stringify({ message: text }));
    } else {
        // Fallback to HTTP if WS not connected
        fetch(`${API_BASE}/v1/chat`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, session_id: sessionId }),
        }).then(r => r.json()).then(data => {
            hideTyping();
            handleResponse(data);
        }).catch(e => { hideTyping(); addSystemMessage('Request failed'); });
    }
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoGrow(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

// ── Handle response (HTTP fallback + voice) ─────────────────────────

function handleResponse(data) {
    let text = data.response || '';
    if (text) {
        addBotMessage(text);
        detectVoiceMode(text);
        saveHistory('bot', text, data.media);
    }
    if (data.media) {
        data.media.forEach(m => {
            const url = m.url ? (m.url.startsWith('http') ? m.url : `${API_BASE}${m.url}`) : null;
            if (m.type === 'audio' && url) playTtsAndMaybeRestart(url);
            else if (m.type === 'image' && url) addImageMessage(url, m.caption);
            else if (m.type === 'video' && url) addVideoMessage(url, m.caption);
            else if (m.type === 'document' && url) addDocumentMessage(url, m.filename || 'file', m.caption);
        });
    }
    if (voiceMode && !data.media?.some(m => m.type === 'audio')) {
        setAvatarState('listening');
        setTimeout(() => { if (voiceMode && !currentTtsAudio) startRecording(); }, 500);
    }
}


function detectVoiceMode(text) {
    const l = text.toLowerCase();
    if (l.includes('voice mode disabled') || l.includes('text-only')) {
        if (voiceMode) exitVoiceMode();
    }
}

// ── TTS playback with echo prevention ──────────────────────────────

function playTtsAndMaybeRestart(url) {
    // Reuse the pre-unlocked Audio element for iOS compatibility
    _ttsAudio.src = url;
    _ttsAudio.volume = 1;
    currentTtsAudio = _ttsAudio;
    // Pause mic during TTS
    if (isRecording) stopRecording();
    if (voiceMode) setAvatarState('speaking');

    _ttsAudio.onended = () => {
        currentTtsAudio = null;
        if (voiceMode) { setAvatarState('listening'); startRecording(); }
    };
    _ttsAudio.onerror = () => {
        currentTtsAudio = null;
        if (voiceMode) { setAvatarState('listening'); startRecording(); }
    };
    _ttsAudio.play().catch(() => { currentTtsAudio = null; if (voiceMode) { setAvatarState('listening'); startRecording(); } });
}

// ── Voice mode & VAD ───────────────────────────────────────────────

const SILENCE_THRESHOLD = 0.015;
const SILENCE_DURATION = 1500;

// ── Mic button: tap = push-to-talk, long press = streaming mode ──

const LONG_PRESS_MS = 500;
let _pressTimer = null;
let _pressHandled = false;

(function initVoiceBtn() {
    const btn = document.getElementById('voice-btn');

    function onDown(e) {
        e.preventDefault();
        _pressHandled = false;
        _pressTimer = setTimeout(() => {
            _pressHandled = true;
            if (voiceMode) exitVoiceMode();
            else enterVoiceMode();
        }, LONG_PRESS_MS);
    }

    function onUp(e) {
        e.preventDefault();
        clearTimeout(_pressTimer);
        if (_pressHandled) return;
        // Short tap: push-to-talk
        if (isRecording) stopRecording();
        else startPushToTalk();
    }

    function onCancel(e) {
        clearTimeout(_pressTimer);
    }

    // Mouse
    btn.addEventListener('mousedown', onDown);
    btn.addEventListener('mouseup', onUp);
    btn.addEventListener('mouseleave', onCancel);
    // Touch
    btn.addEventListener('touchstart', onDown, {passive: false});
    btn.addEventListener('touchend', onUp, {passive: false});
    btn.addEventListener('touchcancel', onCancel);
})();

// ── Push-to-talk (tap mic, works in any mode) ────────────────────

async function startPushToTalk() {
    if (isRecording || currentTtsAudio) return;
    // If in streaming mode, pause it for manual recording
    if (voiceMode) stopRecording();
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
        });
        audioChunks = [];
        const mimeType = getSupportedMime();
        mediaRecorder = new MediaRecorder(stream, mimeType ? {mimeType} : {});
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            if (audioChunks.length === 0) return;
            const blob = new Blob(audioChunks, {type: mediaRecorder.mimeType});
            await sendVoice(blob);
        };
        mediaRecorder.start();
        isRecording = true;
        document.getElementById('voice-btn').classList.add('recording');
    } catch (err) {
        addSystemMessage('Microphone access denied');
    }
}

// ── Pixel Avatar ─────────────────────────────────────────────────

const _avatarCanvas = document.getElementById('avatar-canvas');
const _avatarCtx = _avatarCanvas.getContext('2d');
let _avatarState = 'idle'; // idle, listening, speaking, thinking
let _avatarFrame = 0;
let _avatarBlink = 0;
let _avatarMouth = 0; // 0-3 mouth openness from audio RMS
let _avatarAnimId = null;

// 16x16 pixel character palette
const P = {
    _: null,              // transparent
    h: '#5b3a8c',         // hair (dark purple)
    H: '#7b52b3',         // hair highlight
    s: '#ffe0bd',         // skin
    S: '#ffd1a3',         // skin shadow
    e: '#2d1b69',         // eyes
    E: '#6c5ce7',         // eye glow (accent)
    m: '#e74c7a',         // mouth
    M: '#ff6b9d',         // mouth open
    b: '#1a1a2e',         // body/outfit dark
    B: '#6c5ce7',         // body accent
    c: '#fff',            // eye white/highlight
};

// Character sprite frames (16x16 grid)
const _sprites = {
    base: [
        '____hhhhhh______',
        '___hHhhhhhHh____',
        '__hhhhhhhhhhh___',
        '__hssssssssssh__',
        '_hsscsseescssh__',
        '_hssssssssssh___',
        '__hsssSssSssh___',
        '__hssssmmssh____',
        '___hsssssssh____',
        '____hhsshh______',
        '____bBBBBb______',
        '___bbBBBBbb_____',
        '___bbbBBbbb_____',
        '___bb____bb_____',
        '___bs____sb_____',
        '___ss____ss_____',
    ],
    eyesClosed: 'ss__ss',  // replaces eyes row
    mouthOpen: ['mm', 'Mm', 'MM'], // small, medium, large
};

function drawPixelAvatar() {
    const ctx = _avatarCtx;
    ctx.clearRect(0, 0, 16, 16);

    const sprite = _sprites.base;
    for (let y = 0; y < 16; y++) {
        const row = sprite[y];
        for (let x = 0; x < row.length; x++) {
            const ch = row[x];
            if (ch === '_') continue;
            let color = P[ch];
            if (!color) continue;

            // Blink: replace eye pixels
            if (y === 4 && _avatarBlink > 0 && (ch === 'e' || ch === 'c')) {
                color = P.s; // skin color = closed eyes
            }

            // Eye glow when listening
            if ((ch === 'e' || ch === 'c') && _avatarState === 'listening') {
                if (ch === 'e') color = P.E;
            }

            // Mouth animation when speaking
            if (y === 7 && ch === 'm' && _avatarState === 'speaking' && _avatarMouth > 0) {
                color = _avatarMouth >= 2 ? P.M : P.m;
            }

            ctx.fillStyle = color;
            ctx.fillRect(x, y, 1, 1);
        }
    }

    // Draw open mouth when speaking
    if (_avatarState === 'speaking' && _avatarMouth >= 2) {
        ctx.fillStyle = P.M;
        ctx.fillRect(6, 7, 1, 1);
        ctx.fillRect(7, 7, 1, 1);
        if (_avatarMouth >= 3) {
            ctx.fillRect(6, 8, 2, 1);
        }
    }

    // Thinking dots above head
    if (_avatarState === 'thinking') {
        const dotPos = Math.floor(_avatarFrame / 12) % 4;
        ctx.fillStyle = P.E;
        if (dotPos >= 1) ctx.fillRect(11, 1, 1, 1);
        if (dotPos >= 2) ctx.fillRect(13, 0, 1, 1);
        if (dotPos >= 3) ctx.fillRect(15, 0, 1, 1);
    }
}

function animateAvatar() {
    _avatarFrame++;

    // Blink every ~3 seconds
    if (_avatarFrame % 90 === 0) _avatarBlink = 4;
    if (_avatarBlink > 0) _avatarBlink--;

    // Audio-reactive mouth
    if (_avatarState === 'speaking' && currentTtsAudio && !currentTtsAudio.paused) {
        // Simulate mouth movement from audio (randomized when no analyser)
        _avatarMouth = Math.floor(Math.random() * 4);
    } else if (_avatarState !== 'speaking') {
        _avatarMouth = 0;
    }

    // Gentle bounce for listening state
    const canvas = _avatarCanvas;
    if (_avatarState === 'listening') {
        const bounce = Math.sin(_avatarFrame * 0.05) * 2;
        canvas.style.transform = `translateY(${bounce}px)`;
    } else {
        canvas.style.transform = '';
    }

    drawPixelAvatar();
    _avatarAnimId = requestAnimationFrame(animateAvatar);
}

function showAvatar(state) {
    _avatarState = state || 'idle';
    _avatarFrame = 0;
    document.getElementById('pixel-avatar').classList.add('visible');
    updateAvatarStatus();
    if (!_avatarAnimId) animateAvatar();
}

function hideAvatar() {
    document.getElementById('pixel-avatar').classList.remove('visible');
    if (_avatarAnimId) { cancelAnimationFrame(_avatarAnimId); _avatarAnimId = null; }
}

function setAvatarState(state) {
    _avatarState = state;
    updateAvatarStatus();
}

function updateAvatarStatus() {
    const el = document.getElementById('avatar-status');
    const labels = { idle: 'Ready', listening: 'Listening...', speaking: 'Speaking...', thinking: 'Thinking...' };
    el.textContent = labels[_avatarState] || _avatarState;
}

// ── Drag avatar ──────────────────────────────────────────────────

(function initAvatarDrag() {
    const el = document.getElementById('pixel-avatar');
    let dragging = false, startX, startY, origX, origY;

    function onStart(e) {
        if (e.target.id === 'avatar-close') return;
        dragging = true;
        const t = e.touches ? e.touches[0] : e;
        startX = t.clientX; startY = t.clientY;
        const rect = el.getBoundingClientRect();
        origX = rect.left; origY = rect.top;
        el.style.cursor = 'grabbing';
        e.preventDefault();
    }
    function onMove(e) {
        if (!dragging) return;
        const t = e.touches ? e.touches[0] : e;
        const dx = t.clientX - startX, dy = t.clientY - startY;
        el.style.right = 'auto'; el.style.top = 'auto';
        el.style.left = (origX + dx) + 'px';
        el.style.top = (origY + dy) + 'px';
    }
    function onEnd() { dragging = false; el.style.cursor = 'grab'; }

    el.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    el.addEventListener('touchstart', onStart, {passive: false});
    document.addEventListener('touchmove', onMove, {passive: false});
    document.addEventListener('touchend', onEnd);
})();

// ── Streaming voice mode (long press, always voice all) ──────────

async function enterVoiceMode() {
    voiceMode = true;
    document.getElementById('voice-btn').classList.add('voice-mode');
    document.getElementById('input-bar').classList.add('voice-mode-active');
    showAvatar('listening');
    // Wait for backend to enable TTS before starting recording (prevents queue race)
    await sendCommand('/voice tts');
    startRecording();
}

async function exitVoiceMode() {
    voiceMode = false;
    document.getElementById('voice-btn').classList.remove('voice-mode');
    document.getElementById('input-bar').classList.remove('voice-mode-active');
    if (currentTtsAudio) { currentTtsAudio.pause(); currentTtsAudio = null; }
    stopRecording();
    hideAvatar();
    addSystemMessage('Streaming mode off');
    // Switch to voice_only so push-to-talk still gets TTS
    await sendCommand('/voice on');
}

let _commandResolve = null; // pending sendCommand promise resolver

async function sendCommand(cmd) {
    if (_ws && _ws.readyState === WebSocket.OPEN) {
        return new Promise((resolve) => {
            _commandResolve = resolve;
            _ws.send(JSON.stringify({ message: cmd }));
            // Timeout: don't wait forever if done never arrives
            setTimeout(() => { if (_commandResolve === resolve) { _commandResolve = null; resolve(); } }, 10000);
        });
    }
    // HTTP fallback
    try {
        const resp = await fetch(`${API_BASE}/v1/chat`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: cmd, session_id: sessionId }),
        });
        await resp.json();
    } catch (e) {}
}

async function startRecording() {
    if (isRecording || currentTtsAudio) return;
    isRecording = true; // Set early to prevent async race before getUserMedia resolves
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
        });
        audioChunks = [];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512;
        source.connect(analyser);
        const dataArray = new Float32Array(analyser.fftSize);
        let silenceStart = null;
        let hasSpoken = false;
        let vadActive = true;

        const mimeType = getSupportedMime();
        mediaRecorder = new MediaRecorder(stream, mimeType ? {mimeType} : {});
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
            vadActive = false;
            audioCtx.close();
            stream.getTracks().forEach(t => t.stop());
            if (audioChunks.length === 0 || !hasSpoken) {
                if (voiceMode) setTimeout(startRecording, 200);
                return;
            }
            // Don't send partial recording if voice mode was just exited
            if (!voiceMode) return;
            const blob = new Blob(audioChunks, {type: mediaRecorder.mimeType});
            await sendVoice(blob);
        };
        mediaRecorder.start();
        document.getElementById('voice-btn').classList.add('recording');

        // VAD: detect silence to auto-stop
        function checkVAD() {
            if (!vadActive || !isRecording) return;
            analyser.getFloatTimeDomainData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i] * dataArray[i];
            const rms = Math.sqrt(sum / dataArray.length);

            if (rms > SILENCE_THRESHOLD) {
                hasSpoken = true;
                silenceStart = null;
            } else if (hasSpoken) {
                if (!silenceStart) silenceStart = Date.now();
                else if (Date.now() - silenceStart > SILENCE_DURATION) {
                    stopRecording();
                    return;
                }
            }
            setTimeout(checkVAD, 50);
        }
        setTimeout(checkVAD, 50);
    } catch (err) {
        isRecording = false; // Reset early guard on failure
        addSystemMessage('Microphone access denied');
        if (voiceMode) exitVoiceMode();
    }
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    isRecording = false;
    document.getElementById('voice-btn').classList.remove('recording');
}

async function sendVoice(blob) {
    // Show playable voice bubble for user's recording
    const blobUrl = URL.createObjectURL(blob);
    addUserVoiceMessage(blobUrl);
    showTyping();
    if (voiceMode) setAvatarState('thinking');
    try {
        // Step 1: Upload and transcribe only
        const ext = blob.type.includes('webm') ? '.webm' : '.ogg';
        const form = new FormData();
        form.append('file', blob, `voice${ext}`);
        const transcribeResp = await fetch(`${API_BASE}/v1/transcribe`, {
            method: 'POST', headers: { 'Authorization': `Bearer ${apiKey}` }, body: form,
        });
        if (!transcribeResp.ok) { hideTyping(); addSystemMessage('Voice processing failed'); if (voiceMode) { setAvatarState('listening'); startRecording(); } return; }
        const { transcript } = await transcribeResp.json();

        // Step 2: Send transcript via WS with voice flag for streaming response
        if (_ws && _ws.readyState === WebSocket.OPEN) {
            _ws.send(JSON.stringify({ message: transcript, voice: true }));
            // Response will stream via WS onmessage handler
        } else {
            // HTTP fallback: use original voice endpoint
            const form2 = new FormData();
            form2.append('file', blob, `voice${ext}`);
            form2.append('session_id', sessionId);
            const resp = await fetch(`${API_BASE}/v1/chat/voice`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${apiKey}` }, body: form2,
            });
            hideTyping();
            if (!resp.ok) { addSystemMessage('Voice processing failed'); if (voiceMode) { setAvatarState('listening'); startRecording(); } return; }
            handleResponse(await resp.json());
        }
    } catch (e) {
        hideTyping();
        addSystemMessage('Voice request failed');
        if (voiceMode) { setAvatarState('listening'); startRecording(); }
    }
}

// ── File upload ────────────────────────────────────────────────────

async function uploadFile(el) {
    const file = el.files[0]; if (!file) return; el.value = '';

    // Show preview based on file type
    const blobUrl = URL.createObjectURL(file);
    if (file.type.startsWith('image/') || /\.(jpg|jpeg|png|gif|svg|webp|heic|heif)$/i.test(file.name)) {
        addUserImageMessage(blobUrl, file.name);
    } else if (file.type.startsWith('video/') || /\.(mp4|webm|mov|avi|mkv)$/i.test(file.name)) {
        addUserVideoMessage(blobUrl, file.name);
    } else if (file.type.startsWith('audio/') || /\.(mp3|ogg|wav|opus|m4a|flac|aac|wma)$/i.test(file.name)) {
        addUserAudioMessage(blobUrl, file.name);
    } else {
        addUserFileMessage(file.name, file.size);
    }

    try {
        const form = new FormData(); form.append('file', file);
        const resp = await fetch(`${API_BASE}/v1/upload`, {
            method: 'POST', headers: { 'Authorization': `Bearer ${apiKey}` }, body: form,
        });
        if (!resp.ok) { addSystemMessage('Upload failed'); return; }
        const d = await resp.json();

        // Send the uploaded file URL to the agent as a message
        showTyping();
        const chatResp = await fetch(`${API_BASE}/v1/chat`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: `[User uploaded file: ${d.filename} (${d.content_type})] ${d.url}`, session_id: sessionId }),
        });
        hideTyping();
        if (chatResp.ok) {
            const chatData = await chatResp.json();
            handleResponse(chatData);
        }
    } catch (e) { hideTyping(); addSystemMessage('Upload failed'); }
}

// ── Shared voice bubble builder ─────────────────────────────────

function createVoiceBubble(audioUrl, opts = {}) {
    const barColor = opts.barColor || 'var(--accent)';
    const barPlayedOpacity = opts.barPlayedOpacity || '1';
    const barUnplayedOpacity = opts.barUnplayedOpacity || '0.3';
    const timeColor = opts.timeColor || 'var(--text-muted)';
    const barCount = opts.barCount || 30;

    const audio = new Audio(audioUrl); audio.preload = 'metadata';
    const bubble = document.createElement('div'); bubble.className = 'voice-bubble';
    const playSvg = '<svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>';
    const pauseSvg = '<svg viewBox="0 0 24 24"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>';
    const btn = document.createElement('button'); btn.className = 'voice-play-btn';
    btn.innerHTML = playSvg; bubble.appendChild(btn);

    const waveform = document.createElement('div'); waveform.className = 'voice-waveform';
    const bars = [];
    for (let i = 0; i < barCount; i++) {
        const bar = document.createElement('div'); bar.className = 'bar';
        bar.style.height = (6 + Math.random() * 22) + 'px';
        bar.style.background = barColor; bar.style.opacity = barUnplayedOpacity;
        waveform.appendChild(bar); bars.push(bar);
    }
    bubble.appendChild(waveform);

    const timeEl = document.createElement('div'); timeEl.className = 'voice-time';
    timeEl.style.color = timeColor; timeEl.textContent = '0:00';
    bubble.appendChild(timeEl);

    const fmt = s => { const m = Math.floor(s/60); const sec = Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; };
    audio.addEventListener('loadedmetadata', () => { if (isFinite(audio.duration)) timeEl.textContent = fmt(audio.duration); });

    let playing = false;
    function updateProgress() {
        if (!isFinite(audio.duration)) return;
        const pct = audio.currentTime / audio.duration;
        bars.forEach((b, i) => { b.style.opacity = i <= Math.floor(pct * barCount) ? barPlayedOpacity : barUnplayedOpacity; });
        timeEl.textContent = fmt(audio.currentTime);
        if (playing) requestAnimationFrame(updateProgress);
    }
    btn.onclick = () => { if (playing) audio.pause(); else audio.play(); };
    audio.onplay = () => { playing = true; btn.innerHTML = pauseSvg; updateProgress(); };
    audio.onpause = () => { playing = false; btn.innerHTML = playSvg; };
    audio.onended = () => { playing = false; btn.innerHTML = playSvg; bars.forEach(b => b.style.opacity = barUnplayedOpacity); if (isFinite(audio.duration)) timeEl.textContent = fmt(audio.duration); };
    waveform.onclick = (e) => { if (!isFinite(audio.duration)) return; const r = waveform.getBoundingClientRect(); audio.currentTime = ((e.clientX-r.left)/r.width)*audio.duration; if (!playing) audio.play(); };

    return { bubble, audio };
}

function addUserMessage(text, save = true) {
    const div = document.createElement('div'); div.className = 'msg user'; div.textContent = text;
    messagesEl.insertBefore(div, typingEl); scrollToBottom();
    if (save) saveHistory('user', text);
}

function addUserVoiceMessage(audioUrl) {
    const div = document.createElement('div'); div.className = 'msg user';
    const { bubble } = createVoiceBubble(audioUrl, { barColor: '#fff', barUnplayedOpacity: '0.4', barPlayedOpacity: '1', timeColor: 'rgba(255,255,255,0.7)', barCount: 25 });
    div.appendChild(bubble);
    messagesEl.insertBefore(div, typingEl); scrollToBottom(); saveHistory('user', '[Voice message]');
}

function addBotMessage(content) {
    const div = document.createElement('div'); div.className = 'msg bot';
    div.innerHTML = renderMarkdown(content);
    highlightCode(div);
    const copyBtn = document.createElement('button'); copyBtn.className = 'copy-btn'; copyBtn.textContent = 'Copy'; copyBtn.setAttribute('aria-label', 'Copy message');
    copyBtn.onclick = () => { navigator.clipboard.writeText(content).then(() => { copyBtn.textContent = 'Copied'; copyBtn.classList.add('copied'); setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1500); }); };
    div.appendChild(copyBtn);
    messagesEl.insertBefore(div, typingEl); scrollToBottom();
}

function addUserImageMessage(url, filename) {
    const div = document.createElement('div'); div.className = 'msg user';
    const img = document.createElement('img');
    img.src = url; img.style.cssText = 'max-width:100%;max-height:200px;border-radius:10px;cursor:pointer';
    img.onclick = () => window.open(url, '_blank');
    div.appendChild(img);
    if (filename) { const label = document.createElement('div'); label.style.cssText = 'font-size:11px;opacity:0.7;margin-top:4px'; label.textContent = filename; div.appendChild(label); }
    messagesEl.insertBefore(div, typingEl); scrollToBottom(); saveHistory('user', `[Image: ${filename}]`);
}

function addImageMessage(url, caption) {
    const div = document.createElement('div'); div.className = 'msg bot';
    if (caption) div.innerHTML = renderMarkdown(caption);
    const img = document.createElement('img'); img.src = url; img.onclick = () => window.open(url, '_blank');
    div.appendChild(img);
    messagesEl.insertBefore(div, typingEl); scrollToBottom();
}

function addUserAudioMessage(url, filename) {
    const div = document.createElement('div'); div.className = 'msg user';
    const { bubble } = createVoiceBubble(url, { barColor: '#fff', barUnplayedOpacity: '0.4', barPlayedOpacity: '1', timeColor: 'rgba(255,255,255,0.7)', barCount: 25 });
    div.appendChild(bubble);
    if (filename) { const label = document.createElement('div'); label.style.cssText = 'font-size:11px;opacity:0.7;margin-top:4px'; label.textContent = filename; div.appendChild(label); }
    messagesEl.insertBefore(div, typingEl); scrollToBottom(); saveHistory('user', `[Audio: ${filename}]`);
}

function addUserFileMessage(filename, size) {
    const div = document.createElement('div'); div.className = 'msg user';
    const sizeStr = size < 1024 ? size+'B' : size < 1048576 ? (size/1024).toFixed(1)+'KB' : (size/1048576).toFixed(1)+'MB';
    const wrapper = document.createElement('div'); wrapper.style.cssText = 'display:flex;align-items:center;gap:8px';
    wrapper.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>';
    const info = document.createElement('div');
    const nameEl = document.createElement('div'); nameEl.textContent = filename; info.appendChild(nameEl);
    const sizeEl = document.createElement('div'); sizeEl.style.cssText = 'font-size:11px;opacity:0.7'; sizeEl.textContent = sizeStr; info.appendChild(sizeEl);
    wrapper.appendChild(info); div.appendChild(wrapper);
    messagesEl.insertBefore(div, typingEl); scrollToBottom(); saveHistory('user', `[File: ${filename}]`);
}

function addUserVideoMessage(url, filename) {
    const div = document.createElement('div'); div.className = 'msg user';
    const video = document.createElement('video');
    video.src = url; video.controls = true; video.preload = 'metadata';
    video.style.cssText = 'max-width:100%;max-height:200px;border-radius:10px';
    div.appendChild(video);
    if (filename) { const label = document.createElement('div'); label.style.cssText = 'font-size:11px;opacity:0.7;margin-top:4px'; label.textContent = filename; div.appendChild(label); }
    messagesEl.insertBefore(div, typingEl); scrollToBottom(); saveHistory('user', `[Video: ${filename}]`);
}

function addVideoMessage(url, caption) {
    const div = document.createElement('div'); div.className = 'msg bot';
    if (caption) div.innerHTML = renderMarkdown(caption);
    const video = document.createElement('video');
    video.src = url; video.controls = true; video.preload = 'metadata';
    video.style.cssText = 'max-width:100%;border-radius:10px;margin:8px 0';
    div.appendChild(video);
    messagesEl.insertBefore(div, typingEl); scrollToBottom();
}

function addVoiceMessage(url) {
    const div = document.createElement('div'); div.className = 'msg bot';
    const { bubble } = createVoiceBubble(url, { barCount: 35 });
    div.appendChild(bubble);
    messagesEl.insertBefore(div, typingEl); scrollToBottom();
}

function addDocumentMessage(url, filename, caption) {
    const div = document.createElement('div'); div.className = 'msg bot';
    if (caption) div.innerHTML = renderMarkdown(caption);
    const a = document.createElement('a'); a.className = 'file-download'; a.href = url; a.download = filename;
    a.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>';
    const fnSpan = document.createElement('span'); fnSpan.textContent = filename; a.appendChild(fnSpan);
    div.appendChild(a);
    messagesEl.insertBefore(div, typingEl); scrollToBottom();
}

function addSystemMessage(text) {
    const div = document.createElement('div'); div.className = 'msg system'; div.textContent = text;
    messagesEl.insertBefore(div, typingEl); scrollToBottom();
}

function renderMarkdown(text) {
    try {
        const html = marked.parse(text);
        return typeof DOMPurify !== 'undefined'
            ? DOMPurify.sanitize(html)
            : html.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    } catch(e) {
        return text.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
}
function highlightCode(el) { el.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b)); }

// ── Typing ─────────────────────────────────────────────────────────

var typingTimeout = null;
function showTyping() { typingEl.style.display = 'block'; scrollToBottom(); clearTimeout(typingTimeout); typingTimeout = setTimeout(hideTyping, 300000); setSendStop(true); }
function setSendStop(stop) {
    const btn = document.getElementById('send-btn');
    const sendIcon = document.getElementById('send-icon');
    const stopIcon = document.getElementById('stop-icon');
    if (stop) { btn.classList.add('stop-mode'); btn.onclick = interruptChat; sendIcon.style.display = 'none'; stopIcon.style.display = 'block'; btn.setAttribute('aria-label', 'Stop generating'); }
    else { btn.classList.remove('stop-mode'); btn.onclick = sendMessage; sendIcon.style.display = 'block'; stopIcon.style.display = 'none'; btn.setAttribute('aria-label', 'Send message'); }
}
function interruptChat() {
    fetch(`${API_BASE}/v1/chat/interrupt?session_id=${encodeURIComponent(sessionId)}`, { method: 'POST', headers: { 'Authorization': `Bearer ${apiKey}` } }).catch(() => {});
    hideTyping();
}
function hideTyping() { typingEl.style.display = 'none'; clearTimeout(typingTimeout); setSendStop(false); }

// ── Scroll ─────────────────────────────────────────────────────────

messagesEl.addEventListener('scroll', () => { autoScroll = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 60; });
function scrollToBottom() { if (autoScroll) requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }); }

// ── Helpers ────────────────────────────────────────────────────────

function getSupportedMime() {
    for (const t of ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus']) { if (MediaRecorder.isTypeSupported(t)) return t; }
    return '';
}

// ── History ────────────────────────────────────────────────────────

function saveHistory(type, content, media) {
    const k = `hermes_history_${sessionId}`;
    const h = JSON.parse(localStorage.getItem(k) || '[]');
    h.push({ type, content, media: media || null, time: Date.now() });
    if (h.length > 100) h.splice(0, h.length - 100);
    localStorage.setItem(k, JSON.stringify(h));
}

function loadHistory() {
    const h = JSON.parse(localStorage.getItem(`hermes_history_${sessionId}`) || '[]');
    h.forEach(m => {
        if (m.type === 'user') addUserMessage(m.content, false);
        else if (m.type === 'bot') {
            addBotMessage(m.content);
            if (m.media) {
                m.media.forEach(med => {
                    const url = med.url ? (med.url.startsWith('http') ? med.url : `${API_BASE}${med.url}`) : null;
                    if (med.type === 'audio' && url) addVoiceMessage(url);
                    else if (med.type === 'image' && url) addImageMessage(url, med.caption);
                    else if (med.type === 'video' && url) addVideoMessage(url, med.caption);
                    else if (med.type === 'document' && url) addDocumentMessage(url, med.filename || 'file', med.caption);
                });
            }
        }
    });
}
