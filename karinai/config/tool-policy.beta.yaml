policy_mode: beta
summary: >
  Initial KarinAI managed-runtime policy. The agent is useful inside the
  isolated workspace container, while durable scheduling, plugin lifecycle,
  secrets, host/container control, and external side effects remain backend-
  mediated.

enabled_toolsets:
  - file
  - terminal
  - code_execution
  - web
  - vision
  - todo
  - memory
  - skills
  - session_search
  - image_gen
  - video_gen
  - tts
  - kanban
  - delegation
  - moa

disabled_toolsets:
  - cronjob
  - video
  - homeassistant
  - computer_use
  - discord
  - discord_admin
  - feishu_doc
  - feishu_drive
  - spotify
  - x_search
  - yuanbao

backend_owned_features:
  - schedules_and_cron
  - plugin_installation
  - provider_credentials
  - cloud_credentials
  - github_or_saas_credentials
  - container_lifecycle
  - workspace_locks
  - product_run_records

side_effects_requiring_backend_or_user_approval:
  - git_push
  - third_party_api_mutations
  - credentialed_integrations
  - long_running_background_jobs
