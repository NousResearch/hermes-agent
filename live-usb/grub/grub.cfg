set default="0"
set timeout="5"
set timeout_style="menu"

# Theme
if loadfont /boot/grub/unicode.pf2; then
  set gfxmode="auto"
  insmod all_video
  insmod gfxterm
  terminal_output gfxterm
fi

# Colors
set menu_color_normal=cyan/black
set menu_color_highlight=white/blue

menuentry "Hermes AgentCyber Live (Gateway Mode)" --class gnu-linux --class gnu --class os {
    echo "Loading kernel..."
    linux /boot/vmlinuz boot=live quiet splash \
        noautomount \
        HERMES_LIVE_MODE=gateway
    echo "Loading initial ramdisk..."
    initrd /boot/initrd.img
}

menuentry "Hermes AgentCyber Live (Terminal Mode)" --class gnu-linux {
    linux /boot/vmlinuz boot=live quiet \
        noautomount \
        HERMES_LIVE_MODE=terminal
    initrd /boot/initrd.img
}

menuentry "Hermes AgentCyber Live (Headless Scan)" --class gnu-linux {
    linux /boot/vmlinuz boot=live quiet \
        noautomount \
        HERMES_LIVE_MODE=headless
    initrd /boot/initrd.img
}

menuentry "Hermes AgentCyber Live (Forensic — No Automount)" --class gnu-linux {
    linux /boot/vmlinuz boot=live quiet \
        noautomount noswap nopersistent \
        HERMES_LIVE_MODE=forensic
    initrd /boot/initrd.img
}

menuentry "Hermes AgentCyber (with persistence)" --class gnu-linux {
    linux /boot/vmlinuz boot=live quiet splash \
        persistence persistence-label=HERMESPST \
        HERMES_LIVE_MODE=gateway
    initrd /boot/initrd.img
}

menuentry "Boot from first hard disk" --class windows --class os {
    insmod chain
    insmod part_gpt
    insmod part_msdos
    set root=(hd1)
    chainloader +1
}
