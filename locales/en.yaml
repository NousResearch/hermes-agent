    not_found:             "No session found matching '{name}'. Use `/merge` with no name to list mergeable sessions."
    same_session:          "That's the session you're already in — pick a different target to merge into."
    already_merged:        "This session was already merged into **{title}** — not folding it again. (Start a new exploration to merge fresh material.)"
    blocked_not_owner:     "You can only merge into sessions you own. '{name}' belongs to a different chat/owner."
    no_named_sessions:     "No titled sessions to merge into yet. Give a session a name with `/title` first."
    list_header:           "🔀 **Sessions you can merge into** — reply `/merge <number>` or `/merge <name>`:"
    list_footer:           "_`/merge <number>` folds a summary of THIS session into that one._"
    no_conversation:       "Nothing to merge — this session has no conversation yet."
    no_new_turns:          "Nothing new to merge — no turns happened in this thread after the branch point."
    no_summary:            "Couldn't generate a summary of this session; nothing was merged. Try again in a moment."
    fold_failed:           "Failed to fold the summary into the target session: {error}"
    ledger_failed:         "Couldn't safely record the merge (session store busy) — nothing was folded. Try again in a moment."
    fold_body:             "[MERGED SESSION — {title}] A summary of another session ('{title}') was folded into this conversation. Treat it as reference context:\n\n{summary}"
    fold_body_thread:      "[BRANCHED THREAD MERGED — {title}] A branched thread was explored and folded back into this conversation. Summary of what happened in the branch:\n\n{summary}"
    md_suffix:             " · full record: `{path}`"
    note_record_suffix:    " · full record: `{path}`"
    source_marker:         "[MERGED — this thread's new exploration was folded into '{target}' on {when}. You can keep going here, but its summary already lives in that conversation.]"
    source_marker_named:   "[MERGED — a summary of this session was folded into '{target}' on {when}. You can keep going here, but its summary already lives in that conversation.]"
    parent_note:           "🔀 **Merged from thread '{title}'**\n{summary}"
    target_note:           "🔀 **Folded in from _{source}_**{child} — a summary of {turns} message(s) is now in this conversation's context.{record}"
    target_note_named:     "🔀 **Folded in from _{source}_** — a summary of _{source}_ ({turns} message(s)) is now in this conversation's context.{record}"
    source_thread_link:    " ({thread})"
    merged_named:          "✅ Merged into **{title}** — a summary of this session is now in its context.{md}"
    merged_thread:         "✅ **Folded back into _{title}_**{parent} — a summary of this thread is now in the parent's context, and this thread is archived (still resumable).{md}"
    merged_thread_no_archive: "✅ **Folded back into _{title}_**{parent} — a summary of this thread is now in the parent's context. (Couldn't archive the thread automatically; you can close it manually.){md}"
    target_parent_link:    " ({parent})"

