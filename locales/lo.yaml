# Hermes static-message catalog -- Lao Translation

approval:
  # CLI approval prompt
  dangerous_header: "⚠️ ຄຳສັ່ງທີ່ອັນຕະລາຍ: {description}" # "⚠️  DANGEROUS COMMAND: {description}"
  choose_long:     "      [o] ເທື່ອດຽວ  |  [s] ເຊດຊັນ  |  [a] ຕະຫຼອດໄປ  |  [d] ປະຕິເສດ" # "[o]nce  |  [s]ession  |  [a]lways  |  [d]eny"
  choose_short:    "      [o] ເທື່ອດຽວ  |  [s] ເຊດຊັນ  |  [d] ປະຕິເສດ" # "[o]nce  |  [s]ession  |  [d]eny"
  prompt_long:     "      ເລືອກ [o/s/a/D]: " # "Choice [o/s/a/D]: "
  prompt_short:    "      ເລືອກ [o/s/D]: " # "Choice [o/s/D]: "
  choose_smart_deny: "      [o] ເທື່ອດຽວ  |  [d] ປະຕິເສດ" # "[o]nce  |  [d]eny"
  prompt_smart_deny: "      ເລືອກ [o/D]: " # "Choice [o/D]: "
  smart_deny_once_inputs: "o,once,ເທື່ອດຽວ" 
  smart_deny_deny_inputs: "d,deny,ປະຕິເສດ"
  timeout:         "      ⏱ ໝົດເວລາ - ກຳລັງປະຕິເສດຄຳສັ່ງ" # "⏱ Timeout - denying command"
  allowed_once:    "      ✓ ອະນຸຍາດເທື່ອດຽວ" # "✓ Allowed once"
  allowed_session: "      ✓ ອະນຸຍາດສຳລັບເຊດຊັນນີ້" # "✓ Allowed for this session"
  allowed_always:  "      ✓ ເພີ່ມເຂົ້າໃນລາຍຊື່ອະນຸຍາດຖາວອນແລ້ວ" # "✓ Added to permanent allowlist"
  denied:          "      ✗ ປະຕິເສດແລ້ວ" # "✗ Denied"
  cancelled:       "      ✗ ຍົກເລີກແລ້ວ" # "✗ Cancelled"
  blocklist_message: "ຄຳສັ່ງນີ້ຢູ່ໃນລາຍຊື່ບລັອກທີ່ບໍ່ມີເງື່ອນໄຂ ແລະ ບໍ່ສາມາດອະນຸຍາດໄດ້." # "This command is on the unconditional blocklist and cannot be approved."

gateway:
  approval_expired: "⚠️ ການອະນຸມັດໝົດອາຍຸ (ເອເຈນບໍ່ໄດ້ລໍຖ້າແລ້ວ). ກະລຸນາບອກໃຫ້ເອເຈນລອງໃໝ່." # "⚠️ Approval expired (agent is no longer waiting). Ask the agent to try again."
  draining:         "⏳ ກຳລັງເຄລຍ {count} ເອເຈນທີ່ເຮັດວຽກຢູ່ ກ່ອນຈະເລີ່ມລະບົບໃໝ່..." # "⏳ Draining {count} active agent(s) before restart..."
  goal_cleared:     "✓ ລຶບເປົ້າໝາຍແລ້ວ." # "✓ Goal cleared."
  no_active_goal:   "ບໍ່ມີເປົ້າໝາຍທີ່ກຳລັງເຮັດວຽກຢູ່." # "No active goal."
  config_read_failed: "⚠️ ບໍ່ສາມາດອ່ານ config.yaml: {error}" # "⚠️ Could not read config.yaml: {error}"
  config_save_failed: "⚠️ ບໍ່ສາມາດບັນທຶກ config: {error}" # "⚠️ Could not save config: {error}"

  model:
    error_prefix:           "ຂໍ້ຜິດພາດ: {error}" # "Error: {error}"
    switched:               "ປ່ຽນໂມເດວເປັນ `{model}` ແລ້ວ" # "Model switched to `{model}`"
    provider_label:         "ຜູ້ໃຫ້ບໍລິການ: {provider}" # "Provider: {provider}"
    context_label:          "ບໍລິບົດ: {tokens} ໂທເຄັນ" # "Context: {tokens} tokens"
    max_output_label:       "ເອົາທ໌ພຸດສູງສຸດ: {tokens} ໂທເຄັນ" # "Max output: {tokens} tokens"
    cost_label:             "ຄ່າໃຊ້ຈ່າຍ: {cost}" # "Cost: {cost}"
    capabilities_label:     "ຄວາມສາມາດ: {capabilities}" # "Capabilities: {capabilities}"
    prompt_caching_enabled: "ການເກັບແຄຊ໌ພຣອມ: ເປີດໃຊ້ງານ" # "Prompt caching: enabled"
    warning_prefix:         "ຄຳເຕືອນ: {warning}" # "Warning: {warning}"
    saved_global:           "ບັນທຶກລົງໃນ config.yaml ແລ້ວ (`--global`)" # "Saved to config.yaml (`--global`)"
    session_only_hint:      "_(ສະເພາະເຊດຊັນນີ້ — ຕື່ມ `--global` ເພື່ອບັນທຶກຖາວອນ)_" # "_(session only — add `--global` to persist)_"
    current_label:          "ປັດຈຸບັນ: `{model}` ເທິງ {provider}" # "Current: `{model}` on {provider}"
    current_tag:            " (ປັດຈຸບັນ)" # " (current)"
    more_models_suffix:     " (+ ອີກ {count} ໂມເດວ)" # " (+{count} more)"
    usage_switch_model:     "`/model <ຊື່>` — ປ່ຽນໂມເດວ" # "`/model <name>` — switch model"
    usage_switch_provider:  "`/model <ຊື່> --provider <slug>` — ປ່ຽນຜູ້ໃຫ້ບໍລິການ" # "`/model <name> --provider <slug>` — switch provider"
    usage_persist:          "`/model <ຊື່> --global` — ບັນທຶກຖາວອນ" # "`/model <name> --global` — persist"

  agents:
    header:                "🤖 **ເອເຈນ ແລະ ໜ້າວຽກທີ່ກຳລັງເຮັດວຽກ**" # "🤖 **Active Agents & Tasks**"
    active_agents:         "**ເອເຈນທີ່ກຳລັງເຮັດວຽກ:** {count}" # "**Active agents:** {count}"
    this_chat:             " · ແຊັດນີ້" # " · this chat"
    more:                  "... ແລະ ອີກ {count}" # "... and {count} more"
    running_processes:     "**ໂປຣເຊສເບື້ອງຫຼັງທີ່ກຳລັງເຮັດວຽກ:** {count}" # "**Running background processes:** {count}"
    async_jobs:            "**ວຽກ Gateway async:** {count}" # "**Gateway async jobs:** {count}"
    none:                  "ບໍ່ມີເອເຈນ ຫຼື ໜ້າວຽກທີ່ກຳລັງເຮັດວຽກຢູ່." # "No active agents or running tasks."
    state_starting:        "ກຳລັງເລີ່ມ" # "starting"
    state_running:         "ກຳລັງເຮັດວຽກ" # "running"

  approve:
    no_pending:            "ບໍ່ມີຄຳສັ່ງທີ່ລໍຖ້າການອະນຸມັດ." # "No pending command to approve."
    once_singular:         "✅ ອະນຸມັດຄຳສັ່ງແລ້ວ. ເອເຈນກຳລັງເຮັດວຽກຕໍ່..." # "✅ Command approved. The agent is resuming..."
    once_plural:           "✅ ອະນຸມັດຄຳສັ່ງແລ້ວ ({count} ຄຳສັ່ງ). ເອເຈນກຳລັງເຮັດວຽກຕໍ່..." # "✅ Commands approved ({count} commands). The agent is resuming..."
    session_singular:      "✅ ອະນຸມັດຄຳສັ່ງແລ້ວ (ອະນຸຍາດຮູບແບບນີ້ສຳລັບເຊດຊັນນີ້). ເອເຈນກຳລັງເຮັດວຽກຕໍ່..." # "✅ Command approved (pattern approved for this session). The agent is resuming..."
    session_plural:        "✅ ອະນຸມັດຄຳສັ່ງແລ້ວ (ອະນຸຍາດຮູບແບບນີ້ສຳລັບເຊດຊັນນີ້) ({count} ຄຳສັ່ງ). ເອເຈນກຳລັງເຮັດວຽກຕໍ່..."
    always_singular:       "✅ ອະນຸມັດຄຳສັ່ງແລ້ວ (ອະນຸຍາດຮູບແບບນີ້ຖາວອນ). ເອເຈນກຳລັງເຮັດວຽກຕໍ່..." # "✅ Command approved (pattern approved permanently). The agent is resuming..."
    always_plural:         "✅ ອະນຸມັດຄຳສັ່ງແລ້ວ (ອະນຸຍາດຮູບແບບນີ້ຖາວອນ) ({count} ຄຳສັ່ງ). ເອເຈນກຳລັງເຮັດວຽກຕໍ່..."

  background:
    usage:                 "ວິທີໃຊ້: /background <ພຣອມ>\nຕົວຢ່າງ: /background ສະຫຼຸບຂ່າວເດັ່ນຈາກ HN ມື້ນີ້\n\nລະບົບຈະປະມວນຜົນຢູ່ໃນເຊດຊັນແຍກຕ່າງຫາກ. ເຈົ້າສາມາດແຊັດຕໍ່ໄດ້ — ຜົນລັບຈະສະແດງຢູ່ນີ້ເມື່ອສຳເລັດ."
    started:               "🔄 ເລີ່ມວຽກເບື້ອງຫຼັງແລ້ວ: \"{preview}\"\nລະຫັດວຽກ: {task_id}\nເຈົ້າສາມາດແຊັດຕໍ່ໄດ້ — ຜົນລັບຈະສະແດງເມື່ອສຳເລັດ."

  branch:
    db_unavailable:        "ຖານຂໍ້ມູນເຊດຊັນບໍ່ພ້ອມໃຊ້ງານ." # "Session database not available."
    no_conversation:       "ບໍ່ມີການສົນທະນາທີ່ຈະແຍກສາຂາ — ກະລຸນາສົ່ງຂໍ້ຄວາມກ່ອນ." # "No conversation to branch — send a message first."
    create_failed:         "ສ້າງສາຂາບໍ່ສຳເລັດ: {error}" # "Failed to create branch: {error}"
    switch_failed:         "ສ້າງສາຂາແລ້ວ ແຕ່ປ່ຽນໄປໃຊ້ບໍ່ສຳເລັດ." # "Branch created but failed to switch to it."
    branched_one:          "⑂ ແຍກສາຂາໄປທີ່ **{title}** ແລ້ວ (ຄັດລອກ {count} ຂໍ້ຄວາມ)\nຕົ້ນສະບັບ: `{parent}`\nສາຂາໃໝ່: `{new}`\nໃຊ້ `/resume` ເພື່ອກັບໄປຫາຕົ້ນສະບັບ."
    branched_many:         "⑂ ແຍກສາຂາໄປທີ່ **{title}** ແລ້ວ (ຄັດລອກ {count} ຂໍ້ຄວາມ)\nຕົ້ນສະບັບ: `{parent}`\nສາຂາໃໝ່: `{new}`\nໃຊ້ `/resume` ເພື່ອກັບໄປຫາຕົ້ນສະບັບ."

  commands:
    usage:                 "ວິທີໃຊ້: `/commands [ໜ້າ]`" # "Usage: `/commands [page]`"
    skill_header:          "⚡ **ຄຳສັ່ງທັກສະ (Skill Commands)**:" # "⚡ **Skill Commands**:"
    default_desc:          "ຄຳສັ່ງທັກສະ" # "Skill command"
    none:                  "ບໍ່ມີຄຳສັ່ງທີ່ພ້ອມໃຊ້ງານ." # "No commands available."
    header:                "📚 **ຄຳສັ່ງ** (ທັງໝົດ {total}, ໜ້າ {page}/{total_pages})" # "📚 **Commands** ({total} total, page {page}/{total_pages})"
    nav_prev:              "`/commands {page}` ← ກ່ອນໜ້າ" # "`/commands {page}` ← prev"
    nav_next:              "ຖັດໄປ → `/commands {page}`" # "next → `/commands {page}`"
    out_of_range:          "_(ໜ້າ {requested} ທີ່ຮ້ອງຂໍບໍ່ມີ, ກຳລັງສະແດງໜ້າ {page}.)_" # "_(Requested page {requested} was out of range, showing page {page}.)_"

  compress:
    not_enough:            "ການສົນທະນາບໍ່ພໍທີ່ຈະບີບອັດ (ຕ້ອງມີຢ່າງໜ້ອຍ 4 ຂໍ້ຄວາມ)." # "Not enough conversation to compress (need at least 4 messages)."
    no_provider:           "ບໍ່ໄດ້ຕັ້ງຄ່າຜູ້ໃຫ້ບໍລິການ -- ບໍ່ສາມາດບີບອັດໄດ້." # "No provider configured -- cannot compress."
    nothing_to_do:         "ຍັງບໍ່ມີຫຍັງໃຫ້ບີບອັດ (ເນື້ອຫາຍັງຢູ່ໃນສ່ວນທີ່ຖືກປ້ອງກັນທັງໝົດ)." # "Nothing to compress yet (the transcript is still all protected context)."
    aggressive_unsupported: "--aggressive ບໍ່ຖືກຮອງຮັບ; ໃຊ້ '/compress here [N]' ເພື່ອເກັບສະເພາະການສົນທະນາຫຼ້າສຸດ, ຫຼື /undo ເພື່ອຍ້ອນກັບ."
    focus_line:            "ຈຸດສຸມ: \"{topic}\"" # "Focus: \"{topic}\""
    summary_failed:        "⚠️ ການສ້າງບົດສະຫຼຸບບໍ່ສຳເລັດ ({error}). ຂໍ້ຄວາມເກົ່າ {count} ຂໍ້ຄວາມຖືກລຶບອອກ ແລະ ແທນທີ່ດ້ວຍຂໍ້ຄວາມຊົ່ວຄາວ; ບໍລິບົດກ່ອນໜ້ານີ້ບໍ່ສາມາດກູ້ຄືນໄດ້. ກະລຸນາກວດສອບການຕັ້ງຄ່າ auxiliary.compression."
    aborted:               "⚠️ ການບີບອັດຖືກຍົກເລີກ ({error}). ບໍ່ມີຂໍ້ຄວາມໃດຖືກລຶບ — ການສົນທະນາຄືເກົ່າ. ຣັນ /compress ເພື່ອລອງໃໝ່, /reset ເພື່ອເລີ່ມເຊດຊັນໃໝ່."
    aux_failed:            "ℹ️ ໂມເດວບີບອັດ `{model}` ຜິດພາດ ({error}). ກູ້ຄືນໂດຍໃຊ້ໂມເດວຫຼັກ — ບໍລິບົດຍັງຄົບຖ້ວນ — ແຕ່ເຈົ້າອາດຈະຢາກກວດສອບ `auxiliary.compression.model`."
    failed:                "ການບີບອັດບໍ່ສຳເລັດ: {error}" # "Compression failed: {error}"

  debug:
    upload_failed:         "✗ ອັບໂຫຼດລາຍງານ debug ບໍ່ສຳເລັດ: {error}" # "✗ Failed to upload debug report: {error}"
    header:                "**ອັບໂຫຼດລາຍງານ debug ສຳເລັດແລ້ວ:**" # "**Debug report uploaded:**"
    auto_delete:           "⏱ ຂໍ້ມູນຈະຖືກລຶບອັດຕະໂນມັດໃນ 6 ຊົ່ວໂມງ." # "⏱ Pastes will auto-delete in 6 hours."
    full_logs_hint:        "ສຳລັບການອັບໂຫຼດ log ທັງໝົດ, ໃຫ້ໃຊ້ `hermes debug share` ຈາກ CLI." # "For full log uploads, use `hermes debug share` from the CLI."
    share_hint:            "ແຊຣ໌ລິ້ງເຫຼົ່ານີ້ໃຫ້ທີມງານ Hermes ເພື່ອຂໍຄວາມຊ່ວຍເຫຼືອ." # "Share these links with the Hermes team for support."

  deny:
    stale:                 "❌ ປະຕິເສດຄຳສັ່ງ (ການອະນຸມັດໝົດອາຍຸແລ້ວ)." # "❌ Command denied (approval was stale)."
