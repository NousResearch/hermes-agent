      ''prompt cache'' செல்லாததாக்கப்படும் — அடுத்த செய்தியில் முழு உள்ளீட்டு டோக்கன்களும் (input tokens) மீண்டும் அனுப்பப்படும். நீண்ட சூழல் (long-context) அல்லது அதிக பகுத்தறிவுத் திறன் கொண்ட மாதிரிகளில்
      (high-reasoning models) இது அதிக செலவு பிடிக்கக்கூடியதாக (அதாவது அதிக டோக்கன்களைப் பயன்படுத்துவதாக) இருக்கலாம். தேர்வு செய்யவும்: • ஒருமுறை அனுமதி — இப்போதே மீண்டும் ஏற்றவும் (5/7) • எப்போதும் அனுமதி
