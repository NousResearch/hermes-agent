[Unit]
BindsTo=muncho-discord-connector.service
After=muncho-discord-connector.service

[Service]
SupplementaryGroups=muncho-discord-connector
Environment=GATEWAY_RELAY_URL=unix:///run/muncho-discord-connector/connector.sock
Environment=GATEWAY_RELAY_PLATFORMS=discord
UnsetEnvironment=DISCORD_BOT_TOKEN DISCORD_TOKEN
