# Nous-approved MCP catalog entry.
# Presence in this directory = approval. Merged via PR review.
#
# Schema version 1.
manifest_version: 1

name: patter-voice
description: Place outbound AI phone calls over Twilio, run autonomous third-party tasks, and pull live call transcripts via the Patter SDK.
source: https://github.com/PatterAI/patter-mcp

# patter-mcp is not published on npm (there is no `npx -y getpatter-mcp`), so it
# is installed from source: the catalog clones the pinned commit below, builds
# it, and Hermes then spawns it directly over stdio. In stdio mode the server
# speaks JSON-RPC on stdout and reroutes its own logs to stderr. Its default
# transport (without `--stdio`) is Streamable HTTP on PATTER_PORT (8000), which
# this entry deliberately does NOT use — stdio needs no local port and lets
# Hermes manage the subprocess lifecycle.
transport:
  type: stdio
  # ${INSTALL_DIR} is substituted at install time (in command AND args) with the
  # directory the catalog cloned patter-mcp into. `node` is resolved off PATH;
  # patter-mcp requires Node ^20.19.0 || >=22.12.0 (package.json engines).
  command: node
  args:
    - "${INSTALL_DIR}/dist/index.js"
    - "--stdio"

# Build from a pinned, immutable commit — manifests never float HEAD. This SHA
# is patter-mcp HEAD as of 2026-07-14 (merge of PR #6, getpatter SDK 0.7.0).
# Bumping to a newer server revision is a manifest edit + PR, and users pull it
# by re-running `hermes mcp install patter-voice`.
install:
  type: git
  url: https://github.com/PatterAI/patter-mcp.git
  ref: c87b1b17e05c8d73fe02e0e65b6661b9a691a47b
  # Run in the cloned dir after checkout. `npm run build` invokes tsup and
  # emits dist/index.js (the getpatter-mcp bin).
  bootstrap:
    - "npm ci"
    - "npm run build"

# Authentication. Patter itself has no central API key — credentials are the
# underlying provider keys (carrier + LLM/STT/TTS) that patter-mcp reads from
# its own process environment. Hermes prompts for them at install time and
# writes them to ~/.hermes/.env.
#
# NOTE: Hermes passes stdio MCP subprocesses a filtered environment (a safe
# baseline of PATH/HOME/etc. only), so these keys are not auto-injected into the
# spawned server — see post_install for how to make them reach it.
#
# Hard minimum: the full Twilio trio (TWILIO_ACCOUNT_SID + TWILIO_AUTH_TOKEN +
# TWILIO_PHONE_NUMBER) AND OPENAI_API_KEY for the default OpenAI Realtime engine.
# patter-mcp's constructor throws at startup if any Twilio var is missing and the
# process exits — so the install "succeeds" but zero tools ever appear. Deepgram +
# ElevenLabs are only needed for the STT->LLM->TTS Pipeline mode (and
# ELEVENLABS_AGENT_ID for the ElevenLabs ConvAI engine).
#
# Telnyx is NOT supported by patter-mcp at this pin: the server hardcodes Twilio
# and never reads TELNYX_API_KEY, even though the Patter SDK ships a Telnyx
# carrier. Re-add a Telnyx prompt here only when the server exposes carrier
# selection.
auth:
  type: api_key
  env:
    - name: TWILIO_ACCOUNT_SID
      prompt: "Twilio Account SID (starts with AC...)"
      required: true
      secret: false
    - name: TWILIO_AUTH_TOKEN
      prompt: "Twilio Auth Token"
      required: true
      secret: true
    - name: TWILIO_PHONE_NUMBER
      prompt: "Twilio phone number in E.164 (e.g. +15551234567)"
      required: true
      secret: false
    - name: OPENAI_API_KEY
      prompt: "OpenAI API key (used by the default Realtime engine)"
      required: true
      secret: true
    - name: DEEPGRAM_API_KEY
      prompt: "Deepgram API key (required only for STT->LLM->TTS Pipeline mode)"
      required: false
      secret: true
    - name: ELEVENLABS_API_KEY
      prompt: "ElevenLabs API key (required only for Pipeline mode or ConvAI engine)"
      required: false
      secret: true
    - name: ELEVENLABS_AGENT_ID
      prompt: "ElevenLabs ConvAI Agent ID (required only for the elevenlabs_convai engine)"
      required: false
      secret: false

# Tool selection at install time:
# patter-mcp exposes 7 tools. The six call and observability tools are
# pre-checked by default. `configure_inbound` mutates the inbound-agent
# configuration, so it is pruned from the default (mirrors n8n's
# prune-mutating-tools pattern) — users can opt into it from the install-time
# checklist. Note that `make_call` and `call_third_party` place real outbound
# calls that cost telephony minutes; Hermes should confirm with the user before
# invoking them.
tools:
  default_enabled:
    - make_call
    - call_third_party
    - get_calls
    - get_transcript
    - end_call
    - get_metrics

post_install: |
  Hermes spawns patter-mcp over stdio automatically — there is no separate
  server to start. The provider keys you entered are saved to ~/.hermes/.env.

  MANDATORY: Hermes passes stdio MCP servers a FILTERED environment (a safe
  PATH/HOME baseline only), so the keys in ~/.hermes/.env are NOT auto-forwarded
  to the spawned server. Without the env block below, patter-mcp's constructor
  throws for the missing Twilio credentials, the process exits at startup, and
  NONE of the patter-voice tools ever appear. Add this to ~/.hermes/config.yaml:

      mcp_servers:
        patter-voice:
          env:
            TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
            TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
            TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
            OPENAI_API_KEY: ${OPENAI_API_KEY}
            # Pipeline / ConvAI engines only — add as needed:
            # DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
            # ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
            # ELEVENLABS_AGENT_ID: ${ELEVENLABS_AGENT_ID}

  Hermes interpolates the ${VAR} placeholders from ~/.hermes/.env at load time,
  so the block references the values you already entered — you do not paste
  secrets literally. An unset ${VAR} is passed through verbatim (a broken key),
  so make sure every referenced var is present in ~/.hermes/.env.

  Built-in spend caps (read from the same env block): RATE_LIMIT_DAILY defaults
  to 10 outbound calls per user per day, MAX_CONCURRENT_CALLS to 2, and
  HOURLY_BUDGET_CAP_USD is unset (no global hourly USD ceiling) unless you set
  it. Override any of them by adding the var to the env block above.

  Real telephony minutes cost real money — confirm with the user before
  placing outbound calls.

  To update, re-run `hermes mcp install patter-voice` after a repo update.
  Manifests never float HEAD, so nothing changes until you reinstall.
