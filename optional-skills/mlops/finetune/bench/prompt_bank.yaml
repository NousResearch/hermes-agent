  # ============================================================
  # TIER 2: Tool Execution Quality (~80 cases, showing subset)
  # ============================================================

  - id: te-001
    tier: 2
    category: bash_correctness
    prompt: "Count the number of lines in all .py files in the current directory"
    setup:
      files:
        app.py: "def main():\n    pass\n"
        utils.py: "import os\nimport sys\n\ndef helper():\n    return True\n"
    expected:
      tool_name: terminal
      exit_code: 0
    verification:
      method: output_match
      expected_value: "7"
    tags: [terminal, text-processing]

  - id: te-002
    tier: 2
    category: bash_correctness
    prompt: "Find all files larger than 1KB in the current directory and tell me which ones they are."
    setup:
      files:
        data_large.bin: "\n"
        data_small.txt: "tiny\n"
        readme.txt: "a short readme\n"
    expected:
      tool_name: terminal
      should_call_tool: true
    verification:
      method: output_match
      expected_value: "data_large.bin"
      match_scope: final_answer
    tags: [terminal, file-ops]

  - id: te-010
    tier: 2
    category: error_recovery
    prompt: "Install the Python package 'nonexistent-pkg-xyz-12345' and if it fails, tell me what happened."
    expected:
      tool_name: terminal
      should_call_tool: true
    verification:
      method: output_match
      expect_failure: true
      expected_regex: '(no matching|not (be )?found|does ?n[o'']t exist|could ?n[o'']t|unable|fail)'
    tags: [terminal, error-handling]

  - id: te-020
    tier: 2
    category: output_interpretation
    prompt: "Initialize a git repository in the current directory, create a file called notes.txt, then check git status and tell me whether there are any uncommitted or untracked changes."
    expected:
      tool_name: terminal
      should_call_tool: true
    verification:
      method: output_match
      expected_regex: '(?i)(untracked|uncommitted|yes)'
      match_scope: final_answer
    tags: [terminal, git]

  # ============================================================
  # TIER 3: End-to-End Task Completion (~40 cases, showing subset)
  # ============================================================

  - id: e2e-001
    tier: 3
    category: project_scaffolding
    prompt: "Create a Python script called greet.py that takes a name as a command-line argument and prints 'Hello, {name}!'"
    setup:
      working_dir: /tmp/finetune-bench/greet-test
    verification:
      method: functional_test
      test_commands:
        - "cd /tmp/finetune-bench/greet-test && python greet.py World"
        - "cd /tmp/finetune-bench/greet-test && python greet.py Alice"
      checks:
        - type: output_contains
          command_index: 0
          expected: ["Hello, World!"]
        - type: output_contains
          command_index: 1
          expected: ["Hello, Alice!"]
        - type: file_exists
          path: /tmp/finetune-bench/greet-test/greet.py
    max_turns: 10
    tags: [scaffolding, cli, python]

  - id: e2e-010
    tier: 3
    category: debug_and_fix
    prompt: "The file buggy.py has a bug. Find and fix it so that fibonacci(6) returns 8."
    setup:
      working_dir: /tmp/finetune-bench/debug-test
      files:
        buggy.py: |
          def fibonacci(n):
              if n <= 1:
                  return n
              return fibonacci(n - 1) + fibonacci(n - 3)

          if __name__ == "__main__":
              for i in range(10):
                  print(f"fib({i}) = {fibonacci(i)}")
    verification:
      method: functional_test
      test_commands:
        - "cd /tmp/finetune-bench/debug-test && python buggy.py"
      checks:
        - type: output_contains
          command_index: 0
          expected: ["fib(6) = 8", "fib(7) = 13"]
    max_turns: 10
    tags: [debug, python]

  - id: e2e-020
    tier: 3
    category: workflow_automation
    prompt: "Create a bash script called backup.sh that takes a directory as argument, creates a timestamped tar.gz backup of it in /tmp, and prints the backup path."
    setup:
      working_dir: /tmp/finetune-bench/backup-test
    verification:
      method: functional_test
      test_commands:
        - "mkdir -p /tmp/finetune-bench/backup-test/source && echo 'test' > /tmp/finetune-bench/backup-test/source/file.txt && cd /tmp/finetune-bench/backup-test && bash backup.sh source"
      checks:
        - type: exit_code
          command_index: 0
          expected: 0
        - type: output_regex
          command_index: 0
          pattern: "/tmp/.*\\.tar\\.gz"
        - type: file_exists
          path: /tmp/finetune-bench/backup-test/backup.sh
    max_turns: 10
    tags: [scaffolding, bash, automation]

