    prompt: "Write a Python script that watches a directory for new files and prints their names"
    setup:
      working_dir: /tmp/finetune-bench/wf-watch
    verification:
      method: functional_test
      test_commands:
        - "cd /tmp/finetune-bench/wf-watch && python -c 'import watch' 2>&1 || cat watch.py"
      checks:
        - type: file_exists
          path: /tmp/finetune-bench/wf-watch/watch.py
    max_turns: 10
    tags: [automation, python]

