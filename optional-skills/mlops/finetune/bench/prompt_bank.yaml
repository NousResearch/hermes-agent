  # ============================================================
  # TIER 3: End-to-End Task Completion (~40 cases, showing subset)
  # ============================================================

  - id: e2e-001
    tier: 3
    category: project_scaffolding
    prompt: "Create a Python script called greet.py that takes a name as a command-line argument and prints 'Hello, {name}!'"
    setup:
      working_dir: /tmp/finetune-bench/greet-test
    verification:
      method: functional_test
      test_commands:
        - "cd /tmp/finetune-bench/greet-test && python greet.py World"
        - "cd /tmp/finetune-bench/greet-test && python greet.py Alice"
      checks:
        - type: output_contains
          command_index: 0
          expected: ["Hello, World!"]
        - type: output_contains
          command_index: 1
          expected: ["Hello, Alice!"]
        - type: file_exists
          path: /tmp/finetune-bench/greet-test/greet.py
    max_turns: 10
    tags: [scaffolding, cli, python]

  - id: e2e-010
    tier: 3
    category: debug_and_fix
    prompt: "The file buggy.py has a bug. Find and fix it so that fibonacci(6) returns 8."
    setup:
      working_dir: /tmp/finetune-bench/debug-test
      files:
        buggy.py: |
          def fibonacci(n):
              if n <= 1:
                  return n
              return fibonacci(n - 1) + fibonacci(n - 3)

          if __name__ == "__main__":
              for i in range(10):
                  print(f"fib({i}) = {fibonacci(i)}")
    verification:
      method: functional_test
      test_commands:
        - "cd /tmp/finetune-bench/debug-test && python buggy.py"
      checks:
        - type: output_contains
          command_index: 0
          expected: ["fib(6) = 8", "fib(7) = 13"]
    max_turns: 10
    tags: [debug, python]

  - id: e2e-020
    tier: 3
    category: workflow_automation
    prompt: "Create a bash script called backup.sh that takes a directory as argument, creates a timestamped tar.gz backup of it in /tmp, and prints the backup path."
    setup:
      working_dir: /tmp/finetune-bench/backup-test
    verification:
      method: functional_test
      test_commands:
        - "mkdir -p /tmp/finetune-bench/backup-test/source && echo 'test' > /tmp/finetune-bench/backup-test/source/file.txt && cd /tmp/finetune-bench/backup-test && bash backup.sh source"
      checks:
        - type: exit_code
          command_index: 0
          expected: 0
        - type: output_regex
          command_index: 0
          pattern: "/tmp/.*\\.tar\\.gz"
        - type: file_exists
          path: /tmp/finetune-bench/backup-test/backup.sh
    max_turns: 10
    tags: [scaffolding, bash, automation]

