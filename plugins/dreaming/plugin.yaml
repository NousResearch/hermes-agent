name: dreaming
version: 1.0.0
description: "Dreaming — automatic background memory consolidation. Reviews recent conversations during quiet hours, scores memories by importance, and promotes the best into long-term memory (MEMORY.md). Three phases: Light (sort/stage), REM (reflect/patterns), Deep (promote). Opt-in, disabled by default."
author: "@Minamaged18"
hooks:
  - on_session_end
cli:
  - dream
