name: hermes-approval-guard
version: 0.1.0
description: >-
  两阶段工具调用审批守卫。阶段一规则引擎+LLM快速分类，阶段二ACP Agent深度审查。
  覆盖所有工具（terminal/write_file/patch/delegate_task/execute_code等），
  提供结构化拒绝反馈+替代方案，支持Hindsight审批记忆学习。
  默认关闭，需显式配置 plugin_guard.enabled: true 启用。
author: AtlasEngine
kind: standalone
hooks:
  - pre_tool_call
provides_tools: []
