name: nemo_flow
version: "0.1.0"
description: "Optional NeMo Relay observability for Hermes. Emits Hermes observer hooks as NeMo Relay scopes, LLM spans, tool spans, marks, ATOF, and ATIF when the optional nemo-relay>=0.3 package is installed."
author: NousResearch
hooks:
  - on_session_start
  - on_session_end
  - on_session_finalize
  - on_session_reset
  - pre_llm_call
  - post_llm_call
  - pre_api_request
  - post_api_request
  - api_request_error
  - pre_tool_call
  - post_tool_call
  - pre_approval_request
  - post_approval_response
  - subagent_start
  - subagent_stop
