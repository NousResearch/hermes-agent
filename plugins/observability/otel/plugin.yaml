name: otel
version: "1.0.0"
description: "Optional OpenTelemetry observability for Hermes trajectories via OTLP traces."
author: NousResearch
hooks:
  - on_session_start
  - on_session_end
  - on_session_finalize
  - on_session_reset
  - pre_llm_call
  - post_llm_call
  - pre_api_request
  - post_api_request
  - api_request_error
  - pre_tool_call
  - post_tool_call
  - subagent_start
  - subagent_stop
  - pre_approval_request
  - post_approval_response
