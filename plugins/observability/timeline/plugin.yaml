name: timeline
version: "0.1.0"
description: "Local Hermes Agent Timeline — stores agent, LLM, tool, gateway, approval, and subagent lifecycle events in a local SQLite database."
author: NousResearch
hooks:
  - pre_gateway_dispatch
  - post_gateway_delivery
  - on_session_start
  - on_session_end
  - on_session_finalize
  - on_session_reset
  - pre_llm_call
  - post_llm_call
  - pre_api_request
  - post_api_request
  - api_request_error
  - pre_tool_call
  - post_tool_call
  - pre_approval_request
  - post_approval_response
  - subagent_start
  - subagent_stop
