name: gossip-platform
label: Gossip
kind: platform
version: 0.1.0
description: >
  Gossip gateway adapter for Hermes Agent. Connects to Gossip through
  @massalabs/gossip-sdk using a supervised local Node sidecar. The initial
  integration is text-only one-to-one DMs with a single configured admin user.
author: NousResearch
requires_env:
  - name: GOSSIP_MNEMONIC
    description: "BIP39 mnemonic for the Hermes Gossip account. Generated by setup on first run."
    prompt: "Gossip account mnemonic"
    password: true
  - name: GOSSIP_ADMIN_USER_ID
    description: "Gossip user id allowed to talk to Hermes"
    prompt: "Admin Gossip user id"
    password: false
optional_env:
  - name: GOSSIP_BOT_USER_ID
    description: "Generated Gossip user id for the Hermes account"
    prompt: "Hermes Gossip user id"
    password: false
  - name: GOSSIP_API_URL
    description: "Gossip protocol API URL (defaults to the SDK default)"
    prompt: "Gossip API URL"
    password: false
  - name: GOSSIP_HOME_CHANNEL
    description: "Default Gossip delivery target; should be the admin user id"
    prompt: "Gossip home user id"
    password: false
  - name: GOSSIP_HOME_CHANNEL_NAME
    description: "Human label for the Gossip home channel"
    prompt: "Home channel display name"
    password: false
  - name: GOSSIP_SIDECAR_PORT
    description: "Loopback port for the Gossip sidecar (default 8797)"
    prompt: "Sidecar control port"
    password: false
  - name: GOSSIP_SIDECAR_AUTOSTART
    description: "Spawn the Node sidecar on connect (true/false, default true)"
    prompt: "Auto-start the sidecar?"
    password: false
  - name: GOSSIP_NODE_BIN
    description: "Path to the node binary"
    prompt: "Node executable path"
    password: false
  - name: GOSSIP_STORAGE_DIR
    description: "Directory for Gossip SDK node-fs SQLite storage"
    prompt: "Gossip storage directory"
    password: false
  - name: GOSSIP_POLL_INTERVAL_MS
    description: "Message polling interval in milliseconds (default 5000)"
    prompt: "Polling interval"
    password: false

