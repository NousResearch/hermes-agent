name: photon-platform
label: iMessage (via Photon)
kind: platform
version: 0.1.0
description: >
  Photon Spectrum gateway adapter for Hermes Agent.
  Connects Hermes to iMessage through Photon's managed Spectrum platform.
  The Python platform adapter owns Hermes MessageEvent and SendResult mapping
  and starts a private Node sidecar only to run the `spectrum-ts` SDK.

  The plugin ships with a `hermes photon` CLI for login, fixed
  `hermes-agent` project resolution, user reconciliation, and local adapter
  sidecar setup.
author: NousResearch
requires_env:
  - name: PHOTON_PROJECT_ID
    description: "Spectrum project ID (set by `hermes photon setup`)"
    prompt: "Photon Spectrum project ID"
    url: "https://app.photon.codes/"
    password: false
  - name: PHOTON_PROJECT_SECRET
    description: "Spectrum project secret (set by `hermes photon setup`)"
    prompt: "Photon Spectrum project secret"
    url: "https://app.photon.codes/"
    password: true
optional_env:
  - name: PHOTON_DASHBOARD_TOKEN
    description: "Photon dashboard bearer token (set by `hermes photon login`; used for project listing/creation)"
    prompt: "Photon dashboard token"
    url: "https://app.photon.codes/"
    password: true
  - name: PHOTON_OPERATOR_PHONE
    description: "E.164 operator phone reconciled by setup"
    prompt: "Operator phone"
    password: false
  - name: PHOTON_ASSIGNED_PHONE_NUMBER
    description: "Assigned Photon/iMessage number returned by Photon"
    prompt: "Assigned Photon number"
    password: false
  - name: PHOTON_NODE_BIN
    description: "Path to the node binary (default: shutil.which('node'))"
    prompt: "Node executable path"
    password: false
  - name: PHOTON_API_HOST
    description: "Spectrum management API host (default https://spectrum.photon.codes)"
    prompt: "Spectrum API host"
    password: false
  - name: PHOTON_DASHBOARD_HOST
    description: "Dashboard API host (default https://app.photon.codes)"
    prompt: "Dashboard host"
    password: false
  - name: PHOTON_ALLOWED_USERS
    description: "Comma-separated E.164 phone numbers allowed to talk to the bot; setup seeds --phone"
    prompt: "Allowed users (comma-separated)"
    password: false
  - name: PHOTON_ALLOW_ALL_USERS
    description: "Allow any sender to trigger the bot (dev only — disables allowlist)"
    prompt: "Allow all users? (true/false)"
    password: false
  - name: PHOTON_HOME_CHANNEL
    description: "Default Spectrum space ID for cron / notification delivery"
    prompt: "Home space ID"
    password: false
  - name: PHOTON_HOME_CHANNEL_NAME
    description: "Human label for the home channel"
    prompt: "Home channel display name"
    password: false
