name: wechaty-platform
label: WeChat (Wechaty)
kind: platform
version: 0.1.0
description: >
  Personal WeChat gateway adapter for Hermes Agent via Wechaty.
  A supervised Node sidecar runs the Wechaty bot (puppet configurable);
  inbound messages stream to the gateway over loopback NDJSON and outbound
  replies go through the same sidecar. Use when you need a real personal
  WeChat account (including group @-mentions) rather than the built-in
  iLink Weixin adapter.
author: Jing Wang
optional_env:
  - name: WECHATY_PUPPET
    description: "Wechaty puppet module (e.g. wechaty-puppet-service, wechaty-puppet-wechat4u)"
    prompt: "Wechaty puppet"
    password: false
  - name: WECHATY_PUPPET_SERVICE_TOKEN
    description: "Token for wechaty-puppet-service (PadLocal, WorkPro, etc.)"
    prompt: "Wechaty puppet service token"
    password: true
  - name: WECHATY_TOKEN
    description: "Alias for WECHATY_PUPPET_SERVICE_TOKEN"
    prompt: "Wechaty token"
    password: true
  - name: WECHATY_BOT_NAME
    description: "Wechaty bot display name (default hermes-wechaty)"
    prompt: "Bot name"
    password: false
  - name: WECHATY_SIDECAR_PORT
    description: "Loopback port for the Node sidecar (default 8790)"
    prompt: "Sidecar port"
    password: false
  - name: WECHATY_SIDECAR_AUTOSTART
    description: "Spawn the Node sidecar on connect (true/false, default true)"
    prompt: "Auto-start sidecar?"
    password: false
  - name: WECHATY_NODE_BIN
    description: "Path to node binary (default: node on PATH)"
    prompt: "Node executable"
    password: false
  - name: WECHATY_REQUIRE_MENTION
    description: "In group chats, only respond when @-mentioned (true/false, default true)"
    prompt: "Require @mention in groups?"
    password: false
  - name: WECHATY_MENTION_PATTERNS
    description: "Group wake-word regexes (JSON list or comma/newline-separated; defaults to Hermes wake words)"
    prompt: "Group mention patterns"
    password: false
  - name: WECHATY_SIDECAR_TOKEN
    description: "Loopback bearer token for the Node sidecar (auto-generated by the adapter when unset; needed for standalone cron send)"
    prompt: "Sidecar auth token"
    password: true
  - name: WECHATY_ALLOWED_USERS
    description: "Comma-separated WeChat contact ids allowed to DM the bot"
    prompt: "Allowed users (comma-separated)"
    password: false
  - name: WECHATY_ALLOW_ALL_USERS
    description: "Allow any sender (dev only)"
    prompt: "Allow all users?"
    password: false
  - name: WECHATY_HOME_CHANNEL
    description: "Default chat id for cron delivery (contact:ID or room:ID)"
    prompt: "Home channel id"
    password: false
  - name: WECHATY_HOME_CHANNEL_NAME
    description: "Display name for the home channel"
    prompt: "Home channel name"
    password: false
