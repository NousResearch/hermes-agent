name: sol-food
label: Sol Food Transport
kind: backend
version: 1.0.0
description: >
  Owner-private Sol food logging transport. Presents bounded meal
  candidate proposals in the Sol topic (Telegram forum General topic id
  1), with opaque sf1 callback tokens, strict origin binding, 30-minute
  expiry, and fail-closed media ceilings. Commits happen ONLY through the
  Health food-commit v3 loopback endpoint (frozen envelopes, exact-retry
  reconciliation, immutable receipts); this plugin stores no canonical
  food data and holds no Supabase credentials or user identity.
author: s0673468
requires_env:
  - name: HEALTH_FOOD_COMMIT_URL
    description: "Loopback-only Health food commit endpoint URL"
    prompt: "Health food commit URL (http://127.0.0.1:.../...)"
    password: false
  - name: HEALTH_FOOD_COMMIT_TOKEN
    description: "43-char base64url token for the Health food endpoint"
    prompt: "Health food commit token"
    password: true
