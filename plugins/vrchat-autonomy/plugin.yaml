name: vrchat-autonomy
version: 0.1.0
description: "Autonomous VRChat chatbox, loop, movement, and Neuro API bridge."
author: "Hermes local plugin"
kind: standalone
platforms:
  - windows
  - linux
  - macos
provides_tools:
  - vrchat_autonomy_plugin_status
  - vrchat_autonomy_plugin_chatbox
  - vrchat_autonomy_plugin_move
