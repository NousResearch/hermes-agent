<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>わらしべ商事｜MOA AI Company</title>
<style>
:root{--ink:#e9eef5;--muted:#98a6b8;--panel:#0c1624dd;--gold:#d7a84a}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:#07111d;color:var(--ink);font-family:system-ui,"Yu Gothic",sans-serif}
#app{position:fixed;inset:0}
canvas{display:block}
header{position:fixed;z-index:2;top:18px;left:24px;right:24px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}
.brand{pointer-events:auto;background:var(--panel);border:1px solid #31445d;border-radius:12px;padding:12px 16px;backdrop-filter:blur(10px)}
h1{font-size:19px;margin:0;color:#f5d68b;letter-spacing:.08em}
h1 small{font-size:11px;color:var(--muted);font-weight:400;letter-spacing:0}
.sub{font-size:11px;color:var(--muted);margin-top:5px}
.status{pointer-events:auto;text-align:right;background:var(--panel);border:1px solid #31445d;border-radius:12px;padding:10px 14px;font-size:12px;line-height:1.7}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#f0a53a;margin-right:5px}
.dot.ok{background:#55d99a}
.toolbar{position:fixed;z-index:2;left:24px;bottom:20px;display:flex;gap:8px}
.toolbar button{border:1px solid #3b536d;background:#102238dd;color:var(--ink);border-radius:8px;padding:8px 11px;cursor:pointer}
.toolbar button:hover{border-color:var(--gold)}
#detail{position:fixed;z-index:3;right:24px;bottom:20px;width:285px;display:none;background:var(--panel);border:1px solid #3b536d;border-radius:12px;padding:15px;backdrop-filter:blur(10px)}
#detail.open{display:block}
#detail h2{font-size:16px;margin:0 0 8px;color:#f5d68b}
.row{display:flex;justify-content:space-between;border-top:1px solid #26384e;padding:6px 0;font-size:12px}
.muted{color:var(--muted)}
.hint{position:fixed;z-index:2;right:24px;bottom:20px;color:#7f92a8;font-size:11px}
#err{position:fixed;z-index:4;left:50%;top:50%;transform:translate(-50%,-50%);display:none;max-width:80%;background:#2a0f12;border:1px solid #6b2530;border-radius:10px;padding:14px 18px;font-size:12px;color:#ffd9dd;white-space:pre-wrap}
</style>
</head>
<body>
<div id="app"></div>
<header>
  <div class="brand">
    <h1>わらしべ商事 <small>｜MOA AI COMPANY</small></h1>
    <div class="sub">誠実・改善・挑戦　｜　1万円から始める循環型せどり本部</div>
  </div>
  <div class="status">
    <div><span id="dot" class="dot"></span><span id="connection">確認中…</span></div>
    <div>preset: <b id="preset">hakuapulse-orchestrator</b></div>
    <div>更新: <span id="updated">--:--:--</span></div>
  </div>
</header>
<div class="toolbar">
  <button id="reset">正面</button>
  <button id="top">俯瞰</button>
  <button id="auto">自動回転: ON</button>
</div>
<div class="hint">ドラッグ: 回転　ホイール: 拡大　社員をクリック: 詳細</div>
<aside id="detail">
  <h2 id="detailName">社員詳細</h2>
  <div class="row"><span class="muted">役割</span><b id="detailRole">-</b></div>
  <div class="row"><span class="muted">モデル</span><b id="detailModel">-</b></div>
  <div class="row"><span class="muted">稼働負荷</span><b id="detailLoad">-</b></div>
  <div class="row"><span class="muted">担当</span><b id="detailTask">-</b></div>
</aside>
<div id="err"></div>

<!-- UMD (classic script): works from file:// and http:// alike -->
<script src="./vendor/three.min.js"></script>
<script src="./vendor/OrbitControls.classic.js"></script>
<script>
(function(){
  const errBox = document.getElementById('err');
  function showErr(msg){ errBox.style.display='block'; errBox.textContent = '⚠ 表示エラー: '+msg; }

  if (typeof THREE === 'undefined') {
    showErr('Three.js (vendor/three.min.js) が読み込めませんでした。');
    draw2D();
    return;
  }

  const people=[
    {id:'orchestrator',name:'社長｜はくあ',role:'固定オーケストレーター',model:'openai-codex:gpt-5.6-luna',color:0xd7a84a,pos:[0,0,0],task:'全体方針・最終レビュー',scale:1.18},
    {id:'secretary',name:'秘書室',role:'受付・分解・承認',model:'MoA / secretary',color:0x57c7d9,pos:[-4,0,1.8],task:'Kanban整理・人間確認'},
    {id:'researcher',name:'調査部',role:'相場調査・利益試算',model:'MoA / sedori-researcher',color:0x68c77b,pos:[4,0,1.8],task:'メルカリ・ヤフオク調査'},
    {id:'buyer',name:'仕入部',role:'仕入れ判断・在庫登録',model:'MoA / sedori-buyer',color:0xf09a49,pos:[-5,0,-3],task:'購入候補の承認待ち'},
    {id:'lister',name:'出品部',role:'出品下書き・価格改定',model:'MoA / sedori-lister',color:0xb384ed,pos:[5,0,-3],task:'商品説明・写真確認'},
    {id:'shipper',name:'物流部',role:'梱包・発送・追跡',model:'MoA / sedori-shipper',color:0x5e9ee8,pos:[-1.9,0,-5.5],task:'発送ラベル確認'},
    {id:'ledger',name:'管理部',role:'古物台帳・損益管理',model:'MoA / sedori-ledger',color:0xe47777,pos:[1.9,0,-5.5],task:'台帳・利益の照合'}
  ];

  const app = document.getElementById('app');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x07111d);
  scene.fog = new THREE.Fog(0x07111d, 18, 38);
  const camera = new THREE.PerspectiveCamera(48, innerWidth/innerHeight, .1, 100);
  camera.position.set(0, 8, 16);

  let renderer;
  try {
    renderer = new THREE.WebGLRenderer({antialias:true});
  } catch(e) {
    showErr('WebGLが利用できません。2D組織図で表示します。('+e.message+')');
    draw2D();
    return;
  }
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  app.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.target.set(0, 1, 0);
  controls.maxPolarAngle = Math.PI * .48;

  scene.add(new THREE.HemisphereLight(0xcde4ff, 0x1b2430, 1.7));
  const key = new THREE.DirectionalLight(0xffe2b0, 2.3); key.position.set(4,12,8); key.castShadow=true; scene.add(key);
  scene.add(new THREE.PointLight(0xd7a84a, 3, 14));

  function mat(c, em){
    return new THREE.MeshStandardMaterial({color:c, emissive: em?c:0, emissiveIntensity: em?0.35:0.05, roughness:.58, metalness:.12});
  }
  function box(w,h,d,c,x,y,z){
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat(c));
    m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m;
  }
  // 畳・障子・社長机・掛け軸
  box(24,.25,20,0x253c34,0,-.15,0);
  for(let x=-11;x<=11;x+=2) box(.025,.03,19,0x41614d,x,.01,0);
  for(let z=-9;z<=9;z+=2) box(23,.03,.025,0x41614d,0,.015,z);
  for(let x=-11;x<=11;x+=2){ box(.06,6,.12,0x8b6d4a,x,3,-9.6); box(1.9,5.5,.03,0xe6d8b8,x+1,3,-9.5); }
  box(4,.7,2,0x4a2e22,0,.5,0); box(1.6,.05,.7,0xd7a84a,0,.88,0);
  box(.9,2,.08,0xeee4c9,0,4,-9.42); box(.08,2.2,.08,0x8a2626,0,4,-9.35);

  function humanoid(p){
    const g = new THREE.Group(); g.userData.person = p;
    const body = mat(p.color,1), dark = mat(0x202b38);
    const torso = new THREE.Mesh(new THREE.CapsuleGeometry(.38,.8,5,10), body); torso.position.y=1.05; g.add(torso);
    const head = new THREE.Mesh(new THREE.SphereGeometry(.34,16,12), body); head.position.y=1.85; g.add(head);
    const eye = mat(0xf7fbff,1);
    [-.11,.11].forEach(x=>{ const e=new THREE.Mesh(new THREE.SphereGeometry(.055,8,6),eye); e.position.set(x,1.88,.31); g.add(e); });
    [-.52,.52].forEach(x=>{ const a=new THREE.Mesh(new THREE.CapsuleGeometry(.1,.7,4,8),body); a.position.set(x,1.18,0); a.rotation.z=x<0?.35:-.35; g.add(a); });
    [-.18,.18].forEach(x=>{ const l=new THREE.Mesh(new THREE.CapsuleGeometry(.13,.8,4,8),dark); l.position.set(x,.38,0); g.add(l); });
    const halo = new THREE.Mesh(new THREE.TorusGeometry(.62,.025,8,32), new THREE.MeshBasicMaterial({color:p.color,transparent:true,opacity:.72}));
    halo.rotation.x=Math.PI/2; halo.position.y=.07; g.add(halo);
    g.userData.halo = halo; g.position.set(p.pos[0],p.pos[1],p.pos[2]); g.scale.setScalar(p.scale||1);
    // 合議ターゲット: 社長(中央)の周りの円周上。社長自身は中央据え置き
    const idx = people.indexOf(p);
    const ang = (idx/Math.max(1,people.length-1))*Math.PI*2;
    const confR = 2.6;
    g.userData.home = new THREE.Vector3(p.pos[0], p.pos[1], p.pos[2]);
    g.userData.conf = new THREE.Vector3(Math.sin(ang)*confR, 0, Math.cos(ang)*confR*0.7);
    g.userData.phase = Math.random()*Math.PI*2;
    g.userData.bob = 0;
    scene.add(g); return g;
  }
  const groups = people.map(humanoid);
  const ray = new THREE.Raycaster(), mouse = new THREE.Vector2();
  let auto = true, t = 0;

  const detail = document.getElementById('detail');
  function show(p){
    detail.classList.add('open');
    document.getElementById('detailName').textContent = p.name;
    document.getElementById('detailRole').textContent = p.role;
    document.getElementById('detailModel').textContent = p.model;
    document.getElementById('detailTask').textContent = p.task;
    document.getElementById('detailLoad').textContent = Math.round((p.load??.35)*100)+'%';
  }
  addEventListener('pointerdown', e=>{
    mouse.x = e.clientX/innerWidth*2-1; mouse.y = -(e.clientY/innerHeight)*2+1;
    ray.setFromCamera(mouse, camera);
    const hit = ray.intersectObjects(groups, true)[0];
    if(hit){
      const p = hit.object.parent ? hit.object.parent.userData.person : hit.object.userData.person;
      if(p) show(p);
    }
  });
  document.getElementById('reset').onclick = ()=>{ camera.position.set(0,8,16); controls.target.set(0,1,0); };
  document.getElementById('top').onclick   = ()=>{ camera.position.set(0,21,.1);  controls.target.set(0,0,0); };
  document.getElementById('auto').onclick  = ()=>{ auto=!auto; document.getElementById('auto').textContent='自動回転: '+(auto?'ON':'OFF'); };

  const connection = document.getElementById('connection'), dot = document.getElementById('dot'),
        preset = document.getElementById('preset'), updated = document.getElementById('updated');
  async function status(){
    try{
      const r = await fetch('/api/gateway-status', {cache:'no-store'});
      if(!r.ok) throw new Error('http '+r.status);
      const d = await r.json();
      connection.textContent='接続済み'; dot.classList.add('ok');
      preset.textContent = d.active_preset || 'hakuapulse-orchestrator';
      if(Array.isArray(d.agents)) d.agents.forEach(a=>{ const p=people.find(x=>x.id===a.id); if(p) p.load=a.load??p.load; });
    }catch(e){ connection.textContent='デモモード'; dot.classList.remove('ok'); }
    updated.textContent = new Date().toLocaleTimeString('ja-JP');
  }

  const CYCLE = 26;          // 1ループ秒数
  const CONF_AT = 16;        // この秒数から合議フェーズへ
  function loop(){
    requestAnimationFrame(loop);
    t += .016;
    const ph = t % CYCLE;
    const conferring = ph >= CONF_AT;
    const blend = conferring
      ? Math.min(1, (ph - CONF_AT) / 2.2)            // 集合: 2.2秒で寄る
      : Math.max(0, 1 - (ph - (CYCLE - 2.2)) / 2.2); // 散会: 終了前2.2秒で戻る
    groups.forEach((g,i)=>{
      const u = g.userData;
      // ターゲット位置 = 散策ホーム ↔ 合議位置 を補間
      const tx = u.home.x + (u.conf.x - u.home.x) * blend + (conferring ? 0 : Math.sin(t*0.6 + u.phase)*0.9);
      const tz = u.home.z + (u.conf.z - u.home.z) * blend + (conferring ? 0 : Math.cos(t*0.5 + u.phase)*0.9);
      g.position.x += (tx - g.position.x) * 0.04;
      g.position.z += (tz - g.position.z) * 0.04;
      // 上下の揺れ（話し合い中は少し大きく）
      const amp = conferring ? .06 : .035;
      g.position.y = Math.sin(t*1.6 + i) * amp;
      // 合議中は社長の方（中央）を向く。社長自身は前傾うなずき
      if(i === 0){
        g.rotation.x = conferring ? Math.sin(t*2.4)*0.05 : 0;
      } else if(conferring){
        g.lookAt(0, 1, 0);
      } else {
        g.rotation.y += (Math.sin(t*0.3+u.phase)*0.4 - g.rotation.y)*0.02;
      }
      u.halo.rotation.z += .01;
      u.halo.material.opacity = .48 + Math.sin(t*2+i)*.18;
    });
    if(auto){ const r=16; camera.position.x=Math.sin(t*.045)*r; camera.position.z=Math.cos(t*.045)*r; }
    controls.update();
    renderer.render(scene, camera);
  }
  addEventListener('resize', ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
  status(); setInterval(status, 15000); loop();

  // ---- 2D フォールバック組織図 (WebGL非対応 / Three.js未取得時) ----
  function draw2D(){
    const c = document.createElement('canvas');
    c.width = innerWidth; c.height = innerHeight;
    app.appendChild(c);
    const g = c.getContext('2d');
    function frame(){
      requestAnimationFrame(frame);
      g.fillStyle = '#07111d'; g.fillRect(0,0,c.width,c.height);
      const cx = c.width/2, cy = c.height/2, R = Math.min(c.width,c.height)*0.32;
      const t = Date.now()/1000;
      const CYCLE = 26, CONF_AT = 16;
      const ph = t % CYCLE;
      const conferring = ph >= CONF_AT;
      const blend = conferring ? Math.min(1,(ph-CONF_AT)/2.2) : Math.max(0,1-(ph-(CYCLE-2.2))/2.2);
      people.forEach((p,i)=>{
        const baseAng = (i/people.length)*Math.PI*2 - Math.PI/2 + (auto? t*0.05 : 0);
        const hx = cx + Math.cos(baseAng)*R, hy = cy + Math.sin(baseAng)*R*0.62;
        const ang = (i/Math.max(1,people.length-1))*Math.PI*2 - Math.PI/2;
        const confR = Math.min(c.width,c.height)*0.13;
        const cx2 = cx + Math.cos(ang)*confR, cy2 = cy + Math.sin(ang)*confR*0.62;
        const x = hx + (cx2-hx)*blend + (conferring?0:Math.sin(t*0.6+i)*18);
        const y = hy + (cy2-hy)*blend + (conferring?0:Math.cos(t*0.5+i)*12) + (conferring?Math.sin(t*1.6+i)*4:Math.sin(t*1.2+i)*3);
        const col = '#'+p.color.toString(16).padStart(6,'0');
        g.beginPath(); g.fillStyle=col; g.arc(x, y, i===0?34:24, 0, Math.PI*2); g.fill();
        if(i===0){ g.strokeStyle='#f5d68b'; g.lineWidth=3; g.beginPath(); g.arc(x,y,42,0,Math.PI*2); g.stroke(); }
        g.fillStyle='#e9eef5'; g.font='13px system-ui'; g.textAlign='center';
        g.fillText(p.name, x, y+ (i===0?54:42));
        g.fillStyle='#98a6b8'; g.font='10px system-ui';
        g.fillText(p.role, x, y+ (i===0?70:56));
      });
      g.fillStyle = '#f5d68b'; g.font='15px system-ui'; g.textAlign='center';
      const label = (Date.now()/1000 % CYCLE >= CONF_AT) ? 'わらしべ商事 合議中…' : 'わらしべ商事 組織図（2Dモード）';
      g.fillText(label, cx, cy - R - 30);
    }
    frame();
    // クリックで詳細表示
    c.addEventListener('pointerdown', e=>{
      const cx=c.width/2, cy=c.height/2, R=Math.min(c.width,c.height)*0.32, t=Date.now()/1000;
      people.forEach((p,i)=>{ const ang=(i/people.length)*Math.PI*2-Math.PI/2+(auto?t*0.05:0);
        const x=cx+Math.cos(ang)*R, y=cy+Math.sin(ang)*R*0.62;
        if(Math.hypot(e.clientX-x,e.clientY-y) < (i===0?34:24)) show(p); });
    });
  }
  // draw2D をグローバルから呼べるように (error path 用)
  window.draw2D = draw2D;
})();
</script>
</body>
</html>
