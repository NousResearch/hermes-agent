default_branch: main
autonomy_profile: branch_local_development
remote_lifecycle_profile: read_only_discovery_and_pr_evidence
controlled_remote_branch_push_enabled: false
one_pr_creation_pilot_enabled: false
pr_updates_comments_status_mutation_enabled: false
merge_authority_enabled: false
tenacity_native_control_plane:
  native_goal_enabled: proposed
  native_kanban_board: crypto_bot
  kanban_source_of_truth: planned
  worker_lanes:
    - crypto-pm-orchestrator
    - crypto-implementer
    - crypto-reviewer
    - crypto-ci-triage
    - crypto-codex-audit
  hook_policy: /Users/preston/.hermes/hermes-agent/docs/autonomy/crypto_bot_hooks_policy.md
  hook_source: /Users/preston/.hermes/hermes-agent/hooks/crypto_bot_policy_guard
  profile_strategy: /Users/preston/.hermes/hermes-agent/projects/crypto_bot/tenacity_profiles.yaml
  kanban_import_plan: /Users/preston/.hermes/hermes-agent/projects/crypto_bot/kanban_import_plan.yaml
  codex_runtime_strategy: bounded_sidecar_required_until_native_equivalent_proven
readiness_gates:
  source_runtime_ready: false
  local_evidence_ready: false
  native_kanban_ready: false
  pr_lifecycle_ready: false
  ci_evidence_ready: false
  merge_ready: false
task_source:
  - strategic_plan
  - Hermes native Kanban
  - Gitea issues when write/read tools mature
allowed_autonomous_actions:
  - inspect repo
  - select next plan task
  - create local branch
  - modify allowlisted non-secret files
  - run allowlisted tests/validators
  - commit local branch
  - run Codex sidecar audit
  - update Hermes Kanban/state
  - read Gitea remote/PR/check metadata
  - generate PR evidence packets
blocked_without_escalation:
  - live trading
  - broker/account/financial APIs
  - secrets/keychain/env
  - runtime service starts
  - deploy/GitOps promotion
  - Gitea writes if not explicitly enabled by policy
  - protected branches
  - runners/workflows until policy permits
  - controlled remote branch push until explicitly enabled by policy
  - one PR creation pilot until explicitly enabled by policy
  - gh pr create against Gitea unless a future Hermes tool verifies support
  - PR updates/comments/status mutation
  - merge-to-main/protected branch mutation
validation_profile:
  - git status
  - git diff --check
  - relevant targeted tests
  - tests/hermes_pm if relevant
  - selected operator tests if relevant
  - ruff check on changed files
  - validate-secrets-discipline
  - validate-governance-baseline
  - task-scoped validate-security-evidence-wrapper only when selected task requires it
  - Codex sidecar audit
  - Hermes completion gate
  - remote readiness dry-run when remote lifecycle is requested
  - PR evidence packet dry-run when remote lifecycle is requested
  - Gitea PR pilot adapter self-check, dry-run, and create-pr-only preflight under the same Hermes runtime before any partial-state PR retry
global_validators:
  - path: scripts/validation/validate-secrets-discipline.sh
    missing_classification: required_global_validator_blocker
  - path: scripts/validation/validate-governance-baseline.sh
    missing_classification: required_global_validator_blocker
task_scoped_validators:
  - path: scripts/validation/validate-security-evidence-wrapper.py
    missing_classification: task_scoped_validator_missing_warning
    required_task_ids:
      - dev13-002
    required_when: selected task explicitly changes non-runtime security-evidence validation scripts
historical_baseline_artifacts:
  - path: docs/development/hermes_coding_work_packet_template.md
    missing_classification: historical_evidence_missing_warning
    current_global_safety_prerequisite: false
    current_source_of_truth: /Users/preston/.hermes/hermes-agent/docs/autonomy/crypto_bot_target_loop_v2.md
  - path: docs/implementation/hermes_pm_checkpoint_13b_plan.md
    missing_classification: historical_evidence_missing_warning
    current_global_safety_prerequisite: false
    current_source_of_truth: historical dev13 checkpoint evidence
