  - selected task must cite the allowlisted path source before writes
  - commissioning tasks outside the strategic plan require a Kanban card/export path
  - completion requires a clean post-commit Codex sidecar audit matching HEAD
  - completion requires a PASS report from /Users/preston/.hermes/hermes-agent/tools/crypto_bot_completion_gate.py
  - remote integration requires a PR evidence packet before any PR authority
  - controlled Gitea PR creation requires the Hermes-owned PR pilot adapter
  - merge completion requires a separate merge gate and explicit merge authority
