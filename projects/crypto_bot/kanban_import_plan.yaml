  codex-design: crypto-implementer
  codex-security: crypto-reviewer
  codex-oms: crypto-implementer
  codex-observability: crypto-ci-triage
  default: crypto-pm-orchestrator
workspace_strategy:
  root: /Users/preston/.local/state/hermes-operator/kanban-workspaces/crypto_bot
  per_card: isolated native Kanban worker workspace
  product_repo: /Users/preston/robinhood/crypto_bot
  branch_prefix: hermes/
  no_live_dispatch_this_session: true
metadata_fields:
  - session_id
  - sequence
  - phase_id
  - title
  - session_type
  - risk_level
  - allowed_write_scope
  - forbidden_in_session
  - validation_expectations
  - operator_approval_required
  - operator_approval_ids
  - status
  - completion_commit
  - completion_evidence_path
  - expected_evidence_packet_path
kanban_comment_contract:
  on_import: record source plan path, source session_id, status, dependencies, allowed paths, and forbidden surfaces
  on_review_required: record reviewer lane, branch, full HEAD, changed files, validator commands, and sidecar requirement
  on_completion_gate_pass: record completion gate JSON path, conclusion PASS, branch, full HEAD, changed files, and sidecar result path
  on_pr_evidence_ready: record PR title/body paths, packet path if written, target branch, source branch, source HEAD, and CI evidence status
  on_blocked: record readiness blockers, missing validators, missing evidence, policy block, or required authority
claimed_complete_without_gate_evidence:
  rule: do not import as done unless a matching completion gate PASS exists
  action: import to blocked with kanban_comment explaining missing gate evidence
  current_known_case: invalidated Telegram-only dev13-006 claim remains invalidated and must not override S006 machine evidence
remote_lifecycle_import_notes:
  S006: import as review_required or blocked_remote_pr_missing, not done, while no PR exists and CI evidence is absent
  S007: plan-completed claim lacks current Hermes completion-gate evidence and must not import as done
  S017: plan-completed claim lacks current Hermes completion-gate evidence and must not import as done
approval_boundary:
  board_import_requires_explicit_operator_approval: true
  live_import_allowed_by_preview_tool: false
  worker_dispatch_allowed_during_import: false
  product_file_writes_allowed_during_import: false
  gitea_mutation_allowed_during_import: false
  pr_creation_allowed_during_import: false
  merge_allowed_during_import: false
import_steps:
  - run readiness and stop if crypto_bot worktree is dirty
  - run a dry-run/import-preview command if Hermes exposes one
  - create board only after Operator authorizes live board mutation
  - import cards with dependency links but do not dispatch workers
  - verify counts, statuses, comments, and assignees before enabling dispatch
