dependency_mapping:
  source_field: depends_on
  native_link: parent_dependency
  rule: create a dependency edge from each depends_on entry to the session_id card
  missing_parent_policy: block import preview and report the missing parent id
initial_columns:
  completed_current_evidence_backed: done only when current Hermes completion-gate PASS exists
  completed_without_current_gate: blocked
  completed_with_local_gate_but_no_pr_or_ci: review_required
  not_required_current_evidence_backed: blocked unless explicit archival evidence exists
  planned_next: todo
  planned: triage
  unknown: blocked
