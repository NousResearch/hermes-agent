# ──────────────────────────────────────────────────────────────
# Hermes Agent – Railway Configuration (Gateway only)
# ──────────────────────────────────────────────────────────────

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "always"
sleepApplication = false

# ── Environment variable definitions ─────────────────────────

[[deploy.envVars]]
name = "OPENROUTER_API_KEY"
description = "OpenRouter API key (openrouter.ai) — use this OR NOUS_API_KEY"

[[deploy.envVars]]
name = "NOUS_API_KEY"
description = "Nous Portal API key (portal.nousresearch.com) — use this OR OPENROUTER_API_KEY"

[[deploy.envVars]]
name = "LLM_MODEL"
description = "Model to use (e.g. anthropic/claude-opus-4-6, Hermes-4-70B)"
defaultValue = "anthropic/claude-opus-4-6"

[[deploy.envVars]]
name = "HERMES_INFERENCE_PROVIDER"
description = "Provider override: auto | openrouter | nous-api (auto-detected if not set)"
defaultValue = "auto"

[[deploy.envVars]]
name = "TELEGRAM_BOT_TOKEN"
description = "Telegram bot token from @BotFather"

[[deploy.envVars]]
name = "TELEGRAM_HOME_CHANNEL"
description = "Your Telegram user ID (from @userinfobot)"

[[deploy.envVars]]
name = "TELEGRAM_ALLOWED_USERS"
description = "Comma-separated Telegram user IDs allowed to use the bot"

[[deploy.envVars]]
name = "TERMINAL_ENV"
description = "Terminal backend: local | docker"
defaultValue = "local"

[[deploy.envVars]]
name = "GATEWAY_ALLOW_ALL_USERS"
description = "Set to true to allow any Telegram user (not recommended)"
defaultValue = "false"
