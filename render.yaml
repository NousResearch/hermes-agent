services:
  - type: web
    name: giga-hermes-staging
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: ./scripts/render-gateway-start.sh
    plan: starter
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: VOICE_CALL_REALTIME_MODEL
        value: gpt-realtime-2
      - key: VOICE_CALL_ASSISTANT_VOICE
        value: marin
    disk:
      name: giga-hermes-data
      mountPath: /opt/data
      sizeGB: 1
