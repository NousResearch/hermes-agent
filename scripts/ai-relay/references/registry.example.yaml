# ทะเบียน AI กลาง — เพิ่ม AI = เติม 1 บล็อก · พัก AI = enabled: false
# ไม่มีความลับในไฟล์นี้ (ID/token จริงอยู่ accounts.yaml เฉพาะเครื่อง)
# price_per_call_thb = ราคาต่อการเรียก 1 ครั้ง (บาท) · เป็นค่า [สมมติ] เจ้าของแก้ให้ตรงจริงได้
#   relay-report ใช้ค่านี้คูณจำนวนครั้งจริงจาก ledger → รายงานเป็นเงินบาท
ai:
  opus:
    vendor: anthropic
    roles: [brain]
    good_for: [plan, analyze, review, decide]
    cost_tier: 5
    price_per_call_thb: 8      # [สมมติ]
    login_hint: "claude (login ผ่าน Claude Code)"
    enabled: true             # สมองหลักตัวเดียว · คิด/วิเคราะห์/วางแผน/ตรวจ
  codex:
    vendor: openai
    roles: [coder, reviewer]
    good_for: [backend, logic, security]
    cost_tier: 3
    price_per_call_thb: 3      # [สมมติ]
    fallback_rank: 2
    login_hint: "codex login"
    login_cmd: "codex login"        # relay-relogin เอาไปรัน login ให้อัตโนมัติได้
    enabled: true
  grok:
    vendor: xai
    roles: [coder, reviewer]
    good_for: [fast, bulk, repetitive]
    cost_tier: 2
    price_per_call_thb: 2      # [สมมติ]
    fallback_rank: 1
    login_hint: "grok login --device-auth"
    login_cmd: "grok login --device-auth"   # relay-relogin เอาไปรัน login ให้อัตโนมัติได้
    enabled: true
  gemini:
    vendor: google
    roles: [coder]
    good_for: [ui, large-context, many-files]
    cost_tier: 2
    price_per_call_thb: 1.5    # [สมมติ]
    fallback_rank: 3
    login_hint: "gemini auth login (หรือใส่ GEMINI_API_KEY ใน .env)"
    enabled: false            # ยังไม่ใช้ (เจ้าของแจ้ง 2026-07-06) · เปิดใหม่ = enabled: true
  sonnet:
    vendor: anthropic
    roles: [coder, reviewer]
    good_for: [general-code]
    cost_tier: 3
    price_per_call_thb: 3      # [สมมติ]
    login_hint: "claude (login ผ่าน Claude Code)"
    enabled: false            # ยังไม่ต่อเข้าสาย coder รอเปิด
  ollama:
    vendor: local
    roles: [coder]
    good_for: [free-fallback]
    cost_tier: 1
    price_per_call_thb: 0      # ฟรี (รันในเครื่อง)
    fallback_rank: 4
    login_hint: "รันในเครื่อง (ollama serve) ไม่ต้อง login"
    enabled: true
  qwen:
    vendor: alibaba
    roles: [coder]
    good_for: [general-code]
    cost_tier: 1
    price_per_call_thb: 0.5    # [สมมติ]
    login_hint: "ยังไม่มีโปรแกรมบนเครื่องนี้ (2026-06-26)"
    enabled: false
  glm:
    vendor: zhipu
    roles: [coder]
    good_for: [general-code]
    cost_tier: 1
    price_per_call_thb: 0.5    # [สมมติ]
    login_hint: "ยังไม่มีโปรแกรมบนเครื่องนี้ (2026-06-26)"
    enabled: false
  deepseek:
    vendor: deepseek
    roles: [coder]
    good_for: [logic, math]
    cost_tier: 1
    price_per_call_thb: 0.5    # [สมมติ]
    login_hint: "ยังไม่มีโปรแกรมบนเครื่องนี้ (2026-06-26)"
    enabled: false
