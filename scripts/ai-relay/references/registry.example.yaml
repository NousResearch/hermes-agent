# ทะเบียน AI กลาง — เพิ่ม AI = เติม 1 บล็อก · พัก AI = enabled: false
# ไม่มีความลับในไฟล์นี้ (ID/token จริงอยู่ accounts.yaml เฉพาะเครื่อง)
ai:
  opus:
    vendor: anthropic
    roles: [brain]
    good_for: [plan, analyze, review, decide]
    cost_tier: 5
    login_hint: "claude (login ผ่าน Claude Code)"
    enabled: true
  fable:
    vendor: anthropic
    roles: [brain]
    good_for: [hard-design, security-decision]
    cost_tier: 5
    premium: true
    machine_locked: true      # เฉพาะเครื่องเจ้าของ (โน้ตบุ๊ก+VPS)
    login_hint: "claude (login ผ่าน Claude Code)"
    enabled: true
  codex:
    vendor: openai
    roles: [coder, reviewer]
    good_for: [backend, logic, security]
    cost_tier: 3
    fallback_rank: 2
    login_hint: "codex login"
    enabled: true
  grok:
    vendor: xai
    roles: [coder, reviewer]
    good_for: [fast, bulk, repetitive]
    cost_tier: 2
    fallback_rank: 1
    login_hint: "grok login --device-auth"
    enabled: true
  gemini:
    vendor: google
    roles: [coder]
    good_for: [ui, large-context, many-files]
    cost_tier: 2
    fallback_rank: 3
    login_hint: "gemini auth login (หรือใส่ GEMINI_API_KEY ใน .env)"
    enabled: true
  sonnet:
    vendor: anthropic
    roles: [coder, reviewer]
    good_for: [general-code]
    cost_tier: 3
    login_hint: "claude (login ผ่าน Claude Code)"
    enabled: false            # ยังไม่ต่อเข้าสาย coder รอเปิด
  ollama:
    vendor: local
    roles: [coder]
    good_for: [free-fallback]
    cost_tier: 1
    fallback_rank: 4
    login_hint: "รันในเครื่อง (ollama serve) ไม่ต้อง login"
    enabled: true
  qwen:
    vendor: alibaba
    roles: [coder]
    good_for: [general-code]
    cost_tier: 1
    login_hint: "ยังไม่มีโปรแกรมบนเครื่องนี้ (2026-06-26)"
    enabled: false
  glm:
    vendor: zhipu
    roles: [coder]
    good_for: [general-code]
    cost_tier: 1
    login_hint: "ยังไม่มีโปรแกรมบนเครื่องนี้ (2026-06-26)"
    enabled: false
  deepseek:
    vendor: deepseek
    roles: [coder]
    good_for: [logic, math]
    cost_tier: 1
    login_hint: "ยังไม่มีโปรแกรมบนเครื่องนี้ (2026-06-26)"
    enabled: false
