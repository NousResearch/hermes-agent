# AI Relay local account labels.
# ก๊อปไฟล์นี้ไปที่ .hermes/ai-relay/accounts.yaml ใน repo ที่จะใช้ Relay
# ห้ามใส่รหัสผ่าน รหัส API หรือ token จริงในไฟล์นี้
# id เป็นแค่ป้ายชื่อให้ ledger อ่านง่าย เช่น grok-google-nat

accounts:
  grok:
    - id: grok-google-staff
  codex:
    - id: codex-staff
  gemini:
    - id: gemini-google-staff
  fable:
    - id: claude-staff
  opus:
    - id: claude-staff

fallback:
  code_writing:
    - grok
    - codex
    - gemini
    - ollama
  # ห้ามใส่ fable ในสายนี้ · fable เป็นสมองพิเศษ (เฉพาะงานเกรดยาก) ไม่ใช่ coder สำรอง
  brain:
    # สายสมอง: fable โดน limit หรือเรียกไม่ได้ → ตกไป opus 4.8 อัตโนมัติ (ใช้เงื่อนไขนี้ทุกเครื่อง)
    - opus

limits:
  max_rounds_per_issue: 3
  max_calls_per_session: 50
  max_fable_calls_per_session: 3
  budget: null

cooldown:
  fail_threshold: 3
  window_seconds: 300
  minutes: 10

ollama_models:
  default: qwen3:8b
  code: deepseek-r1:7b
