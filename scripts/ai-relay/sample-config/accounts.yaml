# AI Relay local account labels.
# ก๊อปไฟล์นี้ไปที่ .hermes/ai-relay/accounts.yaml ใน repo ที่จะใช้ Relay
# ห้ามใส่รหัสผ่าน รหัส API หรือ token จริงในไฟล์นี้
# id เป็นแค่ป้ายชื่อให้ ledger อ่านง่าย เช่น grok-google-nat

accounts:
  grok:
    - id: grok-google-staff
  codex:
    - id: codex-staff
  gemini:
    - id: gemini-google-staff
  opus:
    - id: claude-staff

fallback:
  code_writing:
    - grok
    - codex
    - gemini
    - ollama
  brain:
    # สมองหลัก = opus 4.8 ตัวเดียว (Fable ถอดออกแล้ว 2026-07-06)
    - opus

limits:
  max_rounds_per_issue: 3
  max_calls_per_session: 50
  call_timeout_seconds: 900
  review_call_timeout_seconds: 1800
  brain_call_timeout_seconds: 1800
  silence_timeout_seconds: 180
  budget: null

cooldown:
  fail_threshold: 3
  window_seconds: 300
  minutes: 10

ollama_models:
  default: qwen3:8b
  code: deepseek-r1:7b
