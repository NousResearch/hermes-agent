# AI Relay adapter examples.
# ก๊อปไฟล์นี้ไปที่ .hermes/ai-relay/adapters.yaml ใน repo ที่จะใช้ Relay
# ไฟล์นี้ไม่มีรหัสลับ เก็บได้ใน repo ส่วนตัวของทีม

tools:
  grok:
    cmd:
      - grok
      - -p
      - "{prompt}"
      - --cwd
      - "{cwd}"
      - --output-format
      - json
      - --always-approve
    note: "Grok ทำงานแบบไม่เปิดหน้าจอ ใช้บัญชีที่พนักงาน login ไว้ในเครื่องของตัวเอง"

  codex:
    cmd:
      - codex
      - exec
      - --skip-git-repo-check
      - --color
      - never
      - "{prompt}"
    run_in_cwd: true
    note: "ใช้ Codex เป็นตัวสำรองเมื่อ Grok ใช้ไม่ได้"

  gemini:
    cmd:
      - gemini
      - -p
      - "{prompt}"
      - -m
      - gemini-2.5-flash
      - --skip-trust
      - --approval-mode
      - yolo
      - --output-format
      - text
    run_in_cwd: true
    note: "ใช้ Gemini เป็นตัวสำรองสำหรับงานไฟล์เยอะ"

  ollama:
    cmd:
      - ollama
      - run
      - "{model}"
      - "{prompt}"
    run_in_cwd: true
    note: "ใช้โมเดลในเครื่องเป็นตัวสำรองฟรี คุณภาพต้องตรวจเข้มเท่าเดิม"

  # Fable ถอดออกแล้ว (เจ้าของสั่ง 2026-07-06 · ประหยัดโควต้า) · สมองหลัก = Opus 4.8 ตัวเดียว
  opus:
    cmd:
      - claude
      - --model
      - claude-opus-4-8
      - -p
      - "{prompt}"
    run_in_cwd: true
    brain: true
    note: "สมองหลัก · คิด/วิเคราะห์/วางแผน/ตรวจ/ตัดสิน · ทำงานร่วมกับ coder (grok/codex/gemini) ได้เหมือนเดิม"
