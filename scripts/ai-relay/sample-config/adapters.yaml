# AI Relay adapter examples.
# ก๊อปไฟล์นี้ไปที่ .hermes/ai-relay/adapters.yaml ใน repo ที่จะใช้ Relay
# ไฟล์นี้ไม่มีรหัสลับ เก็บได้ใน repo ส่วนตัวของทีม

tools:
  grok:
    cmd:
      - relay-portal
      - grok
      - --prompt
      - "{prompt}"
    note: "Grok วิ่งผ่าน AI Portal token ของพนักงาน ไม่ต้อง login Grok local"

  codex:
    cmd:
      - relay-portal
      - codex
      - --prompt
      - "{prompt}"
    run_in_cwd: true
    note: "Codex วิ่งผ่าน AI Portal token ของพนักงาน ไม่ต้อง login Codex local"

  gemini:
    cmd:
      - gemini
      - -p
      - "{prompt}"
      - -m
      - gemini-2.5-flash
      - --skip-trust
      - --approval-mode
      - yolo
      - --output-format
      - text
    run_in_cwd: true
    note: "ใช้ Gemini เป็นตัวสำรองสำหรับงานไฟล์เยอะ"

  ollama:
    cmd:
      - ollama
      - run
      - "{model}"
      - "{prompt}"
    run_in_cwd: true
    note: "ใช้โมเดลในเครื่องเป็นตัวสำรองฟรี คุณภาพต้องตรวจเข้มเท่าเดิม"

  # Fable ถอดออกแล้ว (เจ้าของสั่ง 2026-07-06 · ประหยัดโควต้า) · สมองหลัก = Opus 4.8 ตัวเดียว
  opus:
    cmd:
      - relay-portal
      - claude
      - --model
      - claude-opus-4-8
      - --prompt
      - "{prompt}"
    run_in_cwd: true
    brain: true
    note: "สมองหลักผ่าน AI Portal · ไม่ต้อง login Claude Code local"
