# Skills index — TOML representation of available skills and categories.
# Used by skill_commands.py and skills_tool.py for fast skill metadata lookups.

[meta]
version = "1.0"
last_updated = "2026-04-25"

# Skill categories — each category is a separate subtable under [categories]
[categories.email]
description = "Email management via CLI (himalaya)"
path = "email"
skills = ["himalaya"]

[categories.feeds]
description = "RSS/feed monitoring and aggregation (mcporter)"
path = "feeds"
skills = ["mcporter"]

[categories.github]
description = "GitHub integration via gh CLI and REST API"
path = "github"
skills = [
  "codebase-inspection",
  "github-auth",
  "github-code-review",
  "github-issues",
  "github-pr-workflow",
  "github-repo-management",
]

[categories.mcp]
description = "Model Context Protocol client and server management"
path = "mcp"
skills = ["native-mcp", "mcporter"]

[categories.note-taking]
description = "Note-taking apps: Obsidian vault integration"
path = "note-taking"
skills = ["obsidian"]

[categories.productivity]
description = "Productivity suites: Notion, Google Workspace, Linear, and more"
path = "productivity"
skills = [
  "google-workspace",
  "linear",
  "nano-pdf",
  "notion",
  "ocr-and-documents",
  "powerpoint",
]

[categories.research]
description = "Research tools: arxiv, blogwatcher, LLM wiki, polymarket"
path = "research"
skills = [
  "arxiv",
  "blogwatcher",
  "llm-wiki",
  "polymarket",
  "research-paper-writing",
]

[categories.software-development]
description = "Software development lifecycle skills"
