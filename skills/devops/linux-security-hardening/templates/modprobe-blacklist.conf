# Kernel module blacklist for security hardening
# Disables unused network protocols and filesystems to reduce attack surface.
# Copy to /etc/modprobe.d/security-blacklist.conf

# Network protocols (rarely needed on dev machines)
install dccp /bin/true
install sctp /bin/true
install rds /bin/true
install tipc /bin/true

# Unused filesystems
install cramfs /bin/true
install freevxfs /bin/true
install jffs2 /bin/true
install hfs /bin/true
install hfsplus /bin/true
install ufs /bin/true

# Uncomment below if USB storage or Bluetooth are not needed:
# install usb-storage /bin/true
# install btusb /bin/true
