<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello View</title>
    <style>
      :root { color-scheme: light dark; font-family: ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #101114; color: #f5f6f7; }
      main { width: min(32rem, calc(100% - 2rem)); padding: 2rem; border: 1px solid #343840; border-radius: 1rem; background: #181a1f; }
      p { color: #aeb4bf; line-height: 1.6; }
    </style>
  </head>
  <body>
    <main>
      <small>HERMES GENERATED VIEW</small>
      <h1>Hello from an agent-authored pane</h1>
      <p>Edit this single file. Hermes will detect the new digest, stop the old frame, and ask the user to approve the change.</p>
    </main>
  </body>
</html>
